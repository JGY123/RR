// ===== TABLE RENDERERS =====
// hold param: optional array of holdings (used for sector TE contribution computation)
function rWt(data,type,hold){
  if(!data||!data.length)return`<p style="color:var(--txt);font-size:12px">No ${type==='sec'?'sector':type==='reg'?'region':'group'} data</p>`;
  // For sectors: compute TE + MCR split + O·R·V·Q weighted/simple rank averages per sector
  let secTEMap={},secMCRMap={};
  // Simple: _S=sum, _C=count. Weighted: _W=rank×weight sum, _PW=weight sum.
  let secOS={},secOC={},secOW={},secOPW={},secOBW={},secOBPW={};
  let secRS={},secRC={},secRW={},secRPW={},secRBW={},secRBPW={};
  let secVS={},secVC={},secVW={},secVPW={},secVBW={},secVBPW={};
  let secQS={},secQC={},secQW={},secQPW={},secQBW={},secQBPW={};
  if(type==='sec'&&hold){
    hold.forEach(h=>{
      if(!h.sec)return;
      secTEMap[h.sec]=(secTEMap[h.sec]||0)+(h.tr||0);
      secMCRMap[h.sec]=(secMCRMap[h.sec]||0)+(h.mcr||0);
      let w=h.p>0?h.p:0;
      let bw=h.b>0?h.b:0;
      if(h.over!=null){secOS[h.sec]=(secOS[h.sec]||0)+h.over;secOC[h.sec]=(secOC[h.sec]||0)+1;secOW[h.sec]=(secOW[h.sec]||0)+h.over*w;secOPW[h.sec]=(secOPW[h.sec]||0)+w;secOBW[h.sec]=(secOBW[h.sec]||0)+h.over*bw;secOBPW[h.sec]=(secOBPW[h.sec]||0)+bw;}
      if(h.rev!=null){secRS[h.sec]=(secRS[h.sec]||0)+h.rev;secRC[h.sec]=(secRC[h.sec]||0)+1;secRW[h.sec]=(secRW[h.sec]||0)+h.rev*w;secRPW[h.sec]=(secRPW[h.sec]||0)+w;secRBW[h.sec]=(secRBW[h.sec]||0)+h.rev*bw;secRBPW[h.sec]=(secRBPW[h.sec]||0)+bw;}
      if(h.val!=null){secVS[h.sec]=(secVS[h.sec]||0)+h.val;secVC[h.sec]=(secVC[h.sec]||0)+1;secVW[h.sec]=(secVW[h.sec]||0)+h.val*w;secVPW[h.sec]=(secVPW[h.sec]||0)+w;secVBW[h.sec]=(secVBW[h.sec]||0)+h.val*bw;secVBPW[h.sec]=(secVBPW[h.sec]||0)+bw;}
      if(h.qual!=null){secQS[h.sec]=(secQS[h.sec]||0)+h.qual;secQC[h.sec]=(secQC[h.sec]||0)+1;secQW[h.sec]=(secQW[h.sec]||0)+h.qual*w;secQPW[h.sec]=(secQPW[h.sec]||0)+w;secQBW[h.sec]=(secQBW[h.sec]||0)+h.qual*bw;secQBPW[h.sec]=(secQBPW[h.sec]||0)+bw;}
    });
  }
  // Region ORVQ: group by CMAP[h.co]
  let regOS={},regOC={},regOW={},regOPW={},regOBW={},regOBPW={};
  let regRS={},regRC={},regRW={},regRPW={},regRBW={},regRBPW={};
  let regVS={},regVC={},regVW={},regVPW={},regVBW={},regVBPW={};
  let regQS={},regQC={},regQW={},regQPW={},regQBW={},regQBPW={};
  if(type==='reg'&&hold){
    hold.forEach(h=>{
      if(isCash(h)||!h.co)return;
      let reg=CMAP[h.co]||'Other';
      let w=h.p>0?h.p:0;
      let bw=h.b>0?h.b:0;
      if(h.over!=null){regOS[reg]=(regOS[reg]||0)+h.over;regOC[reg]=(regOC[reg]||0)+1;regOW[reg]=(regOW[reg]||0)+h.over*w;regOPW[reg]=(regOPW[reg]||0)+w;regOBW[reg]=(regOBW[reg]||0)+h.over*bw;regOBPW[reg]=(regOBPW[reg]||0)+bw;}
      if(h.rev!=null){regRS[reg]=(regRS[reg]||0)+h.rev;regRC[reg]=(regRC[reg]||0)+1;regRW[reg]=(regRW[reg]||0)+h.rev*w;regRPW[reg]=(regRPW[reg]||0)+w;regRBW[reg]=(regRBW[reg]||0)+h.rev*bw;regRBPW[reg]=(regRBPW[reg]||0)+bw;}
      if(h.val!=null){regVS[reg]=(regVS[reg]||0)+h.val;regVC[reg]=(regVC[reg]||0)+1;regVW[reg]=(regVW[reg]||0)+h.val*w;regVPW[reg]=(regVPW[reg]||0)+w;regVBW[reg]=(regVBW[reg]||0)+h.val*bw;regVBPW[reg]=(regVBPW[reg]||0)+bw;}
      if(h.qual!=null){regQS[reg]=(regQS[reg]||0)+h.qual;regQC[reg]=(regQC[reg]||0)+1;regQW[reg]=(regQW[reg]||0)+h.qual*w;regQPW[reg]=(regQPW[reg]||0)+w;regQBW[reg]=(regQBW[reg]||0)+h.qual*bw;regQBPW[reg]=(regQBPW[reg]||0)+bw;}
    });
  }
  let hasRegRanks=type==='reg'&&hold&&Object.keys(regOC).length>0;
  function sAvg(sS,cS,sW,pW,bW,bPW){return rankAvg3(_secRankMode,sS,cS,sW,pW,bW||0,bPW||0);}
  // Sort sectors by TE contribution descending; regions stay as-is
  let sorted=type==='sec'?[...data].sort((a,b)=>(secTEMap[b.n]||0)-(secTEMap[a.n]||0)):data;
  let maxTE=type==='sec'?Math.max(...sorted.map(d=>secTEMap[d.n]||0),0.01):1;
  let rows=sorted.map(d=>{
    let cls=activeStyle(d.a);
    let drillFn=type==='sec'?`oDr('sec','${d.n}')`:`oDr('reg','${d.n}')`;
    let threshCls=Math.abs(d.a)>5?'thresh-alert':Math.abs(d.a)>3?'thresh-warn':'';
    let teTotal=type==='sec'?secTEMap[d.n]||0:null;
    let teMCR=type==='sec'?secMCRMap[d.n]||0:null;
    let teFactor=type==='sec'?+(teTotal-teMCR).toFixed(1):null;
    // TE Contrib: number with proportional light-blue background fill
    let tePct=type==='sec'?Math.min((teTotal/maxTE)*100,100).toFixed(1):'0';
    let teBar=type==='sec'?`<td class="r" data-col="te_contrib" data-sv="${teTotal}" style="white-space:nowrap;background:linear-gradient(to right,rgba(99,102,241,0.18) ${tePct}%,transparent ${tePct}%);position:relative"><span style="position:relative;z-index:1;font-size:11px">${f2(teTotal,1)}%</span></td>`:'';
    let stockTeCell=type==='sec'?`<td class="r" data-col="stock_te" data-sv="${+(teMCR).toFixed(1)}" style="font-size:11px;color:var(--acc)">${f2(teMCR,1)}</td>`:'';
    let factorTeCell=type==='sec'?`<td class="r" data-col="factor_te" data-sv="${teFactor}" style="font-size:11px;color:var(--txt)">${f2(teFactor,1)}</td>`:'';
    // O·R·V·Q Spotlight rank cells
    let rvqCells='';
    if(type==='sec'){
      const rankCell=(avg,col)=>{
        let c=avg!=null?rc(Math.round(avg)):'#334155';
        return`<td class="r" data-col="${col}" data-sv="${avg!=null?+avg.toFixed(2):''}" style="font-size:11px;font-weight:600;color:${c}">${avg!=null?f2(avg,1):'—'}</td>`;
      };
      rvqCells=rankCell(sAvg(secOS[d.n]||0,secOC[d.n]||0,secOW[d.n]||0,secOPW[d.n]||0,secOBW[d.n]||0,secOBPW[d.n]||0),'o')
              +rankCell(sAvg(secRS[d.n]||0,secRC[d.n]||0,secRW[d.n]||0,secRPW[d.n]||0,secRBW[d.n]||0,secRBPW[d.n]||0),'r')
              +rankCell(sAvg(secVS[d.n]||0,secVC[d.n]||0,secVW[d.n]||0,secVPW[d.n]||0,secVBW[d.n]||0,secVBPW[d.n]||0),'v')
              +rankCell(sAvg(secQS[d.n]||0,secQC[d.n]||0,secQW[d.n]||0,secQPW[d.n]||0,secQBW[d.n]||0,secQBPW[d.n]||0),'q');
    }
    if(type==='reg'&&hasRegRanks){
      const rankCellR=(avg)=>{
        let c=avg!=null?rc(Math.round(avg)):'#334155';
        return`<td data-sv="${avg!=null?+avg.toFixed(2):''}" style="text-align:center;font-size:11px;padding:4px 6px;background:rgba(99,102,241,0.04);font-weight:600;color:${c}">${avg!=null?f2(avg,1):'—'}</td>`;
      };
      rvqCells=rankCellR(sAvg(regOS[d.n]||0,regOC[d.n]||0,regOW[d.n]||0,regOPW[d.n]||0,regOBW[d.n]||0,regOBPW[d.n]||0))
              +rankCellR(sAvg(regRS[d.n]||0,regRC[d.n]||0,regRW[d.n]||0,regRPW[d.n]||0,regRBW[d.n]||0,regRBPW[d.n]||0))
              +rankCellR(sAvg(regVS[d.n]||0,regVC[d.n]||0,regVW[d.n]||0,regVPW[d.n]||0,regVBW[d.n]||0,regVBPW[d.n]||0))
              +rankCellR(sAvg(regQS[d.n]||0,regQC[d.n]||0,regQW[d.n]||0,regQPW[d.n]||0,regQBW[d.n]||0,regQBPW[d.n]||0));
    }
    // Trend sparkline cell (inline SVG of .a over last N periods)
    let sparkSeries=type==='sec'?(cs.hist&&cs.hist.sec&&cs.hist.sec[d.n]):(cs.hist&&cs.hist.reg&&cs.hist.reg[d.n]);
    let sparkWin=type==='sec'?_secSparkWin:_regSparkWin;
    let sparkCell=`<td class="r" data-col="trend" style="width:72px;padding:4px 8px">${inlineSparkSvg(sparkSeries,sparkWin)}</td>`;
    return`<tr class="clickable ${threshCls}" onclick="${drillFn}">
      <td>${d.n}</td>
      <td class="r" data-col="port" data-sv="${d.p}">${f2(d.p,1)}</td>
      <td class="r" data-col="bench" data-sv="${d.b}">${f2(d.b,1)}</td>
      <td class="r ${cls}" data-col="active" data-sv="${d.a}">${fp(d.a,1)}</td>
      ${teBar}${stockTeCell}${factorTeCell}${rvqCells}
      ${d.s!=null&&type!=='sec'?`<td class="r" data-sv="${d.s}">${f2(d.s,1)}</td>`:''}
      ${sparkCell}
    </tr>`;
  }).join('');
  let tblId=type==='sec'?'tbl-sec':'tbl-reg';
  let secThead=`<thead>
    <tr style="font-size:9px">
      <th colspan="7" style="padding:1px 0;border-bottom:none;background:var(--card)"></th>
      <th colspan="4" style="text-align:center;background:rgba(99,102,241,0.09);border-left:1px solid rgba(99,102,241,0.25);border-bottom:1px solid rgba(99,102,241,0.25);padding:2px 6px">
        <span style="color:var(--pri);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-right:5px;font-size:9px">Spotlight</span>
        ${rankToggleHtml3()}
      </th>
    </tr>
    <tr>
      <th onclick="sortTbl('tbl-sec',0)">Sector</th>
      <th class="r tip" data-col="port" data-tip="Portfolio weight" onclick="sortTbl('tbl-sec',1)">Port%</th>
      <th class="r tip" data-col="bench" data-tip="Benchmark weight" onclick="sortTbl('tbl-sec',2)">Bench%</th>
      <th class="r tip" data-col="active" data-tip="Active weight (port minus bench)" onclick="sortTbl('tbl-sec',3)">Active</th>
      <th class="r tip" data-col="te_contrib" data-tip="Total sector TE contribution (sum of holdings %T)" onclick="sortTbl('tbl-sec',4)">TE Contrib</th>
      <th class="r tip" data-col="stock_te" data-tip="Stock-specific TE (sum of holdings %S — idiosyncratic)" onclick="sortTbl('tbl-sec',5)">Stock TE%</th>
      <th class="r tip" data-col="factor_te" data-tip="Factor-driven TE (TE Contrib minus Stock TE)" onclick="sortTbl('tbl-sec',6)">Factor TE%</th>
      <th class="r tip" data-col="o" data-tip="Avg Overall MFR rank — weighted by port weight by default (1=best, 5=worst)" onclick="sortTbl('tbl-sec',7)" style="background:rgba(99,102,241,0.07);border-left:1px solid rgba(99,102,241,0.2)">O</th>
      <th class="r tip" data-col="r" data-tip="Avg Revision MFR rank" onclick="sortTbl('tbl-sec',8)" style="background:rgba(99,102,241,0.07)">R</th>
      <th class="r tip" data-col="v" data-tip="Avg Value MFR rank" onclick="sortTbl('tbl-sec',9)" style="background:rgba(99,102,241,0.07)">V</th>
      <th class="r tip" data-col="q" data-tip="Avg Quality MFR rank" onclick="sortTbl('tbl-sec',10)" style="background:rgba(99,102,241,0.07)">Q</th>
      <th class="tip" data-col="trend" data-tip="Active weight trend over last N periods (inline sparkline). Toggle window above." style="width:72px;padding:4px 8px;vertical-align:bottom">
        <div style="font-size:9px;color:var(--txt);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px">Trend</div>
        <div class="toggle-wrap" style="margin:0;display:inline-flex" onclick="event.stopPropagation()">${sparkWinToggleHtml('sec')}</div>
      </th>
    </tr>
  </thead>`;
  let table=type==='sec'
    ?`<table id="${tblId}">${secThead}<tbody>${rows}</tbody></table>`
    :`<table id="${tblId}"><thead><tr><th onclick="sortTbl('${tblId}',0)">Name</th><th class="r tip" data-tip="Portfolio weight" onclick="sortTbl('${tblId}',1)">Port%</th><th class="r tip" data-tip="Benchmark weight" onclick="sortTbl('${tblId}',2)">Bench%</th><th class="r tip" data-tip="Portfolio minus benchmark weight" onclick="sortTbl('${tblId}',3)">Active</th>${hasRegRanks?'<th style="text-align:center;border-left:1px solid rgba(99,102,241,0.25);background:rgba(99,102,241,0.07)" onclick="sortTbl(\'tbl-reg\',4)" class="tip" data-tip="Avg Overall MFR rank (1=best, 5=worst)">O</th><th class="tip" style="text-align:center;background:rgba(99,102,241,0.07)" onclick="sortTbl(\'tbl-reg\',5)" data-tip="Avg Revision MFR rank">R</th><th class="tip" style="text-align:center;background:rgba(99,102,241,0.07)" onclick="sortTbl(\'tbl-reg\',6)" data-tip="Avg Value MFR rank">V</th><th class="tip" style="text-align:center;background:rgba(99,102,241,0.07)" onclick="sortTbl(\'tbl-reg\',7)" data-tip="Avg Quality MFR rank">Q</th>':''}<th class="tip" data-tip="Active weight trend over last N periods" style="width:72px;padding:4px 8px;vertical-align:bottom"><div style="font-size:9px;color:var(--txt);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px">Trend</div><div class="toggle-wrap" style="margin:0;display:inline-flex" onclick="event.stopPropagation()">${sparkWinToggleHtml('reg')}</div></th></tr></thead><tbody>${rows}</tbody></table>`;
  // Region disclaimer: warn when weight sum is low (e.g. US-only strategies)
  if(type==='reg'&&data.length){
    let totalW=data.reduce((s,d)=>s+(d.p||0),0);
    if(totalW<50){
      table+=`<div style="margin-top:8px;padding:6px 10px;background:rgba(245,158,11,.08);border-left:3px solid var(--warn);border-radius:0 4px 4px 0;font-size:10px;color:var(--warn)">
        &#9888; Region coverage: ${f2(totalW)}% of portfolio weight. This strategy's benchmark may not use the same regional classification scheme — most exposure may appear unclassified.</div>`;
    }
  }
  return table;
}

// Primary factors shown by default, sorted by TE contribution
const FAC_PRIMARY=new Set(['Momentum (Medium-Term)','Momentum','Volatility','Growth','Value','Dividend Yield','Profitability']);

// ===== FACTOR TABLE STATE =====
const FAC_GROUP_DEFS=[
  {id:'vg',label:'Value·Growth',color:'#6366f1',factors:['Value','Growth','Dividend Yield','Earnings Yield']},
  {id:'mb',label:'Market Behavior',color:'#a855f7',factors:['Momentum','Momentum (Medium-Term)','Market Sensitivity','Volatility']},
  {id:'pf',label:'Profitability',get color(){return getComputedStyle(document.body).getPropertyValue('--prof').trim()||'#fb923c'},factors:['Profitability']},
  {id:'sec',label:'Secondary',get color(){return THEME().tick},factors:null}  // null = all non-primary
];
const FAC_COLS=[
  {id:'name',label:'Factor'},{id:'exp',label:'Exposure'},{id:'te',label:'TE%'},
  {id:'spark',label:'12wk'},{id:'ret',label:'Return'},{id:'imp',label:'Impact'}
];
let _facView='primary';  // 'primary' | 'all'
let _facHighlight=null;  // group id or null
let _facColVis=(function(){
  let d={};FAC_COLS.forEach(c=>d[c.id]=true);
  try{let s=JSON.parse(localStorage.getItem('rr_fac_cols')||'{}');Object.keys(s).forEach(k=>{if(k in d)d[k]=s[k];});}catch(e){}
  return d;
})();
function applyFacColVis(){
  FAC_COLS.forEach(c=>{
    let show=_facColVis[c.id]!==false;
    document.querySelectorAll('#tbl-fac [data-col="'+c.id+'"]').forEach(el=>el.style.display=show?'':'none');
  });
}
function toggleFacCol(id,checked){
  _facColVis[id]=checked;
  try{localStorage.setItem('rr_fac_cols',JSON.stringify(_facColVis));}catch(e){}
  applyFacColVis();
}
function setFacView(mode){
  _facView=mode;
  let pBtn=document.getElementById('facViewPrimary'),aBtn=document.getElementById('facViewAll');
  if(pBtn)pBtn.classList.toggle('active',mode==='primary');
  if(aBtn)aBtn.classList.toggle('active',mode==='all');
  if(!cs||!cs.factors)return;
  document.getElementById('tbl-fac-wrap').innerHTML=rFacTable(cs.factors,cs.hold);
  applyFacColVis();
  if(_facHighlight)applyFacHighlight(_facHighlight);
}
function setFacHighlight(gid){
  _facHighlight=_facHighlight===gid?null:gid;
  // Update pill active states
  FAC_GROUP_DEFS.forEach(g=>{
    let btn=document.getElementById('fgp-'+g.id);
    if(btn)btn.classList.toggle('active',_facHighlight===g.id);
  });
  applyFacHighlight(_facHighlight);
}
function applyFacHighlight(gid){
  let tbl=document.getElementById('tbl-fac');
  if(!tbl)return;
  if(!gid){tbl.querySelectorAll('tr[data-fac]').forEach(r=>{r.style.opacity='';});return;}
  let grp=FAC_GROUP_DEFS.find(g=>g.id===gid);
  if(!grp)return;
  tbl.querySelectorAll('tr[data-fac]').forEach(r=>{
    let fn=r.getAttribute('data-fac');
    let match=grp.factors?grp.factors.some(f=>f===fn||fn.toLowerCase().includes(f.toLowerCase())):!FAC_PRIMARY.has(fn)&&!/momentum/i.test(fn);
    r.style.opacity=match?'1':'0.3';
  });
}
function facColDropHtml(){
  let items=FAC_COLS.filter(c=>c.id!=='name').map(c=>`<label style="display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;font-size:11px;color:var(--txth);white-space:nowrap"><input type="checkbox" ${_facColVis[c.id]!==false?'checked':''} onchange="toggleFacCol('${c.id}',this.checked)">${c.label}</label>`).join('');
  return`<div class="dl-wrap" onclick="event.stopPropagation()"><button class="export-btn" title="Columns" onclick="let dr=this.nextElementSibling;let was=dr.classList.contains('open');document.querySelectorAll('.dl-drop').forEach(m=>m.classList.remove('open'));if(!was)dr.classList.add('open')" style="padding:3px 7px;font-size:12px">⚙</button><div class="dl-drop" style="min-width:130px">${items}</div></div>`;
}
function facGroupPillsHtml(){
  return FAC_GROUP_DEFS.map(g=>{
    let isCls=g.id==='pf'?'fgp prof':'fgp';
    return`<button id="fgp-${g.id}" class="${isCls}${_facHighlight===g.id?' active':''}" onclick="setFacHighlight('${g.id}')" style="--pill-color:${g.color}">${g.label}</button>`;
  }).join('');
}

function rFac(factors){
  if(!factors||!factors.length)return'<div id="tbl-fac-wrap"><p style="color:var(--txt);font-size:12px">No factor data</p></div>';
  return`<div id="tbl-fac-wrap">${rFacTable(factors)}</div>`;
}

function rFacTable(factors){
  if(!factors||!factors.length)return'<p style="color:var(--txt);font-size:12px">No factor data</p>';
  let facsFinite=factors.filter(f=>f&&f.n&&isFinite(f.a));
  let facsSorted=[...facsFinite].sort((a,b)=>Math.abs(b.c||0)-Math.abs(a.c||0));
  const isFacPrimary=f=>FAC_PRIMARY.has(f.n)||/momentum/i.test(f.n);
  let showAll=_facView==='all';
  let visible=showAll?facsSorted:facsSorted.filter(isFacPrimary);
  if(!visible.length&&!showAll){
    return'<p style="color:var(--txt);font-size:12px;padding:6px 0">No primary factors in view — try All.</p>';
  }

  // Max absolute exposure for diverging bar scaling
  let maxExp=Math.max(...facsFinite.map(f=>Math.abs(f.a||0)),0.01);

  // Prior-period exposure map for Profitability warning
  let priorExpMap={};
  if(cs.hist&&cs.hist.fac){
    Object.entries(cs.hist.fac).forEach(([name,arr])=>{
      if(arr&&arr.length>=2){
        let cur=arr[arr.length-1];let prev=arr[arr.length-2];
        if(cur&&prev)priorExpMap[name]=(cur.bm!=null?cur.e-cur.bm:cur.e||0)-(prev.bm!=null?prev.e-prev.bm:prev.e||0);
      }
    });
  }

  const facRow=f=>{
    let isProfitability=f.n==='Profitability';
    let expVal=f.a??0;
    let expAbs=Math.abs(expVal);
    // Diverging bar: blue=positive right, amber=negative left; fills from center
    let pct=Math.round((expAbs/maxExp)*45);  // max 45% width so text stays readable
    let barBg=expVal>=0
      ?`linear-gradient(to right, transparent 50%, var(--fac-bar-pos) 50%, var(--fac-bar-pos) calc(50% + ${pct}%), transparent calc(50% + ${pct}%))`
      :`linear-gradient(to left, transparent 50%, var(--fac-bar-neg) 50%, var(--fac-bar-neg) calc(50% + ${pct}%), transparent calc(50% + ${pct}%))`;
    // Profitability: reversed color (positive exposure = good)
    let expColor=isProfitability
      ?(expVal>0.1?'var(--pos)':expVal<-0.1?'var(--neg)':'var(--txth)')
      :(expVal>0?'var(--pos)':'var(--neg)');
    let rowBase=isProfitability?'background:rgba(251,146,60,0.06);border-left:4px solid var(--prof);':'border-left:4px solid transparent;';
    // Profitability amber warning: exposure decreased vs prior week
    let profWarn='';
    if(isProfitability&&priorExpMap['Profitability']!=null&&priorExpMap['Profitability']<-0.05){
      profWarn=' <span class="tip" data-tip="Profitability exposure decreased vs prior week" style="color:var(--prof);font-size:10px">⚠</span>';
    }
    let profTip=isProfitability?' class="tip" data-tip="Intentional exposure — higher profitability is desired. Green=increasing (good), Red=decreasing (risk)."':'';
    let facHist=(cs.hist&&cs.hist.fac)?cs.hist.fac[f.n]:null;
    let sparkVals=facHist?facHist.slice(-12).map(h=>h.bm!=null?+(h.e-h.bm).toFixed(4):(h.e||0)):[];
    let profColor=getComputedStyle(document.body).getPropertyValue('--prof').trim()||'#fb923c';
    let spark=sparkVals.length>=2?mkSparkline(sparkVals,48,18,isProfitability?profColor:null):'';
    let nm=f.n.replace(/'/g,"\\'");
    return`<tr class="clickable" data-fac="${f.n.replace(/"/g,'&quot;')}" style="${rowBase}cursor:pointer" onclick="oDrF('${nm}')">
      <td data-col="name"${profTip}>${isProfitability?`<span style="color:var(--pos);font-weight:600">${f.n} ✦</span>${profWarn}`:f.n}</td>
      <td class="r" data-col="exp" data-sv="${expVal}" style="background:${barBg};color:${expColor};font-weight:600">${fp(f.a,2)}</td>
      <td class="r" data-col="te" data-sv="${f.c??''}">${f2(f.c,1)}%</td>
      <td class="r" data-col="spark">${spark}</td>
      <td class="r" data-col="ret" data-sv="${f.ret??''}" style="${f.ret!=null?(f.ret>0?'color:var(--pos)':'color:var(--neg)'):''}">${fp(f.ret,2)}</td>
      <td class="r" data-col="imp" data-sv="${f.imp??''}" style="${f.imp!=null?(f.imp>0?'color:var(--pos)':'color:var(--neg)'):''}">${fp(f.imp,2)}</td>
    </tr>`;
  };

  let thead=`<thead><tr>
    <th data-col="name" onclick="sortTbl('tbl-fac',0)">Factor</th>
    <th class="r tip" data-col="exp" data-tip="Active exposure vs benchmark" onclick="sortTbl('tbl-fac',1)">Exposure</th>
    <th class="r tip" data-col="te" data-tip="Contribution to tracking error" onclick="sortTbl('tbl-fac',2)">TE%</th>
    <th class="r" data-col="spark">12wk</th>
    <th class="r tip" data-col="ret" data-tip="Factor return for the period" onclick="sortTbl('tbl-fac',4)">Return</th>
    <th class="r tip" data-col="imp" data-tip="Exposure × Return impact" onclick="sortTbl('tbl-fac',5)">Impact</th>
  </tr></thead>`;

  return`<table id="tbl-fac"><colgroup><col style="min-width:140px"><col style="width:90px"><col style="width:60px"><col style="width:60px"><col style="width:70px"><col style="width:70px"></colgroup>${thead}<tbody>${visible.map(f=>facRow(f)).join('')}</tbody></table>`;
}

function rRnk(ranks){
  if(!ranks.length)return'<p style="color:var(--txt);font-size:12px">No rank data</p>';
  let rows=ranks.map(r=>{
    let empty=r.ct===0;
    let portTxt=empty?'—':f2(r.p)+'%';
    let actTxt=(r.a==null||empty)?'—':f2(r.a)+'%';
    let actCls=(r.a!=null&&!empty&&r.a>0.01)?'pos':((r.a!=null&&!empty&&r.a<-0.01)?'neg':'');
    return`<tr class="clickable" tabindex="0" role="button" aria-label="Filter holdings to ${r.l}" onclick="filterByRank(${r.r})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();filterByRank(${r.r});}"><td data-col="rank" data-sv="${r.r}"><span style="color:${rc(r.r)};font-weight:600">${r.l}</span></td><td class="r" data-col="count" data-sv="${r.ct}">${r.ct}</td><td class="r" data-col="port" data-sv="${r.p??''}">${portTxt}</td><td class="r ${actCls}" data-col="active" data-sv="${r.a??''}">${actTxt}</td></tr>`;
  }).join('');
  return`<table id="tbl-rnk"><thead><tr><th class="tip" data-col="rank" data-tip="Quintile bucket. Q1 = best-ranked by overall quant score, Q5 = worst." onclick="sortTbl('tbl-rnk',0)">Rank</th><th class="r tip" data-col="count" data-tip="Number of portfolio holdings in this quintile." onclick="sortTbl('tbl-rnk',1)">Count</th><th class="r tip" data-col="port" data-tip="Sum of portfolio weights in this quintile." onclick="sortTbl('tbl-rnk',2)">Port%</th><th class="r tip" data-col="active" data-tip="Sum of active weights (portfolio − benchmark) in this quintile." onclick="sortTbl('tbl-rnk',3)">Active%</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function filterByRank(rank){
  activeTab='holdings';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[2].classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  $('tab-holdings').classList.add('active');
  ah=[...cs.hold];fh=ah.filter(h=>h.r===rank);hp=1;renderHoldTab();
  // Set the rank filter dropdown
  setTimeout(()=>{let rf=$('rankFilter');if(rf)rf.value=rank},100);
}

function rChr(chars){

    let diff=(c.b!=null&&c.p!=null&&isFinite(c.p)&&isFinite(c.b))?c.p-c.b:null;

function rCountryTable(countries,hold){
  if(!countries||!countries.length)return'<p style="color:var(--txt);font-size:12px">No country data</p>';
  // Compute ORVQ per country: simple / port-weighted / bench-weighted avgs
  let coOS={},coOC={},coOW={},coOPW={},coOBW={},coOBPW={};
  let coRS={},coRC={},coRW={},coRPW={},coRBW={},coRBPW={};
  let coVS={},coVC={},coVW={},coVPW={},coVBW={},coVBPW={};
  let coQS={},coQC={},coQW={},coQPW={},coQBW={},coQBPW={};
  let coTR={},coMCR={};
  if(hold){
    hold.forEach(h=>{
      if(!h.co||isCash(h))return;
      let w=h.p>0?h.p:0;
      let bw=h.b>0?h.b:0;
      coTR[h.co]=(coTR[h.co]||0)+(h.tr||0);
      coMCR[h.co]=(coMCR[h.co]||0)+(h.mcr||0);
      if(h.over!=null){coOS[h.co]=(coOS[h.co]||0)+h.over;coOC[h.co]=(coOC[h.co]||0)+1;coOW[h.co]=(coOW[h.co]||0)+h.over*w;coOPW[h.co]=(coOPW[h.co]||0)+w;coOBW[h.co]=(coOBW[h.co]||0)+h.over*bw;coOBPW[h.co]=(coOBPW[h.co]||0)+bw;}
      if(h.rev!=null){coRS[h.co]=(coRS[h.co]||0)+h.rev;coRC[h.co]=(coRC[h.co]||0)+1;coRW[h.co]=(coRW[h.co]||0)+h.rev*w;coRPW[h.co]=(coRPW[h.co]||0)+w;coRBW[h.co]=(coRBW[h.co]||0)+h.rev*bw;coRBPW[h.co]=(coRBPW[h.co]||0)+bw;}
      if(h.val!=null){coVS[h.co]=(coVS[h.co]||0)+h.val;coVC[h.co]=(coVC[h.co]||0)+1;coVW[h.co]=(coVW[h.co]||0)+h.val*w;coVPW[h.co]=(coVPW[h.co]||0)+w;coVBW[h.co]=(coVBW[h.co]||0)+h.val*bw;coVBPW[h.co]=(coVBPW[h.co]||0)+bw;}
      if(h.qual!=null){coQS[h.co]=(coQS[h.co]||0)+h.qual;coQC[h.co]=(coQC[h.co]||0)+1;coQW[h.co]=(coQW[h.co]||0)+h.qual*w;coQPW[h.co]=(coQPW[h.co]||0)+w;coQBW[h.co]=(coQBW[h.co]||0)+h.qual*bw;coQBPW[h.co]=(coQBPW[h.co]||0)+bw;}
    });
  }
  function coWAvg(S,C,W,PW,BW,BPW){return rankAvg3(_secRankMode,S,C,W,PW,BW||0,BPW||0);}
  const rankCell=(avg)=>{
    let c=avg!=null?rc(Math.round(avg)):'#334155';
    return`<td class="r" style="font-size:11px;font-weight:600;color:${c}" data-sv="${avg!=null?+avg.toFixed(2):''}">${avg!=null?f2(avg,1):'—'}</td>`;
  };
  let hasRanks=hold&&Object.keys(coOC).length>0;
  let hasTE=hold&&hold.some(h=>h.tr!=null||h.mcr!=null);
  let sorted=[...countries].sort((a,b)=>Math.abs(b.a)-Math.abs(a.a));
  let maxTE=hasTE?Math.max(...sorted.map(c=>coTR[c.n]||0),0.01):1;
  let rows=sorted.map(c=>{
    let cls=activeStyle(c.a);
    let threshCls=Math.abs(c.a)>5?'thresh-alert':Math.abs(c.a)>3?'thresh-warn':'';
    let teTotal=hasTE?(coTR[c.n]||0):null;
    let teMCR=hasTE?(coMCR[c.n]||0):null;
    let teFactor=hasTE?+(teTotal-teMCR).toFixed(1):null;
    let tePct=hasTE?Math.min((teTotal/maxTE)*100,100).toFixed(1):'0';
    let teCells=hasTE?(
      `<td class="r" data-sv="${teTotal}" style="white-space:nowrap;background:linear-gradient(to right,rgba(99,102,241,0.18) ${tePct}%,transparent ${tePct}%);position:relative"><span style="position:relative;z-index:1;font-size:11px">${f2(teTotal,1)}%</span></td>`+
      `<td class="r" data-sv="${+teMCR.toFixed(1)}" style="font-size:11px;color:var(--acc)">${f2(teMCR,1)}</td>`+
      `<td class="r" data-sv="${teFactor}" style="font-size:11px;color:var(--txt)">${f2(teFactor,1)}</td>`
    ):'';
    let rvq=hasRanks?(
      rankCell(coWAvg(coOS[c.n]||0,coOC[c.n]||0,coOW[c.n]||0,coOPW[c.n]||0,coOBW[c.n]||0,coOBPW[c.n]||0))+
      rankCell(coWAvg(coRS[c.n]||0,coRC[c.n]||0,coRW[c.n]||0,coRPW[c.n]||0,coRBW[c.n]||0,coRBPW[c.n]||0))+
      rankCell(coWAvg(coVS[c.n]||0,coVC[c.n]||0,coVW[c.n]||0,coVPW[c.n]||0,coVBW[c.n]||0,coVBPW[c.n]||0))+
      rankCell(coWAvg(coQS[c.n]||0,coQC[c.n]||0,coQW[c.n]||0,coQPW[c.n]||0,coQBW[c.n]||0,coQBPW[c.n]||0))
    ):'';
    return`<tr class="clickable ${threshCls}" onclick="oDrCountry('${c.n}')"><td>${c.n}</td><td class="r" data-sv="${c.p}">${f2(c.p)}</td><td class="r" data-sv="${c.b}">${f2(c.b)}</td><td class="r ${cls}" data-sv="${c.a}">${fp(c.a)}</td>${teCells}${rvq}</tr>`;
  }).join('');
  let teTh=hasTE?'<th class="r tip" data-tip="% of total tracking error contributed by this country" onclick="sortTbl(\'tbl-ctry\',4)">TE Contrib</th><th class="r tip" data-tip="Stock-specific tracking error component" onclick="sortTbl(\'tbl-ctry\',5)">Stock TE</th><th class="r tip" data-tip="Factor-driven tracking error (Total − Stock)" onclick="sortTbl(\'tbl-ctry\',6)">Factor TE</th>':'';
  let rBase=hasTE?7:4;
  let rvqTh=hasRanks?`<th class="r tip" data-tip="Avg Overall MFR rank" style="border-left:1px solid rgba(99,102,241,0.25);background:rgba(99,102,241,0.07)" onclick="sortTbl('tbl-ctry',${rBase})">O</th><th class="r tip" data-tip="Avg Revision rank" style="background:rgba(99,102,241,0.07)" onclick="sortTbl('tbl-ctry',${rBase+1})">R</th><th class="r tip" data-tip="Avg Value rank" style="background:rgba(99,102,241,0.07)" onclick="sortTbl('tbl-ctry',${rBase+2})">V</th><th class="r tip" data-tip="Avg Quality rank" style="background:rgba(99,102,241,0.07)" onclick="sortTbl('tbl-ctry',${rBase+3})">Q</th>`:'';
  let leftCol=4+(hasTE?3:0);
  let spotlightHdr=hasRanks?`<tr style="font-size:9px"><th colspan="${leftCol}" style="padding:1px 0;border-bottom:none;background:var(--card)"></th><th colspan="4" style="text-align:center;background:rgba(99,102,241,0.09);border-left:1px solid rgba(99,102,241,0.25);border-bottom:1px solid rgba(99,102,241,0.25);padding:2px 6px"><span style="color:var(--pri);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-right:5px;font-size:9px">Spotlight</span>${rankToggleHtml3()}</th></tr>`:'';
  return`<table id="tbl-ctry"><thead>${spotlightHdr}<tr><th onclick="sortTbl('tbl-ctry',0)">Country</th><th class="r tip" data-tip="Portfolio weight %" onclick="sortTbl('tbl-ctry',1)">Port%</th><th class="r tip" data-tip="Benchmark weight %" onclick="sortTbl('tbl-ctry',2)">Bench%</th><th class="r tip" data-tip="Active weight = Port − Bench" onclick="sortTbl('tbl-ctry',3)">Active</th>${teTh}${rvqTh}</tr></thead><tbody>${rows}</tbody></table>`;
}

function rGroupTable(groups,hold){
  if(!groups||!groups.length)return'<p style="color:var(--txt);font-size:12px">No group data</p>';
  let displayGroups=groups.filter(g=>g.n&&g.n!=='[Cash]');
  if(!displayGroups.length)return'<p style="color:var(--txt);font-size:12px">No group data</p>';
  // Compute weighted-avg ORVQ per group via GROUPS_DEF sector→subgroup mapping
  let grpOS={},grpOC={},grpOW={},grpOPW={},grpOBW={},grpOBPW={};
  let grpRS={},grpRC={},grpRW={},grpRPW={},grpRBW={},grpRBPW={};
  let grpVS={},grpVC={},grpVW={},grpVPW={},grpVBW={},grpVBPW={};
  let grpQS={},grpQC={},grpQW={},grpQPW={},grpQBW={},grpQBPW={};
  if(hold){
    // GROUPS_DEF uses abbreviated sector names ("Info Technology"); holdings use full names ("Information Technology").
    // Normalize to fix pre-existing accumulator mismatch that silently broke all group-level rank modes.
    const SEC_ALIAS={'Info Technology':'Information Technology','Comm Services':'Communication Services','Consumer Disc.':'Consumer Discretionary'};
    let secToSg={};
    GROUPS_DEF.forEach(gd=>{gd.secs.forEach(sec=>{let full=SEC_ALIAS[sec]||sec;if(!secToSg[full])secToSg[full]=[];secToSg[full].push(gd.sg);});});
    hold.forEach(h=>{
      if(!h.sec||isCash(h))return;
      let sgs=secToSg[h.sec]||[];
      sgs.forEach(sg=>{
        let w=h.p>0?h.p:0;
        let bw=h.b>0?h.b:0;
        if(h.over!=null){grpOS[sg]=(grpOS[sg]||0)+h.over;grpOC[sg]=(grpOC[sg]||0)+1;grpOW[sg]=(grpOW[sg]||0)+h.over*w;grpOPW[sg]=(grpOPW[sg]||0)+w;grpOBW[sg]=(grpOBW[sg]||0)+h.over*bw;grpOBPW[sg]=(grpOBPW[sg]||0)+bw;}
        if(h.rev!=null){grpRS[sg]=(grpRS[sg]||0)+h.rev;grpRC[sg]=(grpRC[sg]||0)+1;grpRW[sg]=(grpRW[sg]||0)+h.rev*w;grpRPW[sg]=(grpRPW[sg]||0)+w;grpRBW[sg]=(grpRBW[sg]||0)+h.rev*bw;grpRBPW[sg]=(grpRBPW[sg]||0)+bw;}
        if(h.val!=null){grpVS[sg]=(grpVS[sg]||0)+h.val;grpVC[sg]=(grpVC[sg]||0)+1;grpVW[sg]=(grpVW[sg]||0)+h.val*w;grpVPW[sg]=(grpVPW[sg]||0)+w;grpVBW[sg]=(grpVBW[sg]||0)+h.val*bw;grpVBPW[sg]=(grpVBPW[sg]||0)+bw;}
        if(h.qual!=null){grpQS[sg]=(grpQS[sg]||0)+h.qual;grpQC[sg]=(grpQC[sg]||0)+1;grpQW[sg]=(grpQW[sg]||0)+h.qual*w;grpQPW[sg]=(grpQPW[sg]||0)+w;grpQBW[sg]=(grpQBW[sg]||0)+h.qual*bw;grpQBPW[sg]=(grpQBPW[sg]||0)+bw;}
      });
    });
  }
  function grpWAvg(S,C,W,PW,BW,BPW){return rankAvg3(_secRankMode,S,C,W,PW,BW||0,BPW||0);}
  const rankCell=(avg)=>{
    if(avg==null)return`<td style="text-align:center;font-size:11px;padding:4px 6px;background:rgba(99,102,241,0.04);color:#334155">—</td>`;
    return`<td style="text-align:center;font-size:11px;padding:4px 6px;background:rgba(99,102,241,0.04);font-weight:700;color:${rc(Math.round(avg))}" data-sv="${+avg.toFixed(2)}">${f2(avg,1)}</td>`;
  };
  let hasRanks=hold&&Object.keys(grpOC).length>0;
  let rows=displayGroups.map(g=>{
    let cls=activeStyle(g.a);
    let gn=g.n;
    let rvq=hasRanks?(
      rankCell(grpWAvg(grpOS[gn]||0,grpOC[gn]||0,grpOW[gn]||0,grpOPW[gn]||0,grpOBW[gn]||0,grpOBPW[gn]||0))+
      rankCell(grpWAvg(grpRS[gn]||0,grpRC[gn]||0,grpRW[gn]||0,grpRPW[gn]||0,grpRBW[gn]||0,grpRBPW[gn]||0))+
      rankCell(grpWAvg(grpVS[gn]||0,grpVC[gn]||0,grpVW[gn]||0,grpVPW[gn]||0,grpVBW[gn]||0,grpVBPW[gn]||0))+
      rankCell(grpWAvg(grpQS[gn]||0,grpQC[gn]||0,grpQW[gn]||0,grpQPW[gn]||0,grpQBW[gn]||0,grpQBPW[gn]||0))
    ):'';
    return`<tr class="clickable" onclick="oDrGroup('${g.n}')"><td><span class="chip">${g.n}</span></td><td class="r" data-sv="${g.p}">${f2(g.p)}</td><td class="r" data-sv="${g.b}">${f2(g.b)}</td><td class="r ${cls}" data-sv="${g.a}">${fp(g.a)}</td>${rvq}</tr>`;
  }).join('');
  let rvqTh=hasRanks?'<th style="text-align:center;border-left:1px solid rgba(99,102,241,0.25);background:rgba(99,102,241,0.07)" onclick="sortTbl(\'tbl-grp\',4)" class="tip" data-tip="Avg Overall MFR rank">O</th><th style="text-align:center;background:rgba(99,102,241,0.07)" onclick="sortTbl(\'tbl-grp\',5)">R</th><th style="text-align:center;background:rgba(99,102,241,0.07)" onclick="sortTbl(\'tbl-grp\',6)">V</th><th style="text-align:center;background:rgba(99,102,241,0.07)" onclick="sortTbl(\'tbl-grp\',7)">Q</th>':'';
  let spotlightHdr=hasRanks?`<tr style="font-size:9px"><th colspan="4" style="padding:1px 0;border-bottom:none;background:var(--card)"></th><th colspan="4" style="text-align:center;background:rgba(99,102,241,0.09);border-left:1px solid rgba(99,102,241,0.25);border-bottom:1px solid rgba(99,102,241,0.25);padding:2px 6px"><span style="color:var(--pri);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-right:5px;font-size:9px">Spotlight</span>${rankToggleHtml3()}</th></tr>`:'';
  return`<table id="tbl-grp"><thead>${spotlightHdr}<tr><th onclick="sortTbl('tbl-grp',0)">Group</th><th class="r" onclick="sortTbl('tbl-grp',1)">Port%</th><th class="r" onclick="sortTbl('tbl-grp',2)">Bench%</th><th class="r" onclick="sortTbl('tbl-grp',3)">Active</th>${rvqTh}</tr></thead><tbody>${rows}</tbody></table>`;
}


// ===== BENCHMARK-ONLY SECTOR VIEW (#8 from GAP_INVENTORY) =====
// Aggregates benchmark holdings we DON'T own, grouped by sector.
// Returns '' when there are no bench-only holdings (card hides itself).
function benchOnlySecHtml(s){
  if(!s||!s.hold||!s.hold.length)return '';
  let bySec={};
  s.hold.forEach(h=>{
    if(isCash(h))return;
    if(!h.sec)return;
    // Bench-only: has bench weight, zero-or-missing portfolio weight
    let isBenchOnly=(h.b||0)>0&&(!h.p||h.p<=0);
    if(!isBenchOnly)return;
    if(!bySec[h.sec])bySec[h.sec]={count:0,wt:0,biggest:null};
    let rec=bySec[h.sec];
    rec.count++;
    rec.wt+=(h.b||0);
    if(!rec.biggest||(h.b||0)>(rec.biggest.b||0))rec.biggest=h;
  });
  let entries=Object.entries(bySec).filter(([,d])=>d.count>0);
  if(!entries.length)return '';
  // Sort by missed bench weight desc (biggest gap first)
  entries.sort((a,b)=>b[1].wt-a[1].wt);
  let totalMissed=entries.reduce((acc,[,d])=>acc+d.wt,0);
  let totalCount=entries.reduce((acc,[,d])=>acc+d.count,0);
  let shortNm=n=>{if(!n)return '';n=n.replace(/\s+(Ltd\.?|Limited|Inc\.?|Corp\.?|Corporation|Company|plc|PLC|AG|SA|Holdings?|Group|Class [A-Z])$/gi,'').trim();return n.length>26?n.slice(0,25)+'\u2026':n;};
  let rows=entries.map(([sec,d])=>{
    let big=d.biggest;
    let bigLbl=big?`${shortNm(big.n||big.t)} <span style="color:var(--txt);font-size:10px">(${f2(big.b,2)}%)</span>`:'—';
    let nm2=sec.replace(/'/g,"\\'");
    return `<tr class="clickable" onclick="oDr('sec','${nm2}')">
      <td data-sv="${sec}">${sec}</td>
      <td class="r" data-sv="${d.count}" style="color:var(--txth);font-weight:600">${d.count}</td>
      <td class="r" data-sv="${d.wt}" style="color:var(--warn);font-weight:600">${f2(d.wt,1)}%</td>
      <td style="font-size:11px;color:var(--txth)">${bigLbl}</td>
    </tr>`;
  }).join('');
  return `<div class="card" id="cardBenchOnlySec" style="margin-top:16px;margin-bottom:16px">
    <div class="flex-between"><div class="card-title tip" data-tip="Benchmark holdings you don't own, aggregated by sector. Click a row to open the sector drill.">Benchmark-Only Holdings by Sector <span style="font-size:10px;color:var(--txt);font-weight:400;margin-left:8px">${totalCount} names \u00b7 ${f2(totalMissed,1)}% of benchmark missed</span></div>
    <div class="export-bar"><button class="export-btn" onclick="screenshotCard('#cardBenchOnlySec')">PNG</button><button class="export-btn" onclick="exportCSV('#tbl-bo-sec','bench_only_sec')" style="margin-left:4px">CSV</button></div></div>
    <table id="tbl-bo-sec" style="margin-top:8px"><thead><tr>
      <th onclick="sortTbl('tbl-bo-sec',0)">Sector</th>
      <th class="r tip" data-tip="Count of benchmark-only holdings in this sector" onclick="sortTbl('tbl-bo-sec',1)">Missed</th>
      <th class="r tip" data-tip="Sum of benchmark weights of holdings you don't own" onclick="sortTbl('tbl-bo-sec',2)">Bench Wt</th>
      <th>Biggest Missed</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

function rUnowned(unowned){

// ===== FACTOR ATTRIBUTION (18 Style Snapshot) =====
const KNOWN_CURRENCIES=new Set(['AUD','CAD','CHF','CNY','DKK','EUR','GBP','HKD','ILS','JPY','NGN','NOK','NZD','SEK','SGD','USD','TWD','KRW','BRL','MXN','INR','ZAR','THB','IDR','MYR','PLN','CZK','HUF','TRY','CLP','COP','PEN','EGP','QAR','KWD','SAR','AED','PHP','VND','PKR']);
function classifyAttrib(name){
  if(KNOWN_CURRENCIES.has(name))return'currency';
  // Countries tend to be 1-3 words, capitalized, no &
  if(name.length<25&&!name.includes('&')&&!name.includes(',')&&name[0]===name[0].toUpperCase()&&/^[A-Z][a-z]/.test(name))return'country';
  return'industry';
}

function rAttribTable(){
  let sa=cs.snap_attrib;
  if(!sa||!Object.keys(sa).length){

  <p style="font-size:9px;color:var(--txt);margin-top:6px">${items.length} items · Impact = compounded return attribution over full period · Click any row or bar for time series</p>`;

  // Chart: top 10 by impact as horizontal bar
  let chart10=items.slice(0,10);
  let posC=getComputedStyle(document.body).getPropertyValue('--pos').trim()||'#10b981';
  let negC=getComputedStyle(document.body).getPropertyValue('--neg').trim()||'#ef4444';
  Plotly.newPlot('attribChartDiv',[{
    y:chart10.map(i=>i.name),
    x:chart10.map(i=>i.full_period_imp||0),
    type:'bar',orientation:'h',
    marker:{color:chart10.map(i=>(i.full_period_imp||0)>0?posC:negC)},
    text:chart10.map(i=>fp(i.full_period_imp,2)+'%'),
    textposition:'outside',textfont:{size:10,color:THEME().tick},
    customdata:chart10.map(i=>[f2(i.exp,2),f2(i.dev,1)]),
    hovertemplate:'%{y}<br>Impact: %{x:.2f}%<br>Exposure: %{customdata[0]}<br>Std Dev: %{customdata[1]}<extra></extra>'
  }],{...plotBg,
    yaxis:{...plotBg.yaxis,autorange:'reversed'},
    xaxis:{...plotBg.xaxis,title:'Cumulative Impact (%)'},
    margin:{...plotBg.margin,l:180}

  let achEl=document.getElementById('attribChartDiv');

function oDrAttrib(name){
  let sa=cs.snap_attrib;
  if(!sa||!sa[name])return;
  let item=sa[name];
  let hist=item.hist;
  if(!hist||!hist.length)return;

  let m=$('metricModal');
  let type=classifyAttrib(name);
  let typeLabel={country:'Country',industry:'Industry',currency:'Currency'}[type]||'Factor';

  // Compute our own cumulative from weekly impacts (for arbitrary zoom)
  let dates=hist.map(h=>isoDate(h.d));
  let weeklyImp=hist.map(h=>h.imp||0);
  let cumulative=[];
  let running=0;
  // Simple addition for display (close enough for weekly, true compounding TBD after FactSet call)
  weeklyImp.forEach(imp=>{running+=imp;cumulative.push(+running.toFixed(4));});

  // CSV cumulative for comparison

      yaxis:{...plotBg.yaxis,title:'Cumulative Impact (%)',zeroline:true,zerolinecolor:THEME().zero,zerolinewidth:1},
      legend:{orientation:'h',y:1.1,font:{size:10}},

      shapes:[{type:'line',y0:0,y1:0,xref:'paper',x0:0,x1:1,line:{color:THEME().tick,dash:'dot',width:1}}]
    },modalPlotCfg);

    // Weekly impact bars

function rUpdateCorr(){
  let s=cs;
  let periodEl=document.getElementById('corrPeriod');
  let freqEl=document.getElementById('corrFreq');
  if(!periodEl||!freqEl)return;
  // B66: restore persisted UI state once per page load
  if(!window._corrRestored){
    try{
      let pp=localStorage.getItem('rr.corr.period');if(pp)periodEl.value=pp;
      let pf=localStorage.getItem('rr.corr.freq');if(pf)freqEl.value=pf;
      let pfacs=JSON.parse(localStorage.getItem('rr.corr.facs')||'null');
      if(Array.isArray(pfacs)&&pfacs.length){
        document.querySelectorAll('.corr-fac-chk').forEach(el=>{el.checked=pfacs.includes(el.value);});
      }
    }catch(e){}
    window._corrRestored=true;
  }
  // B66: save current state
  try{
    localStorage.setItem('rr.corr.period',periodEl.value);
    localStorage.setItem('rr.corr.freq',freqEl.value);
    let checked=[...document.querySelectorAll('.corr-fac-chk:checked')].map(el=>el.value);
    if(checked.length)localStorage.setItem('rr.corr.facs',JSON.stringify(checked));
  }catch(e){}
  let wks=periodEl.value==='all'?Infinity:parseInt(periodEl.value);
  let freq=freqEl.value;
  let wrap=document.getElementById('corrMatrixWrap');
  if(!wrap)return;

  // Get selected factors from checkboxes
  let selFacEls=document.querySelectorAll('.corr-fac-chk:checked');
  let selFacs=selFacEls.length?[...selFacEls].map(el=>el.value):null;

  // Compute correlation from hist.fac
  let facHist=s.hist.fac;
  let hasFacData=facHist&&Object.values(facHist).some(v=>v&&v.length>0);
  if(!hasFacData){wrap.innerHTML='<p style="font-size:12px;color:var(--txt);padding:16px;text-align:center">No factor history available</p>';return;}

  let allFacNames=Object.keys(facHist);
  let facNames=selFacs&&selFacs.length?allFacNames.filter(fn=>selFacs.includes(fn)):allFacNames;
  if(facNames.length<2){wrap.innerHTML='<p style="font-size:12px;color:var(--txt);padding:12px;text-align:center">Select at least 2 factors</p>';return;}

  // Slice each factor series to period — use ACTIVE exposure (e - bm)
  // B76: monthly dedupe keeps the FIRST observation per YYYY-MM; assumes hist.fac is chronologically ordered (parser-guaranteed)
  let sliced={};
  facNames.forEach(fn=>{
    let arr=facHist[fn]||[];
    if(wks<Infinity)arr=arr.slice(-wks);
    if(freq==='monthly'){
      let seen=new Set();
      arr=arr.filter(h=>{let m=h.d.slice(0,7);if(seen.has(m))return false;seen.add(m);return true;});
    }
    sliced[fn]=arr.map(h=>h.bm!=null?+(h.e-h.bm).toFixed(4):(+(h.e||0)));
  });
  // B75: filter out factors with <3 observations so they don't silently appear as all-zero rows
  facNames=facNames.filter(fn=>(sliced[fn]||[]).length>=3);
  if(facNames.length<2){wrap.innerHTML='<p style="font-size:12px;color:var(--txt);padding:12px;text-align:center">Not enough factors with ≥3 observations in selected window</p>';return;}
  function pearson(a,b){
    let n=Math.min(a.length,b.length);
    if(n<3)return null; // B62: null instead of silent 0
    let ma=a.slice(0,n).reduce((s,v)=>s+v,0)/n;
    let mb=b.slice(0,n).reduce((s,v)=>s+v,0)/n;
    let num=0,da=0,db=0;
    for(let i=0;i<n;i++){num+=(a[i]-ma)*(b[i]-mb);da+=(a[i]-ma)**2;db+=(b[i]-mb)**2;}
    let denom=Math.sqrt(da*db);
    return denom<1e-10?null:+(num/denom).toFixed(3); // B62: null for zero-variance
  }
  let minLen=Math.min(...facNames.map(fn=>(sliced[fn]||[]).length));
  if(minLen<3){
    wrap.innerHTML=`<p style="font-size:12px;color:var(--warn);padding:16px;text-align:center">⚠ Insufficient data — need at least 3 data points (have ${minLen})</p>`;
    return;
  }
  // Build correlation matrix (B62: null entries render as "—" in cell text)
  let corrMatrix=facNames.map(f1=>facNames.map(f2=>f1===f2?1:pearson(sliced[f1]||[],sliced[f2]||[])));
  // Stash for CSV export
  window._corrExport={facNames,corrMatrix,period:periodEl.value,freq};
  // Build insights using configurable thresholds (B73)
  let hiT=_thresholds.corrHigh??_thresholdsDefault.corrHigh;
  let divT=_thresholds.corrDiversifier??_thresholdsDefault.corrDiversifier;
  let insights=[];
  for(let i=0;i<facNames.length;i++){
    for(let j=i+1;j<facNames.length;j++){
      let r=corrMatrix[i][j];
      if(r==null)continue;
      let aEsc=facNames[i].replace(/'/g,"\\'"),bEsc=facNames[j].replace(/'/g,"\\'");
      // B74: factor names clickable via oDrF
      let aHtml=`<a onclick="oDrF('${aEsc}')" style="color:var(--pri);cursor:pointer;text-decoration:underline"><strong>${facNames[i]}</strong></a>`;
      let bHtml=`<a onclick="oDrF('${bEsc}')" style="color:var(--pri);cursor:pointer;text-decoration:underline"><strong>${facNames[j]}</strong></a>`;
      if(r>hiT)insights.push(`⚠ ${aHtml} &amp; ${bHtml}: r=${r.toFixed(2)} — high positive correlation`);
      else if(r<divT)insights.push(`✓ ${aHtml} &amp; ${bHtml}: r=${r.toFixed(2)} — diversifying`);
    }
  }
  let noteHtml=minLen<10?`<div style="font-size:10px;color:var(--warn);margin-bottom:6px">⚠ Only ${minLen} data points in selected period</div>`:'';
  // Render Plotly heatmap
  let heatH=Math.max(260,facNames.length*36+80);
  wrap.innerHTML=noteHtml+`<div id="corrHeatPlot" style="height:${heatH}px"></div>`;
  // B64: themed colorscale + text color
  let posC=getComputedStyle(document.body).getPropertyValue('--pos').trim()||'#10b981';
  let negC=getComputedStyle(document.body).getPropertyValue('--neg').trim()||'#ef4444';
  let priC=getComputedStyle(document.body).getPropertyValue('--pri').trim()||'#6366f1';
  let gridC=getComputedStyle(document.body).getPropertyValue('--grid').trim()||'#e2e8f0';
  let textC=getComputedStyle(document.body).getPropertyValue('--txth').trim()||'#0f172a';
  setTimeout(()=>{
    Plotly.newPlot('corrHeatPlot',[{
      z:corrMatrix,x:facNames,y:facNames,type:'heatmap',
      colorscale:[[0,negC],[0.5,gridC],[1,priC]],
      zmin:-1,zmax:1,
      text:corrMatrix.map(row=>row.map(v=>v==null?'—':v.toFixed(2))),
      texttemplate:'%{text}',textfont:{size:10,color:textC},
      hovertemplate:'%{y} × %{x}<br>r = %{z:.3f}<extra></extra>',
      showscale:true,colorbar:{len:0.9,title:{text:'r',side:'right'},tickfont:{size:9},thickness:12}
    }],{...plotBg,
      xaxis:{...plotBg.xaxis,tickangle:-35,tickfont:{size:10},side:'bottom'},
      yaxis:{...plotBg.yaxis,tickfont:{size:10},autorange:'reversed'},
      margin:{l:150,r:60,t:20,b:110}
    },plotCfg);
  },0);
  // Insights row
  let insEl=document.getElementById('corrInsights');
  if(insEl){
    insEl.innerHTML=insights.length
      ?`<div style="padding:8px 10px;background:var(--surf);border-radius:6px;font-size:11px;color:var(--txt);line-height:1.8">${insights.join('<br>')}</div>`
      :`<div style="font-size:10px;color:var(--txt)">No high-correlation pairs in selected window</div>`;
  }
}
function exportCorrCsv(){
  let ex=window._corrExport;
  if(!ex||!ex.facNames||!ex.corrMatrix){return;}
  let lines=[];
  // Header row: blank corner + factor names
  lines.push(['',...ex.facNames.map(n=>`"${(n||'').replace(/"/g,'""')}"`)].join(','));
  ex.facNames.forEach((row,i)=>{
    let cells=ex.corrMatrix[i].map(v=>v==null?'':v.toFixed(3));
    lines.push([`"${(row||'').replace(/"/g,'""')}"`,...cells].join(','));
  });
  let blob=new Blob([lines.join('\n')],{type:'text/csv'});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');a.href=url;
  a.download=((cs&&(cs.name||cs.id))||'strategy')+'_factor_correlation_'+ex.period+'_'+ex.freq+'.csv';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),100);
}

    let a=+(f.a||0),c=+(f.c||0);
    let ow=a>=0;
    let bg=ow?'rgba(34,197,94,0.12)':'rgba(239,68,68,0.12)';
    let bd=ow?'rgba(34,197,94,0.45)':'rgba(239,68,68,0.45)';
    let accent=ow?'var(--pos)':'var(--neg)';
    return `<span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:${bg};border:1px solid ${bd};font-size:11px"><span style="color:var(--txth);font-weight:600">${f.n}</span><span style="color:${accent};font-weight:600">${fp(a,2)}\u03c3</span><span style="color:var(--txt)">${f2(c,1)}% TE</span></span>`;
  }).join('');
}

function rFacButt(s){
  rFacTopTeStrip(s);
  // Single-trace diverging bar: f.a (active exposure) only
  // Positive f.a → bar extends RIGHT, negative → LEFT. Not portfolio vs benchmark.
  let facs=(s.factors||[]).filter(f=>f&&f.n&&isFinite(f.a));
  if(!facs.length){let el=document.getElementById('facButtDiv');if(el)el.innerHTML='<p style="color:var(--txt);font-size:12px;text-align:center;padding:60px">No factor exposure data</p>';return;}
  let names=facs.map(f=>f.n);
  let vals=facs.map(f=>+(f.a).toFixed(3));
  let cData=facs.map(f=>[isFinite(f.c)?f2(f.c,1):'—', isFinite(f.dev)?fp(f.dev,2):'—']);
  let maxE=Math.max(...vals.map(Math.abs),0.3);
  let xmax=Math.ceil(maxE*10)/10+0.2;
  let tvStep=xmax>1?0.5:xmax>0.5?0.2:0.1;
  let tickVals=[0],tickText=['0'];
  for(let v=tvStep;v<=xmax+0.001;v=Math.round((v+tvStep)*100)/100){
    tickVals.push(v,-v);tickText.push(v.toFixed(1),v.toFixed(1));
  }
  let h=Math.max(480,facs.length*30+60);
  let el=document.getElementById('facButtDiv');
  if(el)el.style.height=h+'px';
  let T=THEME();
  let posColor=getComputedStyle(document.body).getPropertyValue('--pos').trim()||'#22c55e';
  let negColor=getComputedStyle(document.body).getPropertyValue('--neg').trim()||'#ef4444';
  Plotly.newPlot('facButtDiv',[{
    name:'Active Exposure',type:'bar',orientation:'h',
    y:names,x:vals,customdata:cData,
    marker:{color:vals.map(v=>v>=0?posColor:negColor)},
    hovertemplate:'<b>%{y}</b><br>Active Exposure: %{x:.3f}\u03c3<br>TE Contrib: %{customdata[0]}%<br>Factor σ: %{customdata[1]}<extra></extra>'
  }],{
    paper_bgcolor:'transparent',plot_bgcolor:'transparent',
    font:{family:'Inter',color:T.tick,size:11},
    height:h,
    margin:{l:10,r:20,t:10,b:30},
    yaxis:{gridcolor:T.grid,zeroline:false,autorange:'reversed',
           tickfont:{size:10,color:T.tickH},automargin:true},
    xaxis:{gridcolor:T.grid,zeroline:true,zerolinecolor:T.zero,zerolinewidth:2,
           range:[-xmax,xmax],tickmode:'array',tickvals:tickVals,ticktext:tickText,
           tickfont:{color:T.tick,size:9},title:'Active Exposure'},
    showlegend:false
  },plotCfg);
  if(el&&el.on){el.on('plotly_click',function(d){if(d&&d.points&&d.points[0]&&typeof oDrF==='function')oDrF(d.points[0].y);});}
}

function rCountryMap(s){
  if(!s.countries||!s.countries.length)return;
  let mapped=s.countries.filter(c=>COUNTRY_ISO3[c.n]);
  if(!mapped.length)return;
  let T=THEME();
  let mode=_mapColorMode||'active';
  let agg=aggregateCountryRisk(s);
  let getVal,title,diverge=true,scale;
  if(mode==='active'){
    getVal=c=>c.a||0;title='Active %';
    scale=[[0,'#d67272'],[0.5,T.heatMid],[1,'#10b981']];
  }else if(mode==='port'){
    getVal=c=>c.p||0;title='Port %';diverge=false;
    scale=[[0,T.heatMid],[1,'#6366f1']];
  }else if(mode==='bench'){
    getVal=c=>c.b||0;title='BM %';diverge=false;
    scale=[[0,T.heatMid],[1,'#8b5cf6']];
  }else if(mode==='te'){
    getVal=c=>(agg[c.n]?.tr||0);title='TE Contrib %';diverge=false;
    scale=[[0,T.heatMid],[0.5,'#f59e0b'],[1,'#ef4444']];
  }else if(mode==='specific'){
    getVal=c=>(agg[c.n]?.mcr||0);title='Specific Risk %';diverge=false;
    scale=[[0,T.heatMid],[0.5,'#f59e0b'],[1,'#ef4444']];
  }else if(mode==='factor_te'){
    getVal=c=>{let r=agg[c.n];return r?(r.tr-r.mcr):0;};title='Factor Risk %';
    scale=[[0,'#d67272'],[0.5,T.heatMid],[1,'#10b981']];
  }else if(mode.startsWith('fc:')){
    let facName=mode.slice(3);
    let param=_mapFacParam||'exp';
    if(param==='contr'){
      getVal=c=>{let r=agg[c.n];return r?.facContr[facName]||0;};
      title=facName+' Contr';
    }else{
      getVal=c=>{let r=agg[c.n];if(!r)return 0;let fc=r.facContr[facName];if(fc==null)return 0;return r.p>0?fc/r.p:0;};
      title=facName+' Exp';
    }
    scale=[[0,'#d67272'],[0.5,T.heatMid],[1,'#10b981']];
  }else{
    getVal=c=>c.a||0;title='Active %';
    scale=[[0,'#d67272'],[0.5,T.heatMid],[1,'#10b981']];
  }
  let vals=mapped.map(getVal);
  let absMax=Math.max(...vals.map(Math.abs),0.01);
  let reg=MAP_REGIONS[_mapRegion]||MAP_REGIONS.world;
  Plotly.newPlot('countryMapDiv',[{
    type:'choropleth',
    locations:mapped.map(c=>COUNTRY_ISO3[c.n]),
    z:vals,text:mapped.map(c=>c.n),
    colorscale:scale,
    zmid:diverge?0:undefined,
    zmin:diverge?-absMax:undefined,
    zmax:diverge?absMax:undefined,
    colorbar:{title:title,ticksuffix:'%',len:0.6,thickness:12,
      tickfont:{color:T.tick,size:10},titlefont:{color:T.tick,size:10}},
    marker:{line:{color:T.grid,width:0.5}},
    hovertemplate:'%{text}<br>'+title+': %{z:.2f}%<extra></extra>'
  }],{
    geo:{
      bgcolor:'transparent',showframe:false,
      showcoastlines:true,coastlinecolor:T.grid,
      showland:true,landcolor:T.land,
      showocean:true,oceancolor:T.ocean,
      showlakes:false,
      projection:{type:'natural earth'},
      center:{lon:reg.lon,lat:reg.lat},
      lonaxis:{range:[reg.lon-180/reg.scale,reg.lon+180/reg.scale]},
      lataxis:{range:[reg.lat-90/reg.scale,reg.lat+90/reg.scale]}
    },
    paper_bgcolor:'transparent',
    margin:{l:0,r:0,t:0,b:0},height:320
  },plotCfg);
  document.getElementById('countryMapDiv').on('plotly_click',function(data){
    if(data.points&&data.points.length)oDrCountry(data.points[0].text);
  });
}

// ===== HOLDINGS TREEMAP (#7 from GAP_INVENTORY) — dim/size/color/drill =====
let _treeDim='sec',_treeSize='wt',_treeColor='active',_treeDrill=null;
function setTreeDim(d){if(d===_treeDim)return;_treeDim=d;_treeDrill=null;if(cs)rTree(cs);}
function setTreeSize(s){if(s===_treeSize)return;_treeSize=s;if(cs)rTree(cs);}
function setTreeColor(c){if(c===_treeColor)return;_treeColor=c;if(cs)rTree(cs);}
function treeDrillInto(name){_treeDrill=name;if(cs)rTree(cs);}
function treeDrillBack(){_treeDrill=null;if(cs)rTree(cs);}
function _treeRankColor(q){
  let r=Math.round(q);
  return r<=1?'#10b981':r===2?'#34d399':r===3?'#f59e0b':r===4?'#fb923c':'#ef4444';
}
function _refreshTreeToolbar(){
  document.querySelectorAll('#treeDimWrap [data-dim]').forEach(b=>b.classList.toggle('active',b.dataset.dim===_treeDim));
  document.querySelectorAll('#treeSizeWrap [data-sz]').forEach(b=>b.classList.toggle('active',b.dataset.sz===_treeSize));
  document.querySelectorAll('#treeColorWrap [data-cl]').forEach(b=>b.classList.toggle('active',b.dataset.cl===_treeColor));
}
function rTree(s){
  if(!s||!s.hold||!s.hold.length){let el=document.getElementById('treeDiv');if(el)el.innerHTML='<p style="color:var(--txt);font-size:12px;text-align:center;padding:60px">No holdings to visualize</p>';return;}
  _refreshTreeToolbar();
  let keyFn={
    sec:h=>h.sec,
    co:h=>h.co,
    grp:h=>h.subg||null,
    rank:h=>h.over!=null?'Q'+Math.round(h.over):null
  }[_treeDim];
  let buckets={};
  s.hold.forEach(h=>{
    if(isCash(h))return;
    let k=keyFn(h);if(!k)return;
    if(!buckets[k])buckets[k]={items:[],count:0,wt:0,te:0,active:0,rankSum:0,rankN:0};
    let b=buckets[k];
    b.items.push(h);
    b.count++;
    b.wt+=h.p||0;
    b.te+=Math.abs(h.tr||0);
    b.active+=h.a||0;
    if(h.over!=null){b.rankSum+=h.over*(h.p>0?h.p:1);b.rankN+=(h.p>0?h.p:1);}
  });
  let sizeOf=b=>_treeSize==='wt'?b.wt:_treeSize==='te'?b.te:b.count;
  let posC=getComputedStyle(document.body).getPropertyValue('--pos').trim()||'#10b981';
  let negC=getComputedStyle(document.body).getPropertyValue('--neg').trim()||'#ef4444';
  let bucketColor=b=>{
    if(_treeColor==='rank'){let q=b.rankN>0?b.rankSum/b.rankN:3;return _treeRankColor(q);}
    return b.active>=0?posC:negC;
  };
  let labels=[],parents=[],values=[],colors=[],cds=[];
  let T=THEME();
  if(_treeDrill&&buckets[_treeDrill]){
    let b=buckets[_treeDrill];
    labels.push(_treeDrill);parents.push('');values.push(0);colors.push(T.card);cds.push(_treeDrill+' (root)');
    let items=[...b.items].sort((x,y)=>{
      let sx=_treeSize==='wt'?(x.p||0):_treeSize==='te'?Math.abs(x.tr||0):1;
      let sy=_treeSize==='wt'?(y.p||0):_treeSize==='te'?Math.abs(y.tr||0):1;
      return sy-sx;
    }).slice(0,80); // cap to top 80 for performance
    items.forEach(h=>{
      let val=_treeSize==='wt'?(h.p||0):_treeSize==='te'?Math.abs(h.tr||0):1;
      if(val<=0)return;
      let cc=_treeColor==='rank'&&h.over!=null?_treeRankColor(h.over):(h.a||0)>=0?'#10b981':'#ef4444';
      labels.push(h.t);parents.push(_treeDrill);values.push(+val.toFixed(4));colors.push(cc);
      cds.push(`<b>${h.n||h.t}</b> (${h.t})<br>Weight: ${f2(h.p,2)}%<br>Active: ${fp(h.a,2)}<br>TE: ${f2(Math.abs(h.tr||0),2)}%<br>Rank: ${h.over!=null?'Q'+Math.round(h.over):'\u2014'}`);
    });
  }else{
    labels.push('Portfolio');parents.push('');values.push(0);colors.push(T.card);cds.push('Portfolio');
    let entries=Object.entries(buckets).sort((a,b)=>sizeOf(b[1])-sizeOf(a[1]));
    entries.forEach(([k,b])=>{
      let val=Math.max(sizeOf(b),0.01);
      labels.push(k);parents.push('Portfolio');values.push(+val.toFixed(2));colors.push(bucketColor(b));
      let avgQ=b.rankN>0?(b.rankSum/b.rankN).toFixed(1):'\u2014';
      cds.push(`<b>${k}</b><br>Holdings: ${b.count}<br>Weight: ${f2(b.wt,1)}%<br>Active: ${fp(b.active,1)}<br>TE: ${f2(b.te,1)}%<br>Avg Rank: ${avgQ}<br><i>Click to drill</i>`);
    });
  }
  Plotly.purge('treeDiv');
  Plotly.newPlot('treeDiv',[{type:'treemap',labels,parents,values,
    marker:{colors,line:{width:1,color:T.grid}},textfont:{size:11,color:T.tickH},
    customdata:cds,hovertemplate:'%{customdata}<extra></extra>',branchvalues:'total'
  }],{...plotBg,margin:{l:5,r:5,t:5,b:5},height:360},plotCfg);
  let div=document.getElementById('treeDiv');
  if(div&&div.on)div.on('plotly_treemapclick',function(d){
    if(!d||!d.points||!d.points.length)return false;
    let pt=d.points[0],label=pt.label;
    if(label==='Portfolio')return false;
    if(_treeDrill){
      // already drilled — clicking a holding opens stock detail
      let h=s.hold.find(x=>x.t===label);
      if(h&&typeof oSt==='function'){oSt(h.t);}
      return false;
    }
    // click a bucket → drill in
    treeDrillInto(label);
    return false;
  });
  let bc=document.getElementById('treeBreadcrumb');
  if(bc){
    if(_treeDrill){
      let dimLbl={sec:'Sector',co:'Country',grp:'Group',rank:'Rank'}[_treeDim]||_treeDim;

function exportMcrCsv(){

function toggleDtNode(id){
  let el=document.getElementById(id);if(!el)return;
  let open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  let p=el.previousElementSibling;
  if(p){let a=p.querySelector('.dt-arrow');if(a)a.textContent=open?'▸':'▾';}
}
function mkNode(id,label,val,pct,color,kids){
  let hasK=kids&&kids.length;
  let arrow=hasK?'<span class="dt-arrow" style="cursor:pointer;user-select:none;font-size:11px;color:var(--txt);width:14px;display:inline-block">▸</span>'
    :'<span style="width:14px;display:inline-block"></span>';
  let kidsHtml=hasK?'<div id="'+id+'" style="display:none;margin-left:20px">'+kids.join('')+'</div>':'';
  return'<div style="margin-bottom:1px">'+
    '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;'+(hasK?'cursor:pointer':'')+'"'+(hasK?' onclick="toggleDtNode(\''+id+'\')"':'')+'>'+
      arrow+
      '<span style="flex:1;font-size:12px;color:var(--txth)">'+label+'</span>'+
      '<span style="font-size:12px;font-weight:600;color:'+color+';min-width:55px;text-align:right">'+val+'</span>'+
      '<div style="width:60px;background:var(--grid);border-radius:2px;height:3px;overflow:hidden">'+
        '<div style="height:100%;background:'+color+';width:'+Math.min(Math.max(pct,1),100)+'%;border-radius:2px"></div>'+
      '</div>'+
      '<span style="font-size:10px;color:var(--txt);min-width:35px;text-align:right">'+f2(pct,0)+'%</span>'+
    '</div>'+
    kidsHtml+
  '</div>';
}
function riskDecompTree(s,factorRisk,idioRisk){
  let te=s.sum.te;if(!te)return'';
  let facPct=+(factorRisk/te*100).toFixed(1);
  let idioPct=+(idioRisk/te*100).toFixed(1);
  let grpMap={valGrowth:[],mktBehavior:[],profitability:[],secondary:[]};
  let other=[];
  s.factors.forEach(f=>{
    let placed=false;
    for(let[k,v]of Object.entries(FAC_GROUPS)){
      if(k==='all'||!v)continue;
      if(v.some(g=>f.n.toLowerCase().includes(g.toLowerCase())||g.toLowerCase().includes(f.n.toLowerCase()))){
        grpMap[k].push(f);placed=true;break;
      }
    }
    if(!placed)other.push(f);
  });
  if(other.length)grpMap.other=other;
  let grpLabels={valGrowth:'Value / Growth',mktBehavior:'Market Behavior',profitability:'Profitability',secondary:'Secondary',other:'Other'};
  let facKids=Object.entries(grpMap).filter(([,facs])=>facs.length).map(([grp,facs])=>{
    let grpC=facs.reduce((a,f)=>a+Math.abs(f.c||0),0);
    let kids=facs.sort((a,b)=>Math.abs(b.c||0)-Math.abs(a.c||0)).map((f,i)=>
      mkNode('dt_f_'+grp+'_'+i,f.n,fp(f.a,2)+' exp',Math.abs(f.c||0),'#818cf8',null)
    );
    return mkNode('dt_g_'+grp,grpLabels[grp]||grp,f2(grpC,1)+'%',grpC,'#6366f1',kids);
  });
  let topH=[...s.hold].filter(h=>!isCash(h)).sort((a,b)=>Math.abs(b.tr||0)-Math.abs(a.tr||0)).slice(0,7);
  let idioKids=topH.map((h,i)=>
    mkNode('dt_h_'+i,(h.t||'?')+' \u2014 '+(h.n||'').slice(0,25),f2(h.tr,2)+'%',Math.min(Math.abs(h.tr||0)*10,100),'#f59e0b',null)
  );
  let factorNode=mkNode('dt_factor','Factor Risk',f2(factorRisk,2)+'%',facPct,'#06b6d4',facKids);
  let idioNode=mkNode('dt_idio','Stock-Specific Risk',f2(idioRisk,2)+'%',idioPct,'#f59e0b',idioKids);
  return'<div class="card" style="margin-bottom:16px">'+
    '<div class="card-title">Risk Decomposition Tree</div>'+
    '<div style="padding:4px 0">'+
      '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--grid);margin-bottom:8px">'+
        '<span style="font-size:13px;font-weight:700;color:var(--txth)">Total Risk (TE)</span>'+
        '<span style="font-size:20px;font-weight:700;color:'+(te>7?'var(--neg)':te>5?'var(--warn)':'var(--txth)')+'">'+f2(te,2)+'%</span>'+
      '</div>'+
      factorNode+idioNode+
    '</div>'+
  '</div>';
}

// Historical Trends mini-charts (Risk tab top) — 4 sparklines: TE / Active Share / Beta / Holdings
function riskHistoricalTrends(s){
  let hist=s.hist&&s.hist.sum||[];
  if(!hist.length)return '';
  let cur=hist[hist.length-1];
  let prev=hist.length>=2?hist[hist.length-2]:null;
  let metrics=[
    {key:'te',id:'miniTE',label:'Tracking Error',fmt:v=>v!=null?f2(v,1)+'%':'—',drill:"oDrMetric('te')",color:'var(--pri)',dir:'neg'},
    {key:'as',id:'miniAS',label:'Active Share',fmt:v=>v!=null?f2(v,1)+'%':'—',drill:"oDrMetric('as')",color:'var(--acc)',dir:'neutral'},
    {key:'beta',id:'miniBeta',label:'Beta',fmt:v=>v!=null?f2(v,2):'—',drill:"oDrMetric('beta')",color:'var(--cyan)',dir:'neutral'},
    {key:'h',id:'miniH',label:'Holdings',fmt:v=>v!=null?String(v):'—',drill:null,color:'var(--txth)',dir:'neutral'}
  ];
  let cards=metrics.map(m=>{
    let cv=cur[m.key],pv=prev?prev[m.key]:null;
    let d=cv!=null&&pv!=null?+(cv-pv).toFixed(m.key==='beta'?3:2):null;
    let showD=d!=null&&Math.abs(d)>(m.key==='beta'?0.001:0.01);
    let col=showD?(m.dir==='neg'?(d>0?'var(--neg)':'var(--pos)'):'var(--txt)'):'var(--txt)';
    let arrow=showD?(d>0?'\u2191':'\u2193'):'';
    let dTxt=showD?(d>0?'+':'')+(m.key==='h'?Math.round(d):d.toFixed(m.key==='beta'?3:2)):'';
    let clk=m.drill?`onclick="${m.drill}" style="cursor:pointer"`:'style="cursor:default"';
    return `<div ${clk}>
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:var(--txt);font-weight:600">${m.label}</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-top:2px">
        <span style="font-size:18px;font-weight:700;color:${m.color}">${m.fmt(cv)}</span>
        ${showD?`<span style="font-size:10px;color:${col};font-weight:600">${arrow}${dTxt}</span>`:''}
      </div>
      <div id="${m.id}" style="height:48px;margin-top:4px"></div>
    </div>`;
  }).join('');
  return `<div class="card" id="cardRiskHistTrends" style="margin-bottom:16px">
    <div class="card-title" style="margin-bottom:10px">Historical Trends <span style="font-size:10px;color:var(--txt);font-weight:400;margin-left:8px">${hist.length} week${hist.length===1?'':'s'}</span>${hist.length<2?'<span style="font-size:10px;color:var(--warn);margin-left:8px">· Need ≥2 weeks for sparklines</span>':''}</div>
    <div style="display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:16px">${cards}</div>
  </div>`;
}

}

function rRisk(){
  let s=cs;
  let totalTE=s.sum.te;
  let facContribs=s.factors.map(f=>Math.abs(f.c||0));
  let totalFacContrib=facContribs.reduce((a,v)=>a+v,0);
  let factorRisk=+(totalTE*Math.min(totalFacContrib/100*1.2,0.85)).toFixed(2);
  let idioRisk=+(totalTE-factorRisk).toFixed(2);
  let factorPct=+(factorRisk/totalTE*100).toFixed(1);
  let idioPct=+(idioRisk/totalTE*100).toFixed(1);

  // Factor MCR data (sorted by |c| desc, no idiosyncratic)
  let facMCR=s.factors.map(f=>{
    let contrib=Math.abs(f.c||0);
    let mcrTE=+(totalTE*contrib/100).toFixed(3);
    let devPct=f.dev!=null&&totalTE>0?+(f.dev/totalTE*100).toFixed(1):null;
    return{n:f.n,e:f.a,c:f.c,mcrTE,ret:f.ret,imp:f.imp,dev:f.dev,devPct};

function rTEStackedArea(s,factorRisk,idioRisk){
  let hist=s.hist.sum;
  if(!hist.length)return;
  let te=s.sum.te||1;
  let idioFrac=te>0?idioRisk/te:0.5;
  let facFrac=1-idioFrac;
  let dates=hist.map(h=>isoDate(h.d));
  let teVals=hist.map(h=>h.te);
  // Normalize per data point so factor+idio sum exactly to te
  let idioVals=hist.map(h=>{
    let raw_s=h.pct_specific!=null?h.pct_specific:idioFrac*100;
    let raw_f=h.pct_factor!=null?h.pct_factor:facFrac*100;
    let tot=raw_s+raw_f||100;
    return +(h.te*(raw_s/tot)).toFixed(3);
  });
  let facVals=hist.map((h,i)=>+(h.te-idioVals[i]).toFixed(3));
  Plotly.newPlot('teStackedDiv',[
    {x:dates,y:idioVals,name:'Idiosyncratic (Stock-Specific)',type:'scatter',mode:'lines',
      fill:'tozeroy',fillcolor:'rgba(245,158,11,0.25)',line:{color:'rgba(245,158,11,0.8)',width:1},
      stackgroup:'te',hovertemplate:'Stock-Specific: %{y:.2f}%<extra></extra>'},
    {x:dates,y:facVals,name:'Factor',type:'scatter',mode:'lines',
      fill:'tonexty',fillcolor:'rgba(6,182,212,0.22)',line:{color:'rgba(6,182,212,0.65)',width:1},
      stackgroup:'te',hovertemplate:'Factor: %{y:.2f}%<extra></extra>'},
    {x:dates,y:teVals,name:'Total TE',type:'scatter',mode:'lines',
      line:{color:THEME().tickH,width:2.5},fill:'none',
      hovertemplate:'%{x|%b %d %Y} — TE: %{y:.2f}%<extra></extra>'}
  ],{...plotBg,
    xaxis:{...plotBg.xaxis,rangeslider:{visible:true,bgcolor:THEME().card,bordercolor:'#6366f1',borderwidth:1,thickness:0.04},tickformat:'%b %Y',nticks:8},
    yaxis:{...plotBg.yaxis,title:'TE %',zeroline:false},
    legend:{orientation:'h',y:1.12,font:{size:11}},
    hovermode:'x unified'
  },{...plotCfg,scrollZoom:true});
}

function rMultiBeta(s){
  let hist=s.hist.sum;
  if(!hist.length)return;
  let dates=hist.map(h=>isoDate(h.d));
  let betaVals=hist.map(h=>h.beta);
  // Main line: realized beta time series (solid, thick)
  let traces=[
    {x:dates,y:betaVals,name:'Beta',type:'scatter',mode:'lines',
      line:{color:'#6366f1',width:2.5},
      hovertemplate:'%{x|%b %Y}<br>Beta: %{y:.3f}<extra></extra>'}
  ];
  // Reference lines from betas object (thin, dotted/dashed)
  let betas=s.sum.betas||{};
  let d0=dates[0],dN=dates[dates.length-1];
  if(betas.predicted!=null){
    traces.push({x:[d0,dN],y:[betas.predicted,betas.predicted],
      name:'Predicted ('+f2(betas.predicted,3)+')',type:'scatter',mode:'lines',
      line:{color:'#10b981',width:1.5,dash:'dot'},
      hovertemplate:'Predicted: '+f2(betas.predicted,3)+'<extra></extra>'});
  }
  if(betas.historical!=null){
    traces.push({x:[d0,dN],y:[betas.historical,betas.historical],
      name:'Hist Ref ('+f2(betas.historical,3)+')',type:'scatter',mode:'lines',
      line:{color:THEME().tick,width:1.5,dash:'dot'},
      hovertemplate:'Hist Ref: '+f2(betas.historical,3)+'<extra></extra>'});
  }
  if(betas.mpt!=null){
    traces.push({x:[d0,dN],y:[betas.mpt,betas.mpt],
      name:'MPT ('+f2(betas.mpt,3)+')',type:'scatter',mode:'lines',
      line:{color:'#8b5cf6',width:1.5,dash:'dashdot'},
      hovertemplate:'MPT: '+f2(betas.mpt,3)+'<extra></extra>'});
  }
  let betaAnnotations=[];
  if(betas.predicted!=null)betaAnnotations.push({x:1,xref:'paper',y:betas.predicted,yref:'y',text:'Predicted',showarrow:false,font:{size:9,color:'#10b981'},xanchor:'left',xshift:6});
  if(betas.historical!=null)betaAnnotations.push({x:1,xref:'paper',y:betas.historical,yref:'y',text:'Hist Avg',showarrow:false,font:{size:9,color:THEME().tick},xanchor:'left',xshift:6});
  if(betas.mpt!=null)betaAnnotations.push({x:1,xref:'paper',y:betas.mpt,yref:'y',text:'MPT',showarrow:false,font:{size:9,color:'#8b5cf6'},xanchor:'left',xshift:6});
  Plotly.newPlot('riskBetaMultiDiv',traces,{...plotBg,
    yaxis:{...plotBg.yaxis,title:'Beta'},
    xaxis:{...plotBg.xaxis,tickformat:'%b %Y',nticks:6},
    legend:{orientation:'h',y:1.12,font:{size:10}},
    annotations:betaAnnotations,
    margin:{...plotBg.margin,r:70}
  },plotCfg);
}

function rRiskFacBarsMode(){
  let allFacMCR=window._rfbData||[];
  let mode=window._rfbMode||'te';
  if(!allFacMCR.length)return;
  // Update toggle button styling
  document.querySelectorAll('#rfbLblTE,#rfbLblExp,#rfbLblBoth').forEach(el=>{
    el.style.background='var(--surf)';el.style.color='var(--txt)';
  });
  let activeEl=document.getElementById(mode==='te'?'rfbLblTE':mode==='exp'?'rfbLblExp':'rfbLblBoth');
  if(activeEl){activeEl.style.background='var(--pri)';activeEl.style.color='#fff';}

  // Apply checkbox filter; fallback to all if nothing checked
  let selChks=[...document.querySelectorAll('.fac-bar-chk:checked')].map(el=>el.value);
  let facMCR=selChks.length?allFacMCR.filter(f=>selChks.includes(f.n)):allFacMCR;
  if(!facMCR.length)facMCR=allFacMCR;

  let traces=[];
  let layout={...plotBg,yaxis:{...plotBg.yaxis,autorange:'reversed'},margin:{l:140,r:80,t:10,b:40}};

  // Profitability bar color helper
  let facBarColor=f=>f.n==='Profitability'?((f.e??0)>=0?'#fb923c':'#fb923c'):(f.e??0)>=0?'#6366f1':'#a78bfa';
  let facShadowColor=f=>f.n==='Profitability'?'rgba(251,146,60,0.15)':(f.e??0)>=0?'rgba(99,102,241,0.15)':'rgba(167,139,250,0.15)';

  if(mode==='te'){
    let hasDev=facMCR.some(f=>f.devPct!=null&&f.devPct>0);
    if(hasDev){
      // Shadow bar showing factor return std dev — lighter opacity
      traces.push({
        y:facMCR.map(f=>f.n),x:facMCR.map(f=>Math.max(f.devPct||0,Math.abs(f.c||0))),type:'bar',orientation:'h',
        name:'Factor σ',marker:{color:facMCR.map(facShadowColor)},showlegend:false,
        hovertemplate:'%{y}<br>Factor σ: %{x:.1f}% of TE<extra></extra>'
      });
    }
    traces.push({
      y:facMCR.map(f=>f.n),x:facMCR.map(f=>Math.abs(f.c||0)),type:'bar',orientation:'h',name:'TE Contrib',
      marker:{color:facMCR.map(facBarColor)},
      text:facMCR.map(f=>f2(Math.abs(f.c||0),1)+'%'),textposition:'outside',textfont:{size:10,color:THEME().tick},
      hovertemplate:'%{y}<br>TE Contribution: %{x:.1f}% of total TE<br>%{customdata}<extra></extra>',
      customdata:facMCR.map(f=>f.n==='Profitability'?'Intentional — higher is desired':'')
    });
    layout.xaxis={...plotBg.xaxis,title:'% of Total TE'};
    if(hasDev)layout.barmode='overlay';
  } else if(mode==='exp'){
    let styleFacs=facMCR.filter(f=>FAC_PRIMARY.has(f.n));
    traces=[{
      y:styleFacs.map(f=>f.n),x:styleFacs.map(f=>f.e||0),type:'bar',orientation:'h',name:'Active Exposure',
      marker:{color:styleFacs.map(facBarColor)},
      text:styleFacs.map(f=>fp(f.e,2)),textposition:'outside',textfont:{size:10,color:THEME().tick},
      hovertemplate:'%{y}<br>Active Exposure: %{x:.2f}<extra></extra>'
    }];
    layout.xaxis={...plotBg.xaxis,title:'Active Factor Exposure',zeroline:true,zerolinecolor:THEME().zero,zerolinewidth:1.5};
  } else {
    // Both — dual x-axis: bottom = Active Exposure, top = % of TE
    let styleFacs=facMCR.filter(f=>FAC_PRIMARY.has(f.n));
    traces=[
      {y:styleFacs.map(f=>f.n),x:styleFacs.map(f=>f.e||0),type:'bar',orientation:'h',name:'Active Exposure',xaxis:'x',
        marker:{color:'rgba(99,102,241,0.75)'},
        text:styleFacs.map(f=>fp(f.e,2)),textposition:'outside',textfont:{size:9,color:THEME().tick},
        hovertemplate:'%{y}<br>Exposure: %{x:.2f}<extra></extra>'},
      {y:styleFacs.map(f=>f.n),x:styleFacs.map(f=>Math.abs(f.c||0)),type:'bar',orientation:'h',name:'TE Contrib %',xaxis:'x2',
        marker:{color:'rgba(245,158,11,0.75)'},
        text:styleFacs.map(f=>f2(Math.abs(f.c||0),1)+'%'),textposition:'outside',textfont:{size:9,color:THEME().tick},
        hovertemplate:'%{y}<br>TE Contrib: %{x:.1f}% of TE<extra></extra>'}
    ];
    layout.xaxis={...plotBg.xaxis,title:'Active Exposure',anchor:'y'};
    layout.xaxis2={...plotBg.xaxis,title:'% of Total TE',side:'top',overlaying:'x',zeroline:false,showgrid:false};
    layout.barmode='group';
    layout.legend={orientation:'h',y:1.18,font:{size:10}};
    layout.margin={l:140,r:80,t:50,b:40};
  }

  let nFacs=mode==='exp'||mode==='both'?facMCR.filter(f=>FAC_PRIMARY.has(f.n)).length:facMCR.length;
  document.getElementById('riskFacBarDiv').style.height=Math.max(200,nFacs*40+20)+'px';
  Plotly.newPlot('riskFacBarDiv',traces,layout,plotCfg);

  // Profitability alert: check if active exposure decreased vs previous period
  let profAlert=document.getElementById('profAlert');
  if(profAlert){
    let profHist=cs?.hist?.fac?.['Profitability']||cs?.hist?.fac?.['profitability']||[];
    if(profHist.length>=2){
      let prev=profHist[profHist.length-2];let curr=profHist[profHist.length-1];
      let pe=prev.a??prev.e??0;let ce=curr.a??curr.e??0;
      profAlert.style.display=(ce<pe-0.05)?'block':'none';
    } else {profAlert.style.display='none';}
  }
}

// Factor group pill handler
const FAC_GROUPS={
  all:null,
  valGrowth:['Value','Growth','Dividend Yield','Earnings Variability','Earnings Yield'],
  mktBehavior:['Momentum','Momentum (Medium-Term)','Market Sensitivity','Volatility'],

function setFacGroup(group,btn){

function updateFacExpChart(){
  let s=cs;
  let allFacs=window._riskAllFacs||[];
  let facColors=window._riskFacColors||['#6366f1','#10b981','#a78bfa','#ef4444','#8b5cf6','#38bdf8','#ec4899'];
  let facHist=s.hist.fac||{};
  let traces=[];
  let colorIdx=0;

  // Style factor checkboxes
  let checkboxes=document.querySelectorAll('.fac-exp-chk');
  allFacs.forEach((f,i)=>{
    if(!FAC_PRIMARY.has(f.n))return;
    // Find the matching checkbox by data-fac attribute or positional fallback
    let chk=document.querySelector(`.fac-exp-chk[data-fac="${CSS.escape(f.n)}"]`)||checkboxes[i];
    if(!chk||!chk.checked)return;
    let hist=facHist[f.n];
    if(!hist||!hist.length)return;
    let col=facColors[colorIdx++%facColors.length];
    traces.push({
      x:hist.map(h=>isoDate(h.d)),y:hist.map(h=>h.bm!=null?+(h.e-h.bm).toFixed(4):(h.e||0)),name:f.n,
      line:{color:col,width:2},
      hovertemplate:f.n+'<br>%{x|%b %Y}<br>Exposure: %{y:.3f}<extra></extra>'
    });
  });

  // Non-primary group sub-checkboxes (Industry sectors, Country weights)
  document.querySelectorAll('.fac-sub-chk:checked').forEach(chk=>{
    let grp=chk.dataset.grp;
    let item=chk.dataset.item;
    let isIndustry=/industr/i.test(grp);
    let isCountry=/countr/i.test(grp);
    let col=facColors[colorIdx++%facColors.length];
    if(isIndustry){
      let secHist=(s.hist.sec||{})[item];
      if(secHist&&secHist.length){
        traces.push({x:secHist.map(h=>isoDate(h.d)),y:secHist.map(h=>+(h.a||0).toFixed(3)),name:item,
          line:{color:col,width:2,dash:'dot'},
          hovertemplate:item+'<br>%{x|%b %Y}<br>Active Wt: %{y:.2f}%<extra></extra>'});
      } else {
        // Synthetic from current weight
        let secCur=(s.sectors||[]).find(sec=>sec.n===item);
        let baseW=secCur?secCur.a||0:0;
        let dates=s.hist.sum.map(h=>isoDate(h.d));
        traces.push({x:dates,y:dates.map(()=>baseW),name:item+' (current)',
          line:{color:col,width:1.5,dash:'dot'},
          hovertemplate:item+'<br>Active Wt: %{y:.2f}% (no history)<extra></extra>'});
      }
    } else if(isCountry){
      let cData=(s.countries||[]).find(c=>c.n===item);
      let baseW=cData?cData.a||0:0;
      let dates=s.hist.sum.map(h=>isoDate(h.d));
      traces.push({x:dates,y:dates.map(()=>baseW),name:item,
        line:{color:col,width:1.5,dash:'dashdot'},
        hovertemplate:item+'<br>Active Wt: %{y:.2f}% (current only)<extra></extra>'});
    }
  });

  let el=document.getElementById('riskExpHistDiv');
  if(!el)return;
  if(!traces.length){
    try{Plotly.purge('riskExpHistDiv')}catch(e){}
    el.innerHTML='<p style="color:var(--txt);font-size:12px;padding:20px;text-align:center">No factors selected</p>';

// ===== INLINE SVG SPARKLINE =====
function mkSparkline(vals,w,h,color){
  if(!vals||vals.length<2)return`<span style="color:var(--txt);font-size:9px">—</span>`;
  let filtered=vals.filter(v=>v!=null);
  if(filtered.length<2)return`<span style="color:var(--txt);font-size:9px">—</span>`;
  let mn=Math.min(...filtered),mx=Math.max(...filtered);
  let range=mx-mn||0.001;
  let pts=filtered.map((v,i)=>{
    let x=(i/(filtered.length-1))*w;
    let y=h-((v-mn)/range)*(h-2)-1;
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  let lastV=filtered[filtered.length-1];
  let trend=filtered.length>=2?(lastV>filtered[0]?'var(--pos)':lastV<filtered[0]?'var(--neg)':'var(--txt)'):'var(--txt)';
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle">
    <polyline points="${pts}" fill="none" stroke="${color||trend}" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="${(filtered.length-1)/(filtered.length-1)*w}" cy="${(h-((lastV-mn)/range)*(h-2)-1).toFixed(1)}" r="2" fill="${color||trend}"/>
  </svg>`;
}

// Factor drill from Risk tab - shows time series chart
function oDrFRisk(name,range){
  let m=$('drillModal');
  let hist=cs.hist.fac[name]||[];
  let factor=cs.factors.find(f=>f.n===name);
  if(!factor)return;
  if(range!=null)_facDrillRange=range;
  let rangeWks={All:Infinity,'3Y':156,'1Y':52,'6M':26,'3M':13};
  let wks=rangeWks[_facDrillRange]||Infinity;
  let histSlice=wks===Infinity?hist:(hist.slice(-wks)||hist);
  if(!histSlice.length)histSlice=hist;

  // Compute this factor's risk contribution
  let totalTE=cs.sum.te;
  let mcrTE=+(totalTE*Math.abs(factor.c||0)/100).toFixed(3);

  let histHtml='';
  if(histSlice.length){
    let nm=name.replace(/'/g,"\\'");
    let rangeBtns=['3M','6M','1Y','3Y','All'].map(r=>`<button class="range-btn${_facDrillRange===r?' active':''}" onclick="oDrFRisk('${nm}','${r}')">${r}</button>`).join('');
    let hasRetData=histSlice.some(h=>h.ret!=null||h.imp!=null);

        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Active</th><th class="r">MCR</th></tr></thead>
        <tbody>${top5.map(h=>`<tr><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td><td class="r">${f2(h.mcr)}</td></tr>`).join('')}</tbody></table>
