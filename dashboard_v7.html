}

// ===== HOLDINGS INTELLIGENCE =====
function getHoldArchetype(h){
  if(!h.factor_contr)return null;
  let entries=Object.entries(h.factor_contr).filter(([,v])=>Math.abs(v)>0.01);
  if(!entries.length)return null;
  let top=entries.sort(([,a],[,b])=>Math.abs(b)-Math.abs(a))[0];
  if(!top)return null;
  let k=top[0].toLowerCase();
  if(k.includes('growth')||k.includes('momentum'))return{label:'Growth Engine',color:'#34d399',bg:'rgba(16,185,129,0.15)'};
  if(k.includes('value')||k.includes('dividend'))return{label:'Value Play',color:'#fbbf24',bg:'rgba(245,158,11,0.15)'};
  if(k.includes('volatil')||k.includes('sensitivity'))return{label:'Volatility Driver',color:'#f87171',bg:'rgba(239,68,68,0.15)'};
  if(k.includes('profit')||k.includes('quality'))return{label:'Quality Compounder',color:'#a78bfa',bg:'rgba(167,139,250,0.15)'};
  if(k.includes('market'))return{label:'Market Beta',color:THEME().tick,bg:'rgba(148,163,184,0.15)'};
  if(k.includes('country')||k.includes('region')||k.includes('industry')||k.includes('currency')||k.includes('local'))return{label:'Regional Driver',color:'#38bdf8',bg:'rgba(56,189,248,0.15)'};
  if(k.includes('size'))return{label:'Size Tilt',color:'#f59e0b',bg:'rgba(245,158,11,0.15)'};
  if(k.includes('liquid'))return{label:'Liquidity Play',color:'#14b8a6',bg:'rgba(20,184,166,0.15)'};
  if(k.includes('leverage'))return{label:'Leverage Play',color:'#ec4899',bg:'rgba(236,72,153,0.15)'};
  if(Math.abs(top[1])<0.1)return{label:'Diversifier',color:'#64748b',bg:'rgba(100,116,139,0.1)'};
  return null;
}

function genHoldSummary(h){
  if(!h)return'';
  let parts=[];
  let rankStr=h.r!=null?'Q'+h.r+'-ranked':'unranked';
  parts.push((h.n||h.t)+' ('+h.t+') is a '+rankStr+' '+(h.sec||'unclassified')+' holding');
  if(h.tr!=null)parts.push('contributing '+Math.abs(h.tr).toFixed(1)+'% of portfolio TE'+(Math.abs(h.tr)>3?' \u2014 a top risk driver':''));
  let topFac=h.factor_contr?Object.entries(h.factor_contr).sort(([,a],[,b])=>Math.abs(b)-Math.abs(a)).slice(0,2):[];
  if(topFac.length)parts.push('Factor profile driven by '+topFac.map(([k,v])=>k.replace('Medium-Term ','').replace(' Sensitivity','')+(v>=0?' +':' ')+v.toFixed(2)).join(' and '));
  let rbe=(Math.abs(h.a||0)>0.01&&Math.abs(h.tr||0)>0.01)?+(Math.abs(h.a)/Math.abs(h.tr)).toFixed(2):null;
  if(rbe!=null)parts.push('Risk Budget Efficiency '+(rbe>1.5?'is strong ('+rbe.toFixed(2)+')':rbe>0.8?'is proportional ('+rbe.toFixed(2)+')':'is low ('+rbe.toFixed(2)+') \u2014 carries more risk than active weight justifies'));
  return parts.join('. ')+'.';
}

function renderOneHoldCard(h){
  let expanded=_holdExpanded.has(h.t);
  let isBmOnly=(!h.p||h.p===0)&&h.b>0;
  let archetype=getHoldArchetype(h);
  let archPill=archetype?`<span style="font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;background:${archetype.bg};color:${archetype.color}">${archetype.label}</span>`:'';
  let flag=_holdFlags[h.t]||null;
  let flagBtn=`<button class="flag-btn${flag?' flagged':''}" data-ticker="${h.t}" style="background:none;border:none;cursor:pointer;font-size:14px;${flag?'color:'+FLAG_COLORS[flag]:'color:var(--txt)'};padding:2px 4px" onclick="cycleFlag('${h.t}',event)" title="${flag?'Flag: '+flag+' (click to cycle)':'Flag (watch/reduce/add)'}">${flag?FLAG_ICONS[flag]:'\u2691'}</button>`;
  let portPct=+(h.p||0),benchPct=+(h.b||0),active=+(h.a||0);
  let maxWt=Math.max(portPct,benchPct,1);
  let portBar=portPct>0?Math.min(portPct/maxWt*100,100).toFixed(1):0;
  let benchBar=benchPct>0?Math.min(benchPct/maxWt*100,100).toFixed(1):0;
  let actCol=active>=0?'var(--pos)':'var(--neg)';
  let te=+(h.tr||0),pctS=+(h.mcr||0);
  let rbe=(h.p>0&&Math.abs(h.tr||0)>0.001)?+(Math.abs(h.a||0)/Math.abs(h.tr)).toFixed(2):null;
  let rbeCol=rbe==null?'var(--txt)':rbe>1.5?'var(--pos)':rbe>=0.8?'var(--warn)':'var(--neg)';
  let shortName=(h.n||h.t).length>36?(h.n||h.t).slice(0,35)+'\u2026':(h.n||h.t);
  let rankCellsInline='';
  ['over','rev','val','qual'].forEach((k,i)=>{
    let lbl=['O','R','V','Q'][i];

    else{let c=rc(Math.round(v));rankCellsInline+=`<span style="font-size:10px;margin-right:6px"><span style="color:var(--txt)">${lbl}</span> <span style="color:${c};font-weight:600">Q${Math.round(v)}</span></span>`;}
  });
  let expandedHtml='';
  if(expanded){
    expandedHtml=`${_holdCardFactorBars(h)}<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--grid)"><div style="font-size:9px;color:var(--txt);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px;font-weight:600">Quick Summary</div><div style="font-size:11px;color:var(--txth);line-height:1.5">${genHoldSummary(h)}</div></div>`;
  }
  return `<div class="hold-card" data-hcard="${h.t}" style="background:var(--card);border:1px solid var(--grid);border-radius:8px;padding:10px 12px;${isBmOnly?'background:rgba(100,116,139,0.08);':''}position:relative;cursor:pointer" onclick="if(!event.target.closest('button,a'))oSt('${h.t}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:700;color:var(--txth);display:flex;align-items:center;gap:6px">${h.t}${isBmOnly?'<span style="background:var(--surf);color:var(--txt);font-size:9px;padding:1px 4px;border-radius:3px">BM</span>':''}</div>
        <div style="font-size:11px;color:var(--txth);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${h.n||''}">${shortName}</div>
      </div>
      ${flagBtn}
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin:4px 0 8px">
      ${h.sec?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:var(--surf);color:var(--txt)">${h.sec}</span>`:''}
      ${h.co?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:var(--surf);color:var(--txt)">${h.co}</span>`:''}
      ${archPill}
    </div>
    <div style="font-size:10px;margin-bottom:3px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
        <span style="width:36px;color:var(--txt)">Port</span>
        <div style="flex:1;height:6px;background:var(--surf);border-radius:3px"><div style="width:${portBar}%;height:100%;background:var(--pri);border-radius:3px"></div></div>
        <span style="width:44px;text-align:right;color:var(--txth);font-weight:600">${f2(portPct,1)}%</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
        <span style="width:36px;color:var(--txt)">Bench</span>
        <div style="flex:1;height:6px;background:var(--surf);border-radius:3px"><div style="width:${benchBar}%;height:100%;background:var(--acc);opacity:0.6;border-radius:3px"></div></div>
        <span style="width:44px;text-align:right;color:var(--txt)">${f2(benchPct,1)}%</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="width:36px;color:var(--txt)">Active</span>
        <span style="flex:1"></span>
        <span style="color:${actCol};font-weight:700;font-size:12px">${fp(active,1)}%</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;font-size:10px;padding:5px 0;border-top:1px solid var(--grid);border-bottom:1px solid var(--grid);margin:6px 0">
      <div><span style="color:var(--txt)">TE</span> <span style="color:var(--txth);font-weight:600">${f2(te,2)}%</span></div>
      <div><span style="color:var(--txt)">%S</span> <span style="color:var(--txth);font-weight:600">${f2(pctS,2)}</span></div>
      <div><span style="color:var(--txt)">RBE</span> <span style="color:${rbeCol};font-weight:600">${rbe==null?'\u2014':rbe.toFixed(2)}</span></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
      <div>${rankCellsInline}</div>
      <button onclick="event.stopPropagation();toggleHoldExpand('${h.t}')" style="background:none;border:1px solid var(--grid);border-radius:4px;color:var(--txt);font-size:10px;padding:2px 8px;cursor:pointer;font-family:inherit">${expanded?'\u25b2 Hide':'\u25bc Detail'}</button>
    </div>
    ${expandedHtml}
  </div>`;
}
function renderHoldCards(){

          <select id="secFilter" onchange="filterHold()" style="padding:4px 8px;background:var(--surf);border:1px solid var(--grid);color:var(--txth);border-radius:6px;font-size:11px;font-family:inherit" aria-label="Filter by sector">

        <span style="width:1px;height:16px;background:#334155;display:inline-block;margin:0 4px"></span>

      </div>
      ${fh.length===0 ? '<p style="color:var(--txt);font-size:12px;text-align:center;padding:24px">No holdings match your current filters. Try clearing the search box or sector/rank dropdowns.</p>' : (_holdView==='cards' ? renderHoldCards() : `<div style="overflow-x:auto">
        <table id="tbl-hold">
          <thead><tr>

          <button onclick="hp=Math.min(Math.ceil(fh.length/PPG),hp+1);renderHoldTab()" ${hp>=Math.ceil(fh.length/PPG)?'disabled':''}>Next</button>

    </div>

    <!-- Holdings Charts -->
    <div class="grid g2">
      <div class="card">
        <div class="card-title">Rank Distribution</div>

function renderHoldRows(){
  let start=(hp-1)*PPG;
  let page=fh.slice(start,start+PPG);
  // Max %T for bar scaling
  let maxTR=Math.max(...fh.map(h=>Math.abs(h.tr||0)),0.01);
  return page.map(h=>{
    let cls=activeStyle(h.a);
    let trVal=h.tr!=null?h.tr:0;
    let trBarW=Math.min(Math.abs(trVal)/maxTR*50,50).toFixed(0);
    let trCell=`<td class="r" style="white-space:nowrap">
      <div style="display:inline-flex;align-items:center;gap:3px;justify-content:flex-end">
        <span style="font-size:11px;${trVal>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(trVal,1)}</span>
        <div style="width:${trBarW}px;height:5px;background:${trVal>=0?'var(--pos)':'var(--neg)'};border-radius:2px;opacity:0.5;flex-shrink:0"></div>
      </div></td>`;
    // RBE
    let rbeVal=(h.p>0&&Math.abs(h.tr||0)>0.001)?+(Math.abs(h.a||0)/Math.abs(h.tr)).toFixed(2):null;
    h._rbe=rbeVal;
    let rbeCell=`<td class="r" style="border-left:1px solid rgba(239,68,68,0.15);background:rgba(239,68,68,0.04)">${rbeVal===null?'—':`<span style="font-weight:600;color:${rbeVal>1.5?'var(--pos)':rbeVal>=0.8?'var(--warn)':'var(--neg)'}">${rbeVal.toFixed(2)}</span>`}</td>`;
    // Archetype
    let arch=getHoldArchetype(h);
    let archPill=arch?` <span style="font-size:8px;padding:1px 5px;border-radius:8px;font-weight:600;background:${arch.bg};color:${arch.color}">${arch.label}</span>`:'';
    // Flag
    let flag=_holdFlags[h.t]||null;
    let flagBtn=`<button class="flag-btn${flag?' flagged':''}" data-ticker="${h.t}" style="${flag?'color:'+FLAG_COLORS[flag]+';':''}" onclick="cycleFlag('${h.t}',event)" title="${flag?'Flag: '+flag+' (click to cycle)':'Flag (watch/reduce/add)'}">${flag?FLAG_ICONS[flag]:'\u2691'}</button>`;
    let isBmOnly=(!h.p||h.p===0)&&(h.b>0);
    let bmBadge=isBmOnly?`<span style="background:#334155;color:#94a3b8;font-size:9px;padding:1px 4px;border-radius:4px;margin-left:3px">BM</span>`:'';
    let newBadge=h.isNew?`<span style="background:#a78bfa;color:#0f172a;font-size:9px;padding:1px 4px;border-radius:4px;font-weight:600;margin-left:3px">NEW</span>`:'';
    return`<tr style="cursor:pointer${isBmOnly?';background:rgba(100,116,139,0.1)':''}" onclick="oSt('${h.t}')">
      <td style="color:var(--txth);font-weight:600;white-space:nowrap">${flagBtn} ${h.t}${bmBadge}${newBadge}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${h.n}${archPill}</td>
      <td><span class="chip">${h.sec||'—'}</span></td>
      ${_showIndustry?`<td style="font-size:11px;color:var(--txt)">${h.ind||h.industry||'—'}</td>`:''}
      <td>${h.co||'—'}</td>
      <td class="r">${f2(h.p,1)}</td><td class="r">${f2(h.b,1)}</td>
      <td class="r ${cls}">${fp(h.a,1)}</td>
      <td class="r">${f2(h.mcr,2)}</td>
      ${trCell}
      ${rbeCell}
      ${rORVQCells(h)}
    </tr>`;
  }).join('');
}

function searchHold(q){
  q=q.toLowerCase();
  fh=ah.filter(h=>h.t.toLowerCase().includes(q)||h.n.toLowerCase().includes(q));
  applyHoldFilters();
  applyHoldSort();
  hp=1;renderHoldTab();
}

function filterHold(){
  fh=[...ah];
  applyHoldFilters();
  applyHoldSort();
  hp=1;renderHoldTab();
}

let _holdFlaggedOnly=false;
function toggleFlaggedFilter(){
  _holdFlaggedOnly=!_holdFlaggedOnly;
  fh=[...ah];applyHoldFilters();applyHoldSort();hp=1;renderHoldTab();
}

function applyHoldFilters(){
  let sf=$('secFilter');let rf=$('rankFilter');
  if(sf&&sf.value)fh=fh.filter(h=>h.sec===sf.value);
  if(rf&&rf.value)fh=fh.filter(h=>h.r==rf.value);
  if(_holdFlaggedOnly)fh=fh.filter(h=>!!_holdFlags[h.t]);
}

function sortHold(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1}
  fh.sort((a,b)=>{
    let va=a[col],vb=b[col];
    if(typeof va==='string')return sortDir*va.localeCompare(vb);
    return sortDir*((va||0)-(vb||0));
  });
  hp=1;renderHoldTab();
}

function rRankDist(){
  let ranks=cs.ranks;
  Plotly.newPlot('rankDistDiv',[{
    x:ranks.map(r=>r.l),y:ranks.map(r=>r.p),type:'bar',
    marker:{color:ranks.map(r=>getComputedStyle(document.documentElement).getPropertyValue(rc(r.r).slice(4,-1)).trim()||'#94a3b8')},
    text:ranks.map(r=>f2(r.p)+'%'),textposition:'outside',textfont:{size:10,color:THEME().tick}
  }],{...plotBg,yaxis:{...plotBg.yaxis,title:'Portfolio Weight %'}},plotCfg);
}

function rHoldConc(){
  let top10=[...cs.hold].filter(h=>!isCash(h)&&isFinite(h.p)).sort((a,b)=>b.p-a.p).slice(0,10);
  if(!top10.length){Plotly.purge('holdConcDiv');return;}
  let short=s=>{if(!s)return'';s=s.replace(/\s+(Ltd\.?|Limited|Inc\.?|Co\.?,?\s*Ltd\.?|Corp\.?|Corporation|Company|plc|PLC|AG|SA|S\.A\.?|N\.V\.?|Holdings?|Group|Class [A-Z])$/gi,'').trim();return s.length>22?s.slice(0,21)+'…':s;};
  let labels=top10.map(h=>short(h.n||h.t));
  let vals=top10.map(h=>+(h.p||0));
  let colors=top10.map(h=>(h.a||0)>=0?'rgba(34,197,94,0.85)':'rgba(239,68,68,0.85)');
  let txt=top10.map(h=>f2(h.p)+'%  '+fp(h.a));
  let cd=top10.map(h=>[h.t||'',h.n||'',h.sec||'—',+(h.a||0).toFixed(2),+(h.mcr||0).toFixed(2)]);
  Plotly.newPlot('holdConcDiv',[{
    y:labels,x:vals,type:'bar',orientation:'h',
    marker:{color:colors,line:{color:'rgba(255,255,255,0.12)',width:1}},
    text:txt,textposition:'inside',insidetextanchor:'start',
    textfont:{size:11,color:'#fff',family:'Inter'},
    customdata:cd,
    hovertemplate:'<b>%{customdata[1]}</b><br>Ticker: %{customdata[0]}<br>Weight: %{x:.2f}%<br>Active: %{customdata[3]:+.2f}<br>Sector: %{customdata[2]}<br>MCR: %{customdata[4]:.2f}<extra></extra>'
  }],{
    ...plotBg,
    margin:{l:150,r:40,t:10,b:40},
    yaxis:{...plotBg.yaxis,autorange:'reversed',type:'category'},
    xaxis:{...plotBg.xaxis,type:'linear',title:'Weight %',ticksuffix:'%',rangemode:'tozero'}
  },plotCfg);
}


// ===== DRILL MODALS =====
let _drillRange='All';
function oDr(type,name,range){
  window._drillType=type;window._drillName=name;
  if(range!=null)_drillRange=range;
  let m=$('drillModal');
  let fullHist=type==='sec'?cs.hist.sec[name]:cs.hist.reg[name];
  let rangeMap={All:Infinity,'3Y':36,'1Y':12,'6M':6,'3M':3};
  let pts=rangeMap[_drillRange]||Infinity;
  let hist=pts===Infinity?fullHist||[]:(fullHist||[]).slice(-pts);
  if(!hist.length&&fullHist&&fullHist.length)hist=fullHist;
  let holdings=cs.hold.filter(h=>type==='sec'?h.sec===name:h.reg===name);
  let dataRow=type==='sec'?cs.sectors.find(x=>x.n===name):cs.regions.find(x=>x.n===name);

  // TE contribution estimate
  let teContrib=holdings.reduce((a,h)=>a+(h.tr||0),0);

  let nm2=name.replace(/'/g,"\\'");
  let rangeBtns=['3M','6M','1Y','3Y','All'].map(r=>`<button class="range-btn${_drillRange===r?' active':''}" onclick="oDr('${type}','${nm2}','${r}')">${r}</button>`).join('');
  let histHtml=`<div class="range-btns">${rangeBtns}</div><div id="drillHistDiv" style="height:250px;margin-bottom:16px"></div>`;

  let holdRows=holdings.sort((a,b)=>(b.tr||0)-(a.tr||0)).map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')">
    <td style="color:var(--txth);font-weight:600">${h.t}</td><td>${h.n}</td>
    <td class="r">${f2(h.p)}</td><td class="r">${f2(h.b)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td>
    <td class="r">${f2(h.mcr)}</td>${rORVQCells(h)}
  </tr>`).join('');

  // Bench-only holdings in this sector/region — what we don't own from the benchmark (#8)
  let benchOnlyHtml='';
  if(type==='sec'){
    let benchOnly=holdings.filter(h=>(h.b||0)>0&&(!h.p||h.p<=0)).sort((a,b)=>(b.b||0)-(a.b||0));
    if(benchOnly.length){
      let shown=benchOnly.slice(0,25);
      let totalMissedWt=benchOnly.reduce((a,h)=>a+(h.b||0),0);
      let boRows=shown.map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')">
        <td style="color:var(--txth);font-weight:600">${h.t}</td><td>${h.n}</td>
        <td class="r" style="color:var(--warn);font-weight:600">${f2(h.b,2)}%</td>
        <td class="r" style="color:var(--neg);font-weight:600">${fp(-(h.b||0),2)}%</td>
        ${rORVQCells(h)}
      </tr>`).join('');
      let moreNote=benchOnly.length>shown.length?`<p style="font-size:10px;color:var(--txt);margin:4px 0 0">Showing top ${shown.length} of ${benchOnly.length} by bench weight.</p>`:'';
      benchOnlyHtml=`<div style="margin-top:16px">
        <div class="flex-between"><div class="card-title tip" data-tip="Securities in the benchmark but not in the portfolio. Each represents an active underweight.">Benchmark-Only in ${name} <span style="font-size:10px;color:var(--txt);font-weight:400;margin-left:6px">${benchOnly.length} names \u00b7 ${f2(totalMissedWt,1)}% bench wt missed</span></div></div>
        <div style="max-height:260px;overflow-y:auto;margin-top:6px">
          <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Bench%</th><th class="r">Implied Active</th>${ORVQ_TH_PLAIN}</tr></thead><tbody>${boRows}</tbody></table>
        </div>
        ${moreNote}
      </div>`;
    }
  }

  // Country breakdown for region drills
  let countryHtml='';
  if(type==='reg'){
    let countries=cs.countries.filter(c=>(CMAP[c.n]||'Other')===name).sort((a,b)=>b.p-a.p);
    if(countries.length){
      let cRows=countries.map(c=>`<tr class="clickable" onclick="closeDrill();oDrCountry('${c.n}')"><td>${c.n}</td><td class="r">${f2(c.p)}</td><td class="r">${f2(c.b)}</td><td class="r ${activeStyle(c.a)}">${fp(c.a)}</td></tr>`).join('');
      countryHtml=`<div style="margin-top:16px"><div class="card-title">Countries in ${name}</div>
        <table><thead><tr><th>Country</th><th class="r">Port%</th><th class="r">Bench%</th><th class="r">Active</th></tr></thead><tbody>${cRows}</tbody></table></div>`;
    }
  }

  // Factor scores for sector drills (avg OVER/REV/VAL/QUAL/MOM/STAB from holdings)
  let facScoreHtml='';
  if(type==='sec'&&holdings.length){
    let avg=n=>{let vs=holdings.filter(h=>h[n]!=null);return vs.length?+(vs.reduce((a,h)=>a+h[n],0)/vs.length).toFixed(2):null};
    let sc=[{k:'over',l:'Overall'},{k:'rev',l:'Rev'},{k:'val',l:'Value'},{k:'qual',l:'Quality'}];
    let scoreCards=sc.map(({k,l})=>{
      let v=avg(k);if(v==null)return'';
      let col=v<=2?'var(--pos)':v>=4?'var(--neg)':'var(--warn)';
      return`<div class="card" style="text-align:center;padding:8px">
        <div class="label" style="font-size:10px;margin-bottom:4px">${l}</div>
        <div style="font-size:18px;font-weight:700;color:${col}">${v.toFixed(1)}</div>
        <div style="font-size:9px;color:var(--txt)">Q${Math.round(v)} avg</div>
      </div>`;
    }).join('');
    if(scoreCards.trim()){
      facScoreHtml=`<div style="margin-bottom:12px"><div class="card-title" style="margin-bottom:6px">Avg Quant Scores — ${holdings.length} Holdings</div>
        <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:8px">${scoreCards}</div></div>`;
    }
  }

  // Mini comparison to other sectors/regions
  let others=type==='sec'?cs.sectors:cs.regions;
  let miniCompare=others.sort((a,b)=>Math.abs(b.a)-Math.abs(a.a)).map(o=>{
    let isCurrent=o.n===name;
    return`<div style="display:flex;justify-content:space-between;padding:3px 6px;font-size:10px;${isCurrent?'background:rgba(99,102,241,.1);border-radius:4px;font-weight:600':''}">
      <span style="${isCurrent?'color:var(--txth)':''}">${o.n}</span><span class="${activeStyle(o.a)}">${fp(o.a)}</span></div>`;
  }).join('');

  $('drillContent').innerHTML=`
    <h2>${name} — ${type==='sec'?'Sector':'Region'} Deep Drill<button class="close" onclick="closeDrill()">&times;</button></h2>
    <div class="grid g3" style="margin-bottom:12px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Port Weight</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${dataRow?f2(dataRow.p):'—'}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Active Weight</div><div style="font-size:20px;font-weight:700;color:${dataRow&&dataRow.a>=0?'var(--pos)':'var(--neg)'}">${dataRow?fp(dataRow.a):'—'}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">TE Contribution</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(teContrib)}</div></div>
    </div>
    ${facScoreHtml}
    <div class="card-title">Historical Weight: Portfolio vs Benchmark</div>
    ${histHtml}
    <div class="grid g23">
      <div>
        <div class="flex-between"><div class="card-title">Holdings in ${name} (${holdings.length})</div>
          <div class="export-bar"><button class="export-btn" onclick="exportCSV(this.closest('.grid').querySelector('table'),'${name}_holdings')">CSV</button></div>
        </div>
        <div style="max-height:300px;overflow-y:auto">
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Bench%</th><th class="r">Active</th><th class="r">MCR</th>${ORVQ_TH_PLAIN}</tr></thead>
        <tbody>${holdRows}</tbody></table>
        </div>
      </div>
      <div>
        <div class="card-title">Compare to Other ${type==='sec'?'Sectors':'Regions'}</div>
        <div style="max-height:300px;overflow-y:auto">${miniCompare}</div>
      </div>
    </div>
    ${benchOnlyHtml}
    ${countryHtml}`;
  m.classList.add('show');

  setTimeout(()=>{
    if(hist&&hist.length){
      let dx=hist.map(h=>isoDate(h.d));
      let actVals=hist.map(h=>h.a);
      let numAct=actVals.filter(v=>v!=null);
      let actAvg=numAct.length?(numAct.reduce((a,v)=>a+v,0)/numAct.length):null;
      let actSd=numAct.length>1&&actAvg!=null?Math.sqrt(numAct.reduce((a,v)=>a+(v-actAvg)**2,0)/numAct.length):0;
      let shapes=[];let annos=[];let traces=[];
      if(actAvg!=null&&actSd>0){
        traces.push(
          {x:dx,y:dx.map(()=>actAvg+actSd),type:'scatter',mode:'lines',line:{color:'transparent'},showlegend:false,hoverinfo:'skip',yaxis:'y2'},
          {x:dx,y:dx.map(()=>actAvg-actSd),type:'scatter',mode:'lines',line:{color:'transparent'},fill:'tonexty',fillcolor:'rgba(16,185,129,0.08)',showlegend:false,hoverinfo:'skip',yaxis:'y2'}
        );
        shapes.push({type:'line',y0:actAvg,y1:actAvg,xref:'paper',x0:0,x1:1,yref:'y2',line:{color:'#10b981',dash:'dash',width:1}});
        annos.push({x:1,xref:'paper',y:actAvg,yref:'y2',text:'avg',showarrow:false,font:{size:9,color:'#10b981'},xanchor:'left',xshift:4});
      }
      traces.push(
        {x:dx,y:hist.map(h=>h.p),name:'Portfolio',line:{color:'#6366f1',width:2}},
        {x:dx,y:hist.map(h=>h.b),name:'Benchmark',line:{color:THEME().tick,width:2,dash:'dot'}},
        {x:dx,y:actVals,name:'Active',line:{color:'#10b981',width:2},yaxis:'y2'}
      );
      let xDr={...plotBg.xaxis,rangeslider:{visible:true,bgcolor:THEME().card,thickness:0.08}};
      Plotly.newPlot('drillHistDiv',traces,{...plotBg,xaxis:xDr,yaxis:{...plotBg.yaxis,title:'Weight %'},yaxis2:{overlaying:'y',side:'right',title:'Active %',gridcolor:'transparent',titlefont:{color:'#10b981'},tickfont:{color:'#10b981'}},shapes,annotations:annos,legend:{orientation:'h',y:1.12,font:{size:10}}},modalPlotCfg);
    } else {
      // Generate placeholder chart even without history
      Plotly.newPlot('drillHistDiv',[{x:[],y:[],type:'scatter'}],{...plotBg,annotations:[{text:'Historical data not available',showarrow:false,font:{size:14,color:THEME().tick}}]},modalPlotCfg);
    }
  },50);
}

function closeDrill(){$('drillModal').classList.remove('show')}

function oDrF(name,range){
  let m=$('drillModal');
  let hist=cs.hist.fac[name]||[];
  let factor=cs.factors.find(f=>f.n===name);
  if(range!=null)_facDrillRange=range;
  let rangeWks={All:Infinity,'3Y':156,'1Y':52,'6M':26,'3M':13};
  let wks=rangeWks[_facDrillRange]||Infinity;
  let histSlice=wks===Infinity?hist:(hist.slice(-wks)||hist);
  if(!histSlice.length)histSlice=hist;
  let topHold=[...cs.hold].sort((a,b)=>(b[name.toLowerCase().slice(0,3)]||b.over||0)-(a[name.toLowerCase().slice(0,3)]||a.over||0));
  let top5=topHold.slice(0,5);
  let bot5=topHold.slice(-5);

  let histHtml='';
  if(histSlice.length){
    let nm=name.replace(/'/g,"\\'");
    let rangeBtns=['3M','6M','1Y','3Y','All'].map(r=>`<button class="range-btn${_facDrillRange===r?' active':''}" onclick="oDrF('${nm}','${r}')">${r}</button>`).join('');
    let hasRetData=histSlice.some(h=>h.ret!=null||h.imp!=null);
    let retChartHtml=hasRetData?`<div class="card-title" style="margin-top:8px">Factor Return &amp; Impact</div><div id="facDrillRetDiv" style="height:160px;margin-bottom:16px"></div>`:'';
    histHtml=`<div class="range-btns">${rangeBtns}</div><div class="card-title">Active Exposure</div><div id="facDrillHistDiv" style="height:200px;margin-bottom:4px"></div>${retChartHtml}`;
  }

  // Factor correlations (no data)
  let corrHtml='<p style="font-size:11px;color:var(--txt)">—</p>';

  // Risk contribution detail
  let totalFacC=cs.factors.reduce((a,f)=>a+Math.abs(f.c||0),0)||1;
  let pctOfRisk=Math.abs(factor.c||0)/totalFacC*100;

  $('drillContent').innerHTML=`
    <h2>${name} Factor Drill<button class="close" onclick="closeDrill()">&times;</button></h2>
    <div class="grid g4" style="margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Active Exposure</div><div style="font-size:20px;font-weight:700;color:${(factor.a??0)>=0?'var(--pos)':'var(--neg)'}">${fp(factor.a,3)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Contribution</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(factor.c)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">% of Total Risk</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(pctOfRisk,1)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Impact</div><div style="font-size:20px;font-weight:700;color:${factor.imp!=null?(factor.imp>=0?'var(--pos)':'var(--neg)'):'var(--txt)'}">${fp(factor.imp)}</div></div>
    </div>
    <div class="card-title">Exposure Time Series</div>
    ${histHtml}
    <div class="grid g3">
      <div><div class="card-title">Top Exposed</div>
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Active</th></tr></thead>
        <tbody>${top5.map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')"><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div><div class="card-title">Bottom Exposed</div>
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Active</th></tr></thead>
        <tbody>${bot5.map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')"><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div><div class="card-title">Correlations</div>${corrHtml}</div>
    </div>`;
  m.classList.add('show');

  if(histSlice.length){
    setTimeout(()=>{
      let expVals=histSlice.map(h=>h.bm!=null?+(h.e-h.bm).toFixed(4):h.e);
      let expDates=histSlice.map(h=>isoDate(h.d));
      let numExp=expVals.filter(v=>v!=null);
      let expAvg=numExp.length?(numExp.reduce((a,v)=>a+v,0)/numExp.length):null;
      let expSd=numExp.length>1&&expAvg!=null?Math.sqrt(numExp.reduce((a,v)=>a+(v-expAvg)**2,0)/numExp.length):0;
      let expShapes=[{type:'line',y0:0,y1:0,x0:expDates[0],x1:expDates[expDates.length-1],line:{color:THEME().tick,dash:'dot'}}];
      let expAnno=[];
      let expTraces=[];
      if(expAvg!=null&&expSd>0){
        expTraces.push(
          {x:expDates,y:expDates.map(()=>expAvg+expSd),type:'scatter',mode:'lines',line:{color:'transparent'},showlegend:false,hoverinfo:'skip'},
          {x:expDates,y:expDates.map(()=>expAvg-expSd),type:'scatter',mode:'lines',line:{color:'transparent'},fill:'tonexty',fillcolor:'rgba(148,163,184,0.10)',showlegend:false,hoverinfo:'skip'}
        );
        expShapes.push({type:'line',y0:expAvg,y1:expAvg,xref:'paper',x0:0,x1:1,line:{color:THEME().tick,dash:'dash',width:1}});
        expAnno.push({x:1,xref:'paper',y:expAvg,text:'avg',showarrow:false,font:{size:9,color:THEME().tick},xanchor:'left',xshift:4});
      }
      expTraces.push({x:expDates,y:expVals,name:'Active Exposure',line:{color:'#6366f1',width:2},fill:'tozeroy',fillcolor:'rgba(99,102,241,.1)'});
      let xFac={...plotBg.xaxis,rangeslider:{visible:true,bgcolor:THEME().card,thickness:0.08}};
      Plotly.newPlot('facDrillHistDiv',expTraces,{...plotBg,xaxis:xFac,yaxis:{...plotBg.yaxis,title:'Exposure'},shapes:expShapes,annotations:expAnno,margin:{...plotBg.margin,r:40}},modalPlotCfg);

      // Second chart: Factor Return & Impact (if data present)
      if(document.getElementById('facDrillRetDiv')){
        let retVals=histSlice.map(h=>h.ret??null);
        let impVals=histSlice.map(h=>h.imp??null);
        Plotly.newPlot('facDrillRetDiv',[
          {x:expDates,y:retVals,name:'Factor Return',line:{color:'#a78bfa',width:2},mode:'lines'},
          {x:expDates,y:impVals,name:'Factor Impact',line:{color:'#10b981',width:2,dash:'dot'},mode:'lines'}
        ],{...plotBg,xaxis:{...plotBg.xaxis},yaxis:{...plotBg.yaxis,title:''},legend:{orientation:'h',y:1.15,font:{size:10}},margin:{...plotBg.margin,r:20}},modalPlotCfg);
      }
    },50);
  }
}

let _sumDrillRange='All';
function oDrS(range){
  let m=$('drillModal');
  let fullHist=cs.hist.sum;
  if(!fullHist||!fullHist.length){closeDrill();return}
  if(range!=null)_sumDrillRange=range;
  let rangeWks={All:Infinity,'3Y':156,'1Y':52,'6M':26,'3M':13};
  let wks=rangeWks[_sumDrillRange]||Infinity;
  let hist=wks===Infinity?fullHist:fullHist.slice(-wks);
  if(!hist.length)hist=fullHist;
  let rangeBtns=['3M','6M','1Y','3Y','All'].map(r=>`<button class="range-btn${_sumDrillRange===r?' active':''}" onclick="oDrS('${r}')">${r}</button>`).join('');

  $('drillContent').innerHTML=`
    <h2>Summary Trends — ${cs.id}<button class="close" onclick="closeDrill()">&times;</button></h2>
    <div class="range-btns">${rangeBtns}</div>
    <div id="sumDrillDiv" style="height:380px"></div>`;
  m.classList.add('show');

  setTimeout(()=>{
    Plotly.newPlot('sumDrillDiv',[
      {x:hist.map(h=>isoDate(h.d)),y:hist.map(h=>h.te),name:'TE %',line:{color:'#ef4444',width:2}},
      {x:hist.map(h=>isoDate(h.d)),y:hist.map(h=>h.as),name:'Active Share %',line:{color:'#6366f1',width:2},yaxis:'y2'},
      {x:hist.map(h=>isoDate(h.d)),y:hist.map(h=>h.beta),name:'Beta',line:{color:'#10b981',width:2,dash:'dot'},yaxis:'y3'}
    ],{...plotBg,
      yaxis:{...plotBg.yaxis,title:'TE %',titlefont:{color:'#ef4444'},tickfont:{color:'#ef4444'}},
      yaxis2:{overlaying:'y',side:'right',title:'Active Share %',titlefont:{color:'#6366f1'},tickfont:{color:'#6366f1'},gridcolor:'transparent'},
      yaxis3:{overlaying:'y',side:'right',position:0.95,title:'Beta',titlefont:{color:'#10b981'},tickfont:{color:'#10b981'},gridcolor:'transparent',showgrid:false},
      legend:{orientation:'h',y:1.1,font:{size:10}},
      shapes:[{type:'line',y0:5,y1:5,xref:'paper',x0:0,x1:1,line:{color:'#10b981',dash:'dash',width:1}},{type:'line',y0:10,y1:10,xref:'paper',x0:0,x1:1,line:{color:'#ef4444',dash:'dash',width:1}}]
    },plotCfg);
  },50);
}

function oSt(ticker){
  let h=cs.hold.find(x=>x.t===ticker);
  if(!h)return;
  let m=$('stockModal');

  // Rank color (quintile 1=best=green)
  let rankCol=h.r!=null?rc(h.r):'#334155';

  // 4 score chips: OVER, REV, VAL, QUAL (skip MOM/STAB)
  let scoreDefs=[{k:'over',l:'Overall'},{k:'rev',l:'Revision'},{k:'val',l:'Value'},{k:'qual',l:'Quality'}];
  let scoreChips=scoreDefs.map(({k,l})=>{
    let v=h[k];if(v==null)return'';
    let col=rc(Math.round(v));
    return`<div style="text-align:center;padding:8px 10px;background:var(--surf);border-radius:8px;min-width:52px">
      <div style="font-size:9px;color:var(--txt);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.3px">${l}</div>
      <div style="font-size:15px;font-weight:700;color:${col}">${f2(v,1)}</div>
    </div>`;
  }).join('');

  // R·V·Q sub-line for OVER badge
  let rvqParts=[];
  if(h.rev!=null)rvqParts.push('R'+Math.round(h.rev));
  if(h.val!=null)rvqParts.push('V'+Math.round(h.val));
  if(h.qual!=null)rvqParts.push('Q'+Math.round(h.qual));
  let rvqSub=rvqParts.join('·');

  // Peer comparison sorted by %T desc
  let peers=cs.hold.filter(x=>x.sec===h.sec&&x.t!==h.t).sort((a,b)=>(b.tr||0)-(a.tr||0)).slice(0,5);
  let peerRows=peers.map(p=>`<tr class="clickable${p.t===ticker?' thresh-good':''}" onclick="$('stockModal').classList.remove('show');oSt('${p.t}')">
    <td style="color:var(--txth);font-weight:600">${p.t}</td><td class="r">${f2(p.p,1)}</td><td class="r ${activeStyle(p.a)}">${fp(p.a,1)}</td>
    <td class="r" style="color:${(p.tr||0)>=0?'var(--pos)':'var(--neg)'};font-weight:600">${fp(p.tr,1)}%</td>
    ${rORVQCells(p)}
  </tr>`).join('');


  let trCls=(h.tr||0)>0?'pos':'neg';

  $('stockContent').innerHTML=`
    <h2>${h.t} — ${h.n}
      ${h.sec?`<span class="chip" style="cursor:pointer;vertical-align:middle" onclick="$('stockModal').classList.remove('show');oDr('sec','${h.sec}')">${h.sec}</span>`:''}
      ${h.co?`<span style="font-size:11px;color:var(--pri);cursor:pointer;vertical-align:middle;margin-left:4px" onclick="$('stockModal').classList.remove('show');oDrCountry('${h.co}')">${h.co}</span>`:''}
      <button class="close" onclick="$('stockModal').classList.remove('show')">&times;</button></h2>
    <div class="grid g2" style="margin-bottom:16px;align-items:start">
      <!-- Score panel -->
      <div class="card" style="text-align:center;padding:16px">
        <div style="font-size:52px;font-weight:700;color:${rankCol};line-height:1">${h.r!=null?'Q'+h.r:'—'}</div>
        <div style="font-size:10px;color:var(--txt);margin:4px 0 2px">Overall Rank</div>
        ${rvqSub?`<div style="font-size:11px;color:var(--txt);margin-bottom:12px">${rvqSub}</div>`:'<div style="margin-bottom:12px"></div>'}
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">${scoreChips}</div>
      </div>
      <!-- Key metrics -->
      <div>
        <div class="card-title">Key Metrics</div>
        <table>
          <tr><td>Port Weight</td><td class="r" style="font-weight:600">${f2(h.p,2)}%</td></tr>
          <tr><td>Bench Weight</td><td class="r">${f2(h.b,2)}%</td></tr>
          <tr><td>Active Weight</td><td class="r ${activeStyle(h.a)}" style="font-weight:600">${fp(h.a,2)}%</td></tr>
          <tr><td>Sector</td><td class="r">${h.sec?`<span class="chip" style="cursor:pointer" onclick="$('stockModal').classList.remove('show');oDr('sec','${h.sec}')">${h.sec}</span>`:'—'}</td></tr>
          <tr><td>Country</td><td class="r" style="cursor:pointer;color:var(--pri)" onclick="${h.co?`$('stockModal').classList.remove('show');oDrCountry('${h.co}')`:'void 0'}">${h.co||'—'}</td></tr>
          <tr><td>Region</td><td class="r">${h.reg||CMAP[h.co]||'—'}</td></tr>
          <tr><td>%S (Stock-Specific TE)</td><td class="r">${f2(h.mcr,2)}</td></tr>
          <tr><td>%T (TE Contribution)</td><td class="r ${trCls}" style="font-weight:600">${fp(h.tr,2)}%</td></tr>
        </table>
      </div>
    </div>
    <div class="grid g2" style="margin-bottom:12px">
      <div><div class="card-title">Score Radar (Q1 = best, outer ring)</div><div id="stockRadarDiv" style="height:230px"></div></div>
      <div><div class="card-title">Weight History</div><div id="stockHistDiv" style="height:230px;display:flex;align-items:center;justify-content:center"><span style="font-size:11px;color:var(--txt)">No historical data available</span></div></div>
    </div>
    ${peers.length&&h.sec?`<div><div class="card-title">Peers in ${h.sec} — sorted by TE contribution</div>
    <table><thead><tr><th>Ticker</th><th class="r">Port%</th><th class="r">Active</th><th class="r">%T</th>${ORVQ_TH_PLAIN}</tr></thead><tbody>${peerRows}</tbody></table></div>`:''}

let _compSel=null;
const _cmpColors=['#6366f1','#10b981','#a78bfa','#ef4444','#8b5cf6','#38bdf8','#ec4899'];
function openComp(selOverride){
  let m=$('compModal');
  let allKeys=Object.keys(A);
  if(allKeys.length<2){showToast('Need 2+ strategies to compare','var(--warn)');return}
  if(selOverride)_compSel=selOverride;
  if(!_compSel||_compSel.size<2)_compSel=new Set(allKeys);
  let keys=allKeys.filter(k=>_compSel.has(k));
  if(keys.length<2)keys=allKeys;

  // Summary stats table (sortable)
  let metricDefs=[
    {name:'TE',fn:(sk)=>{let v=A[sk].sum.te;return{v,fmt:f2(v)+'%',sv:v||0,style:v>=10?'color:var(--neg)':v<5?'color:var(--warn)':'color:var(--pos)'}}},
    {name:'Active Share',fn:(sk)=>{let v=A[sk].sum.as;return{v,fmt:f2(v)+'%',sv:v||0,style:''}}},
    {name:'Beta',fn:(sk)=>{let v=A[sk].sum.beta;return{v,fmt:f2(v,3),sv:v||0,style:Math.abs(v-1)>0.1?'color:var(--warn)':'color:var(--pos)'}}},
    {name:'Holdings',fn:(sk)=>{let v=A[sk].sum.h||equityCount(A[sk].hold);return{v,fmt:String(v),sv:v||0,style:''}}},
    {name:'Cash%',fn:(sk)=>{let v=A[sk].sum.cash;return{v,fmt:f2(v)+'%',sv:v||0,style:''}}},
    {name:'Top Factor Risk',fn:(sk)=>{let facs=[...A[sk].factors].sort((a,b)=>Math.abs(b.c||0)-Math.abs(a.c||0));let t=facs[0];return{v:t?Math.abs(t.c||0):0,fmt:t?t.n+' '+f2(t.c)+'%':'—',sv:t?Math.abs(t.c||0):0,style:''}}},
    {name:'Idio%',fn:(sk)=>{let s=A[sk];let fc=s.factors.reduce((a,f)=>a+Math.abs(f.c||0),0);let idio=s.sum.te?+(100-Math.min(fc/s.sum.te*100,100)).toFixed(1):null;return{v:idio,fmt:idio!=null?idio+'%':'—',sv:idio||0,style:''}}}
  ];
  let statsRows=metricDefs.map((md,mi)=>{
    let cells=keys.map((sk,ki)=>{
      let r=md.fn(sk);
      return`<td class="r" data-sv="${r.sv}" style="${r.style}">${r.fmt}</td>`;
    }).join('');
    return`<tr><td class="metric-name">${md.name}</td>${cells}</tr>`;
  }).join('');

  let s1=A[keys[0]];

  // Sector heatmap — all strategies, color-coded active weights
  function secHeatColor(v){
    if(v==null)return'rgba(51,65,85,.1)';
    let abs=Math.min(Math.abs(v)/6,1);
    return v>0?`rgba(16,185,129,${abs*0.7+0.05})`:`rgba(239,68,68,${abs*0.7+0.05})`;
  }
  let secHeatRows=SECS.map(sec=>{
    let cells=keys.map(k=>{
      let row=A[k].sectors.find(x=>x.n===sec);
      let v=row?row.a:null;
      let bg=secHeatColor(v);
      return`<td class="heatmap-cell" style="background:${bg};color:${v!=null?(v>=0?'var(--pos)':'var(--neg)'):'var(--txt)'}">${v!=null?fp(v):'—'}</td>`;
    }).join('');
    return`<tr><td style="padding:5px 10px;font-size:11px;color:var(--txth)">${sec}</td>${cells}</tr>`;
  }).join('');
  let secHeatHtml=`<div style="overflow-x:auto"><table style="font-size:11px">
    <thead><tr><th style="padding:5px 10px;text-align:left">Sector</th>${keys.map(k=>`<th class="r" style="padding:5px 10px">${k}</th>`).join('')}</tr></thead>
    <tbody>${secHeatRows}</tbody></table></div>`;

  // Holdings overlap — cross-strategy shared holdings
  let allHoldSets=keys.map(k=>new Set(A[k].hold.filter(h=>!isCash(h)).map(h=>h.t)));
  let allTickers=new Set(keys.flatMap(k=>A[k].hold.filter(h=>!isCash(h)).map(h=>h.t)));
  let sharedTickers=[...allTickers].filter(t=>allHoldSets.filter(s=>s.has(t)).length>=2);
  sharedTickers.sort((a,b)=>{let ha=s1.hold.find(h=>h.t===a);let hb=s1.hold.find(h=>h.t===b);return(hb?hb.p:0)-(ha?ha.p:0)});

  let sharedHtml=sharedTickers.slice(0,15).map(t=>{
    let cells=keys.map(k=>{
      let h=A[k].hold.find(x=>x.t===t);
      return`<td class="r" style="font-size:11px;padding:4px 8px">${h?f2(h.p)+'%':'—'}</td>`;
    }).join('');
    let h1=s1.hold.find(x=>x.t===t);
    return`<tr><td style="font-size:11px;font-weight:600;color:var(--txth);padding:4px 8px">${t}</td><td style="font-size:11px;color:var(--txt);padding:4px 8px">${h1?h1.n:''}</td>${cells}</tr>`;
  }).join('');
  let sharedTable=sharedTickers.length?`<div style="overflow-x:auto;max-height:240px;overflow-y:auto"><table>
    <thead><tr><th>Ticker</th><th>Name</th>${keys.map(k=>`<th class="r">${k} Port%</th>`).join('')}</tr></thead>
    <tbody>${sharedHtml}</tbody></table></div>`:'<div style="color:var(--txt);font-size:12px;padding:8px">No shared holdings between selected strategies</div>';

  let checkboxes=allKeys.map(k=>{
    let sel=_compSel.has(k);
    return`<label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;padding:3px 8px;border-radius:6px;background:${sel?'rgba(99,102,241,.18)':'rgba(51,65,85,.3)'};font-size:11px;font-weight:600;color:${sel?'var(--txth)':'var(--txt)'}">
      <input type="checkbox" ${sel?'checked':''} onchange="(function(k,el){let s=new Set(_compSel);if(el.checked)s.add(k);else if(s.size>2)s.delete(k);else{el.checked=true;return};openComp(s)})('${k}',this)">${k}</label>`;
  }).join('');

  $('compContent').innerHTML=`
    <h2>Cross-Strategy Comparison<button class="close" onclick="$('compModal').classList.remove('show')">&times;</button></h2>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center">
      <span style="font-size:11px;color:var(--txt);margin-right:2px">Show:</span>${checkboxes}
      <button style="padding:3px 8px;background:rgba(99,102,241,.12);border:1px solid var(--pri);color:var(--pri);border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit" onclick="openComp(new Set(Object.keys(A)))">Select All</button>
      <button style="padding:3px 8px;background:var(--surf);border:1px solid var(--grid);color:var(--txt);border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit" onclick="(function(){let k=Object.keys(A);openComp(new Set(k.slice(0,2)))})()">Clear</button>
    </div>

    <div class="card-title" style="margin-bottom:8px">Summary Statistics</div>
    <div style="overflow-x:auto;margin-bottom:20px">
    <table id="tbl-cmp" class="comp-stats-table">
      <thead><tr><th onclick="sortTbl('tbl-cmp',0)" style="cursor:pointer">Metric</th>${keys.map((k,i)=>`<th class="r" onclick="sortTbl('tbl-cmp',${i+1})" style="cursor:pointer">${k}</th>`).join('')}</tr></thead>
      <tbody>${statsRows}</tbody></table>
    </div>

    <div class="grid g2" style="margin-bottom:20px">
      <div>
        <div class="card-title" style="margin-bottom:8px">Risk Radar <span style="font-size:10px;color:var(--txt);font-weight:400">(normalized 0–1)</span></div>
        <div id="compRadarDiv" style="height:280px"></div>
      </div>
      <div>
        <div class="card-title" style="margin-bottom:8px">Factor Active Exposures</div>
        <div id="compFacDiv" style="height:280px"></div>
      </div>
    </div>

    <div class="card-title" style="margin-bottom:8px">Sector Active Weight Heatmap <span style="font-size:10px;color:var(--txt);font-weight:400">(all selected strategies)</span></div>
    <div style="margin-bottom:20px">${secHeatHtml}</div>

    <div class="card-title" style="margin-bottom:8px">Holdings Overlap</div>
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      <div style="text-align:center;padding:12px 16px;background:var(--surf);border-radius:8px;min-width:90px">
        <div style="font-size:11px;color:var(--txt);margin-bottom:4px">Shared (2+ strats)</div>
        <div style="font-size:28px;font-weight:700;color:var(--pos)">${sharedTickers.length}</div>
      </div>
      ${keys.map((k,i)=>`<div style="text-align:center;padding:12px 16px;background:var(--surf);border-radius:8px;min-width:90px">
        <div style="font-size:11px;color:var(--txt);margin-bottom:4px">Only ${k}</div>
        <div style="font-size:28px;font-weight:700;color:${_cmpColors[i%_cmpColors.length]}">${[...allHoldSets[i]].filter(t=>allHoldSets.every((s,j)=>j===i||!s.has(t))).length}</div>
      </div>`).join('')}
    </div>
    <div class="card-title" style="margin-bottom:6px;font-size:10px">Shared Holdings (top 15 by ${keys[0]} weight)</div>
    ${sharedTable}`;
  m.classList.add('show');

  setTimeout(()=>{
    // Radar — proper 0-1 normalization per axis
    let radarAxes=['TE','Active Share','Beta','Holdings','Cash%'];
    let radarGetters=[(k)=>A[k].sum.te||0,(k)=>A[k].sum.as||0,(k)=>Math.abs((A[k].sum.beta||1)-1),(k)=>A[k].sum.h||equityCount(A[k].hold)||0,(k)=>A[k].sum.cash||0];
    let axRaw=radarGetters.map(g=>keys.map(k=>g(k)));
    let axNorm=axRaw.map(vals=>{let mn=Math.min(...vals),mx=Math.max(...vals);return vals.map(v=>mx>mn?(v-mn)/(mx-mn):0.5)});
    let radarTraces=keys.map((k,i)=>{
      let r=axNorm.map(ax=>ax[i]);
      return{type:'scatterpolar',name:k,r:[...r,r[0]],theta:[...radarAxes,radarAxes[0]],
        fill:'toself',fillcolor:_cmpColors[i%_cmpColors.length]+'1a',line:{color:_cmpColors[i%_cmpColors.length],width:2},
        hovertemplate:'%{theta}: %{r:.2f}<extra>'+k+'</extra>'};
    });
    Plotly.newPlot('compRadarDiv',radarTraces,{...plotBg,polar:{bgcolor:'transparent',radialaxis:{range:[0,1],gridcolor:THEME().grid,tickfont:{size:9},tickvals:[0,.25,.5,.75,1]},angularaxis:{gridcolor:THEME().grid,tickfont:{size:10,color:THEME().tick}}},legend:{orientation:'h',y:-0.15,font:{size:10}},margin:{l:40,r:40,t:20,b:60}},plotCfg);

    // Factor exposure — all selected strategies
    let facNames=FACS;
    let facTraces=keys.map((k,i)=>{
      let facs=facNames.map(f=>{let fx=A[k].factors.find(x=>x.n===f);return fx?fx.a??0:0});
      return{y:facNames,x:facs,name:k,type:'bar',orientation:'h',marker:{color:_cmpColors[i%_cmpColors.length]+'cc'}};
    });
    Plotly.newPlot('compFacDiv',facTraces,{...plotBg,barmode:'group',yaxis:{...plotBg.yaxis,autorange:'reversed'},xaxis:{...plotBg.xaxis,title:'Active Exposure'},legend:{orientation:'h',y:1.12,font:{size:10}},margin:{...plotBg.margin,l:110}},plotCfg);
  },50);
}

async function generateReport(skipAI){
  let status=$('rptStatus');
  let selected=[...document.querySelectorAll('.rpt-tile:checked')].map(c=>c.value);
  if(!selected.length){status.innerHTML='<span class="neg">Select at least one slide</span>';return}
  let tone=document.querySelector('input[name="tone"]:checked').value;
  let context=$('rptContext').value;
  let apiKey=$('rptApiKey').value;

  if(!skipAI&&!apiKey){status.innerHTML='<span class="warn-t">Enter API key or use "Generate without AI"</span>';return}

  status.textContent='Loading pptxgenjs...';

  // Load pptxgenjs dynamically
  if(!window.PptxGenJS){
    await new Promise((res,rej)=>{
      let sc=document.createElement('script');
      sc.src='pptxgenjs.bundle.js';
      sc.onload=res;sc.onerror=rej;document.head.appendChild(sc);
    });
  }

  let narratives={};
  if(!skipAI&&apiKey){
    status.textContent='Generating narratives with Claude...';
    try{
      narratives=await getNarratives(selected,tone,context,apiKey);
    }catch(e){
      status.innerHTML=`<span class="warn-t">AI failed: ${e.message}. Generating without narratives.</span>`;
    }
  }

  status.textContent='Building PPTX...';
  try{
    await buildPPTX(selected,narratives);
    status.innerHTML='<span class="pos">Report generated successfully!</span>';
  }catch(e){
    status.innerHTML=`<span class="neg">PPTX error: ${e.message}</span>`;
  }
}

async function getNarratives(selected,tone,context,apiKey){
  let s=cs;
  let dataSnippet={strategy:s.id,name:s.name,te:s.sum.te,as:s.sum.as,beta:s.sum.beta,
    topSectors:s.sectors.sort((a,b)=>Math.abs(b.a)-Math.abs(a.a)).slice(0,5).map(x=>({n:x.n,a:x.a})),
    topFactors:s.factors.sort((a,b)=>Math.abs(b.e)-Math.abs(a.e)).slice(0,3).map(x=>({n:x.n,e:x.e}))
  };

  let prompt=`You are a portfolio risk analyst writing slide narratives for an institutional investor presentation.
Strategy: ${s.name} (${s.id})
Data: ${JSON.stringify(dataSnippet)}
Tone: ${tone}
${context?'Context: '+context:''}
Generate a JSON object with keys for each slide: ${selected.join(',')}
Each value should be 2-3 sentences of professional narrative. Return ONLY valid JSON.`;

  let resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  let data=await resp.json();
  let text=data.content[0].text;
  // Extract JSON from response
  let match=text.match(/\{[\s\S]*\}/);
  return match?JSON.parse(match[0]):{};
}

async function buildPPTX(selected,narratives){
  let pptx=new PptxGenJS();
  pptx.layout='LAYOUT_WIDE';
  let s=cs;
  let t=THEME();let bgColor=t.bg.replace('#','');let txtColor=t.tick.replace('#','');let headColor=t.emph.replace('#','');let accentColor='3b82f6';

  // Title slide
  let slide=pptx.addSlide();
  slide.background={color:bgColor};
  slide.addText('REDWOOD RISK CONTROL PANEL',{x:0.5,y:1.5,w:12,h:1,fontSize:28,color:headColor,fontFace:'Arial',bold:true});
  slide.addText(`${s.name} (${s.id})`,{x:0.5,y:2.5,w:12,h:0.5,fontSize:18,color:accentColor,fontFace:'Arial'});
  slide.addText(`Generated: ${new Date().toLocaleDateString()}`,{x:0.5,y:3.2,w:12,h:0.4,fontSize:12,color:txtColor,fontFace:'Arial'});

  selected.forEach(sec=>{
    let sl=pptx.addSlide();
    sl.background={color:bgColor};
    let title=sec.charAt(0).toUpperCase()+sec.slice(1);
    sl.addText(title,{x:0.5,y:0.3,w:12,h:0.6,fontSize:22,color:headColor,fontFace:'Arial',bold:true});
    let narr=narratives[sec]||'';
    if(narr)sl.addText(narr,{x:0.5,y:1,w:12,h:0.8,fontSize:11,color:txtColor,fontFace:'Arial',italic:true});

    let dataY=narr?2:1.2;
    if(sec==='summary'){
      sl.addText(`Tracking Error: ${f2(s.sum.te)}%  |  Active Share: ${f2(s.sum.as)}%  |  Beta: ${f2(s.sum.beta,3)}  |  Holdings: ${s.sum.h||equityCount(s.hold)}`,{x:0.5,y:dataY,w:12,h:0.5,fontSize:14,color:headColor,fontFace:'Arial'});
    }else if(sec==='sectors'){
      let rows=s.sectors.sort((a,b)=>Math.abs(b.a)-Math.abs(a.a)).map(x=>[x.n,f2(x.p),f2(x.b),fp(x.a)]);
      sl.addTable([['Sector','Port%','Bench%','Active'],...rows],{x:0.5,y:dataY,w:12,h:4,fontSize:10,color:txtColor,fontFace:'Arial',border:{type:'solid',color:'334155',pt:0.5},colW:[4,2.5,2.5,2.5]});
    }else if(sec==='factors'){
      let rows=s.factors.map(f=>[f.n,(f.a??0).toFixed(3),f2(f.c),fp(f.ret),fp(f.imp)]);
      sl.addTable([['Factor','Exposure','Contrib%','Return%','Impact'],...rows],{x:0.5,y:dataY,w:12,h:3,fontSize:10,color:txtColor,fontFace:'Arial',border:{type:'solid',color:'334155',pt:0.5}});
    }else{
      sl.addText(`Data available for ${sec}`,{x:0.5,y:dataY,w:12,h:0.5,fontSize:12,color:txtColor,fontFace:'Arial'});
    }
  });

  pptx.writeFile({fileName:`Redwood_${s.id}_Report_${new Date().toISOString().slice(0,10)}.pptx`});
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown',e=>{
  let inInput=document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='SELECT';
  if(e.key==='Escape'){
    closeAllModals();
    $('configPanel').classList.remove('open');
    return;
  }
  if(inInput)return;
  if(e.key==='?'){toggleShortcutHelp();return;}
  if(e.key==='g'&&!e.ctrlKey&&!e.metaKey){toggleConfig();return;}
  // C = compare
  if(e.key==='c'&&!e.ctrlKey&&!e.metaKey)openComp();
  // S = share
  if(e.key==='s'&&!e.ctrlKey&&!e.metaKey)generateShareURL();
  // / = focus global search
  if(e.key==='/'){e.preventDefault();let si=$('globalSearchInput');if(si)si.focus()}
  // Number keys 1-7 for strategy switching
  let num=parseInt(e.key);
  if(num>=1&&num<=7&&!e.ctrlKey&&!e.metaKey){
    let keys=Object.keys(A);
    if(keys[num-1])go(keys[num-1]);
  }
  // Arrow keys for strategy switching
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    let keys=Object.keys(A);
    let idx=keys.indexOf(cs.id);
    if(e.key==='ArrowLeft')idx=Math.max(0,idx-1);
    else idx=Math.min(keys.length-1,idx+1);
    go(keys[idx]);
  }
  // Tab key for tab switching (with shift for reverse)
  if(e.key==='Tab'&&!e.ctrlKey&&!e.metaKey){
    let tabNames=['exposures','holdings','risk'];
    let tabBtns=document.querySelectorAll('.tab');
    let idx=tabNames.indexOf(activeTab);
    if(e.shiftKey)idx=(idx-1+tabNames.length)%tabNames.length;
    else idx=(idx+1)%tabNames.length;
    e.preventDefault();
    switchTab(tabNames[idx],tabBtns[idx]);
  }
});

// ===== DRAG & DROP =====
document.body.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy'});
document.body.addEventListener('drop',e=>{
  e.preventDefault();
  let f=e.dataTransfer.files[0];
  if(!f)return;
  const name=f.name.toLowerCase();
  if(name.endsWith('.json')||name.endsWith('.csv')||name.endsWith('.txt')){
    upload({target:{files:[f]}});
  }
});

// ===== GLOBAL SEARCH =====
function globalSearch(q){
  let res=$('globalSearchResults');
  if(!q||q.length<1){res.innerHTML='';return}
  q=q.toLowerCase();
  let matches=[];
  Object.entries(A).forEach(([sid,s])=>{
    s.hold.forEach(h=>{
      if(h.t.toLowerCase().includes(q)||h.n.toLowerCase().includes(q)){
        matches.push({...h,sid});
      }
    });
  });
  matches=matches.slice(0,15);
  if(!matches.length){res.innerHTML='<div class="search-result"><span style="color:var(--txt)">No results</span></div>';return}
  res.innerHTML=matches.map(m=>`<div class="search-result" onmousedown="go('${m.sid}');setTimeout(()=>oSt('${m.t}'),100)">
    <span><span class="sr-ticker">${m.t}</span> ${m.n}</span>
    <span class="sr-meta">${m.sid}${m.sec?' | '+m.sec:''} | ${fp(m.a)}%</span>
  </div>`).join('');
}

// ===== CSV EXPORT =====
function exportCSV(tableEl,filename){
  if(typeof tableEl==='string')tableEl=document.querySelector(tableEl);
  if(!tableEl)return;
  let rows=[...tableEl.querySelectorAll('tr')];
  let csv=rows.map(r=>[...r.querySelectorAll('th,td')].map(c=>'"'+c.textContent.trim().replace(/"/g,'""')+'"').join(',')).join('\n');
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(filename||'export')+'.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== FACTSET API WRAPPER =====
async function fetchFromAPI(endpoint,params={}){
  let cfg={};
  try{cfg=JSON.parse(localStorage.getItem('rr_config')||'{}')}catch(e){}
  if(!cfg.apiUrl||!cfg.apiKey){throw new Error('API not configured')}
  let url=cfg.apiUrl.replace(/\/$/,'')+'/'+endpoint;
  let qs=new URLSearchParams(params).toString();
  if(qs)url+='?'+qs;
  let retries=3;
  for(let i=0;i<retries;i++){
    try{
      let resp=await fetch(url,{headers:{'Authorization':'Bearer '+cfg.apiKey,'Content-Type':'application/json'}});
      if(!resp.ok)throw new Error('HTTP '+resp.status);
      return await resp.json();
    }catch(e){
      if(i===retries-1)throw e;
      await new Promise(r=>setTimeout(r,1000*Math.pow(2,i)));
    }
  }
}

// ===== METRIC DRILL (Summary Card Click) =====
let _metricRange='All';
let _facDrillRange='All';

function oDrMetric(metric,range){
  let m=$('metricModal');

  // Factor risk — delegate to the richer top-contributors modal
  if(metric==='fac'){oDrFacRiskBreak();return;}

  // Idiosyncratic risk — show top 5 contributors
  if(metric==='idio'){
    let eqHold=cs.hold.filter(h=>!isCash(h)&&h.p>0).sort((a,b)=>Math.abs(b.mcr||0)-Math.abs(a.mcr||0));
    let top5=eqHold.slice(0,5);
    $('metricContent').innerHTML=`
      <h2>Idiosyncratic Risk — Top Contributors<button class="close" onclick="$('metricModal').classList.remove('show')">&times;</button></h2>
      <p style="font-size:11px;color:var(--txt);margin-bottom:12px">Top 5 securities by stock-specific TE contribution. Click a row to view holding detail.</p>
      <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">%S</th>${ORVQ_TH_PLAIN}</tr></thead>
      <tbody>${top5.map(h=>`<tr class="clickable" onclick="$('metricModal').classList.remove('show');oSt('${h.t}')">
        <td style="color:var(--txth);font-weight:600">${h.t}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.n}</td>
        <td class="r" style="font-weight:700;color:var(--acc)">${f2(h.mcr,2)}%</td>
        ${rORVQCells(h)}
      </tr>`).join('')}</tbody></table>`;
    m.classList.add('show');
    return;
  }

  let fullHist=cs.hist.sum||cs.hist.summary||[];
  if(!fullHist||!fullHist.length){console.warn('oDrMetric: no history data for',metric);return;}
  if(range!=null)_metricRange=range;
  // Slice to range: 3M≈13wk, 6M≈26wk, 1Y≈52wk, 3Y≈156wk, All=all
  let rangeWks={All:Infinity,'3Y':156,'1Y':52,'6M':26,'3M':13};
  let wks=rangeWks[_metricRange]||Infinity;
  let hist=wks===Infinity?fullHist:fullHist.slice(-wks);
  if(!hist.length)hist=fullHist;

  let labels={te:'Tracking Error',as:'Active Share',beta:'Beta',h:'Holdings Count',sr:'Selection Rate',cash:'Cash %'};
  let units={te:'%',as:'%',beta:'',h:'',sr:'%',cash:'%'};
  let thresholds={
    te:[{v:5,c:'#10b981',l:'5% floor',dir:'floor'},{v:10,c:'#ef4444',l:'10% ceiling',dir:'ceil'}],
    beta:[{v:0.9,c:'#a78bfa',l:'0.9',dir:'floor'},{v:1.1,c:'#a78bfa',l:'1.1',dir:'ceil'}]
  };
  // Per-metric y-axis range
  let yRanges={te:[3,10],as:[75,100],beta:[0.65,1.35],sr:[40,100],cash:[0,10]};

  let vals=hist.map(h=>{let v=h[metric];return typeof v==='number'?v:parseFloat(v)||0;});
  let dates=hist.map(h=>isoDate(h.d));
  let current=vals[vals.length-1];
  let numVals=vals.filter(v=>v!=null);
  let min=numVals.length?Math.min(...numVals):null;
  let max=numVals.length?Math.max(...numVals):null;
  let avg=numVals.length?(numVals.reduce((a,v)=>a+v,0)/numVals.length):null;
  let stddev=numVals.length>1&&avg!=null?Math.sqrt(numVals.reduce((a,v)=>a+(v-avg)**2,0)/numVals.length):0;
  let totalMonths=fullHist.length;
  let inception=fullHist[0].d;
  let dec=metric==='beta'?3:2;

  // Find threshold breaches
  let breaches=[];
  (thresholds[metric]||[]).forEach(t=>{
    hist.forEach(h=>{
      if(metric==='te'){
        if(t.dir==='ceil'&&h[metric]>=t.v)breaches.push({date:isoDate(h.d),val:h[metric],label:'above '+t.l});
        if(t.dir==='floor'&&h[metric]<t.v)breaches.push({date:isoDate(h.d),val:h[metric],label:'below '+t.l});
      }
      if(metric==='beta'&&Math.abs(h[metric]-1)>Math.abs(t.v-1)){
        breaches.push({date:isoDate(h.d),val:h[metric],label:h[metric]>1?'above '+t.l:'below '+t.l});
      }
    });
  });

  // Current value color
  let valColor='var(--txth)';
  if(metric==='te')valColor=current>=10?'var(--neg)':current<5?'var(--warn)':'var(--pos)';

  // Metric-specific extra content
  let extraHtml='';
  if(metric==='beta'){
    // Build beta variants — only show what has data
    let betas=cs.sum.betas||{};
    // Show only real betas from parser; if none, show predicted beta only
    if(!Object.keys(betas).length&&cs.sum.beta!=null){
      betas={'Predicted Beta':cs.sum.beta};
    }
    // Store for chart overlay use
    window._betaVariants=betas;
    window._betaSelected=window._betaSelected||new Set();
    let betaColors=['#10b981','#a78bfa','#ef4444','#8b5cf6','#6366f1','#ec4899','#f97316','#22c55e'];
    let betaEntries=Object.entries(betas);
    let betaRows=betaEntries.map(([k,v],i)=>{
      if(v==null)return'';
      let dev=Math.abs(v-1);
      let cls=dev>0.15?'neg':dev>0.08?'warn-t':'pos';
      let sel=window._betaSelected.has(k);
      let col=betaColors[i%betaColors.length];
      return`<tr class="clickable" style="${sel?'background:rgba(99,102,241,.1)':''}" onclick="toggleBetaOverlay('${k.replace(/'/g,"\\'")}',this)">
        <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col};margin-right:6px;vertical-align:middle;${sel?'box-shadow:0 0 4px '+col:'opacity:.4'}"></span><span style="color:var(--txth)">${k}</span></td>
        <td class="r ${cls}" style="font-weight:600">${f2(v,3)}</td>
        <td class="r" style="font-size:10px;color:var(--txt)">${v>1?'+':''}${f2((v-1)*100,1)}%</td>
        <td class="r" style="font-size:9px;color:${sel?'var(--pri)':'var(--txt)'}">${sel?'ON CHART':'click to overlay'}</td>
      </tr>`;
    }).filter(Boolean).join('');
    extraHtml=`<div style="margin-top:12px">
      <div class="card-title">Beta Measures — click to overlay on chart</div>
      <table style="font-size:11px"><thead><tr><th>Measure</th><th class="r">Value</th><th class="r">Dev</th><th class="r"></th></tr></thead><tbody>${betaRows}</tbody></table>
      <p style="font-size:9px;color:var(--txt);margin-top:6px">Only measures with data are shown. Add more under <code style="background:var(--surf);padding:1px 4px;border-radius:3px;font-size:9px">sum.betas</code> in JSON.</p>
    </div>`;
  }
  if(metric==='as'){
    // Show total portfolio weight and top 10 benchmark weights
    let totalPortWt=cs.hold.reduce((a,h)=>a+h.p,0);
    let top10bm=[...cs.hold].sort((a,b)=>b.b-a.b).slice(0,10);
    extraHtml=`<div class="grid g2" style="margin-top:16px">
      <div>
        <div class="card-title">Portfolio Summary</div>
        <table>
          <tr><td>Total Portfolio Weight</td><td class="r" style="font-weight:600;color:var(--txth)">${f2(totalPortWt,1)}%</td></tr>
          <tr><td>Equity Holdings</td><td class="r">${equityCount(cs.hold)}</td></tr>
          <tr><td>Total Positions (incl. cash)</td><td class="r" style="font-size:10px;color:var(--txt)">${cs.hold.length}</td></tr>
          <tr><td>Benchmark Holdings</td><td class="r">${cs.sum.bh||'—'}</td></tr>
          <tr><td>Selection Rate</td><td class="r">${cs.sum.sr!=null?f2(cs.sum.sr)+'%':'—'}</td></tr>
        </table>
      </div>
      <div>
        <div class="card-title">Top 10 Benchmark Weights</div>
        <div style="max-height:200px;overflow-y:auto">
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">BM Wt</th><th class="r">Held?</th></tr></thead>
        <tbody>${top10bm.map(h=>`<tr>
          <td style="color:var(--txth);font-weight:500">${h.t}</td><td>${h.n}</td>
          <td class="r">${f2(h.b)}%</td>
          <td class="r">${h.p>0?'<span style="color:var(--pos)">'+f2(h.p)+'%</span>':'<span style="color:var(--neg)">No</span>'}</td>
        </tr>`).join('')}</tbody></table>
        </div>
      </div>
    </div>`;
  }
  if(metric==='h'){
    let eqHold=cs.hold.filter(h=>!isCash(h));
    let cashHold=cs.hold.filter(h=>isCash(h));
    // Sector distribution of equity holdings
    let secCounts={};
    eqHold.forEach(h=>{if(h.sec){secCounts[h.sec]=(secCounts[h.sec]||0)+1}});
    let secRows=Object.entries(secCounts).sort((a,b)=>b[1]-a[1]).map(([sec,ct])=>`<tr><td style="color:var(--txth)">${sec}</td><td class="r" style="font-weight:600">${ct}</td><td class="r" style="color:var(--txt)">${f2(ct/eqHold.length*100,1)}%</td></tr>`).join('');
    let cashRows=cashHold.map(h=>`<tr><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}%</td></tr>`).join('');
    extraHtml=`<div class="grid g2" style="margin-top:16px">
      <div>
        <div class="card-title">Equity Holdings by Sector (${eqHold.length} names)</div>
        <div style="max-height:200px;overflow-y:auto">
        <table style="font-size:11px"><thead><tr><th>Sector</th><th class="r">Count</th><th class="r">% of Port</th></tr></thead><tbody>${secRows}</tbody></table>
        </div>
      </div>
      <div>
        <div class="card-title">Cash / Currency Baskets (${cashHold.length})</div>
        ${cashHold.length?`<table style="font-size:11px"><thead><tr><th>Ticker</th><th>Name</th><th class="r">Weight</th></tr></thead><tbody>${cashRows}</tbody></table>`:'<p style="font-size:11px;color:var(--txt)">No cash positions identified</p>'}
        <p style="font-size:9px;color:var(--txt);margin-top:8px">Cash baskets are excluded from the Holdings count. Detected by ticker (currencies), name, or sector classification.</p>
      </div>
    </div>`;
  }
  if(metric==='sr'){
    let eqH=equityCount(cs.hold);
    let bh=cs.sum.bh||0;
    let computed=bh>0?+(eqH/bh*100).toFixed(2):0;
    extraHtml=`<div style="margin-top:16px">
      <div class="card-title">Selection Rate Breakdown</div>
      <table style="font-size:11px">
        <tr><td>Equity Holdings</td><td class="r" style="font-weight:600;color:var(--txth)">${eqH}</td></tr>
        <tr><td>Benchmark Constituents</td><td class="r" style="font-weight:600;color:var(--txth)">${bh||'—'}</td></tr>
        <tr><td>Computed Rate</td><td class="r" style="font-weight:600;color:var(--pri)">${bh?f2(computed)+'%':'—'}</td></tr>
        <tr><td>Reported Rate (Hit Rate)</td><td class="r">${cs.sum.sr!=null?f2(cs.sum.sr)+'%':'— (not in export)'}</td></tr>
      </table>
      <p style="font-size:9px;color:var(--txt);margin-top:6px">Selection rate = portfolio equity holdings ÷ benchmark constituents. A lower rate means a more concentrated portfolio.</p>
    </div>`;
  }
  if(metric==='cash'){
    let cashHold=cs.hold.filter(h=>isCash(h));
    let totalCashWt=cashHold.reduce((a,h)=>a+h.p,0);
    let cashRows=cashHold.map(h=>`<tr><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r" style="font-weight:600">${f2(h.p)}%</td></tr>`).join('');
    extraHtml=`<div style="margin-top:16px">
      <div class="card-title">Cash Composition</div>
      ${cashHold.length?`<table style="font-size:11px"><thead><tr><th>Ticker</th><th>Name</th><th class="r">Weight</th></tr></thead>
        <tbody>${cashRows}
        <tr style="border-top:1px solid var(--grid);font-weight:700"><td colspan="2">Total Cash</td><td class="r">${f2(totalCashWt)}%</td></tr>
        </tbody></table>`:'<p style="font-size:11px;color:var(--txt)">No explicit cash positions detected</p>'}
      <p style="font-size:9px;color:var(--txt);margin-top:6px">Reported cash: ${f2(cs.sum.cash)}%. Cash includes currency baskets, money market, and collateral positions.</p>
    </div>`;
  }

  // Compact breach display
  let breachHtml='';
  if(breaches.length){
    // Group consecutive breaches, just show date ranges
    let grouped=[];
    let cur=null;
    breaches.forEach(b=>{
      if(cur&&cur.label===b.label){cur.end=b.date;cur.count++}
      else{if(cur)grouped.push(cur);cur={start:b.date,end:b.date,label:b.label,count:1,peak:b.val}}
      if(Math.abs(b.val)>Math.abs(cur.peak))cur.peak=b.val;
    });
    if(cur)grouped.push(cur);
    breachHtml=`<div style="margin-top:12px"><div class="card-title">Threshold Events (${breaches.length} months)</div>
      <div style="max-height:100px;overflow-y:auto">
      <table style="font-size:11px"><thead><tr><th>Period</th><th class="r">Months</th><th class="r">Peak</th><th>Type</th></tr></thead>
      <tbody>${grouped.slice(-10).map(g=>`<tr>
        <td style="color:var(--txth)">${g.start.slice(0,7)}${g.start!==g.end?' → '+g.end.slice(0,7):''}</td>
        <td class="r">${g.count}</td>
        <td class="r" style="font-weight:600">${f2(g.peak,dec)}</td>
        <td><span class="pill ${g.label.includes('above')?'pill-neg':'pill-pos'}" style="font-size:9px">${g.label}</span></td>
      </tr>`).join('')}</tbody></table></div></div>`;
  }

  let rangeBtns=['3M','6M','1Y','3Y','All'].map(r=>`<button class="range-btn${_metricRange===r?' active':''}" onclick="oDrMetric('${metric}','${r}')">${r}</button>`).join('');
  $('metricContent').innerHTML=`
    <h2>${labels[metric]||metric}<button class="close" onclick="$('metricModal').classList.remove('show')">&times;</button></h2>
    <div class="grid g4" style="margin-bottom:12px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Current</div><div style="font-size:18px;font-weight:700;color:${valColor}">${f2(current,dec)}${units[metric]}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Avg</div><div style="font-size:18px;font-weight:700;color:var(--txt)">${f2(avg,dec)}${units[metric]}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Min</div><div style="font-size:18px;font-weight:700;color:var(--pos)">${f2(min,dec)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Max</div><div style="font-size:18px;font-weight:700;color:var(--neg)">${f2(max,dec)}</div></div>
    </div>
    <div class="range-btns">${rangeBtns}</div>
    <div style="font-size:10px;color:var(--txt);margin-bottom:6px">Since ${inception} | ${fullHist.length} wks total | Showing: ${hist.length} wks</div>
    <div id="metricChartDiv" style="height:300px"></div>
    ${breachHtml}
    ${extraHtml}`;
  m.classList.add('show');

  setTimeout(()=>{
    let shapes=[];
    (thresholds[metric]||[]).forEach(t=>{
      shapes.push({type:'line',y0:t.v,y1:t.v,xref:'paper',x0:0,x1:1,line:{color:t.c,dash:'dash',width:1}});
    });
    if(metric==='te'){
      shapes.push({type:'rect',y0:5,y1:10,xref:'paper',x0:0,x1:1,fillcolor:'rgba(16,185,129,.06)',line:{width:0}});
    }
    let annotations=breaches.slice(-5).map(b=>({x:b.date,y:b.val,text:'!',showarrow:true,arrowhead:2,arrowcolor:'#ef4444',font:{size:10,color:'#ef4444'}}));
    let yRange=yRanges[metric]||undefined;
    let yaxis={...plotBg.yaxis,title:labels[metric]+(units[metric]?' ('+units[metric]+')':'')};
    if(yRange){yaxis.range=yRange;yaxis.autorange=false;}
    if(metric==='h'){yaxis.rangemode='tozero';yaxis.dtick=Math.max(1,Math.ceil((max-min)/6))}
    let maxTicks=Math.min(8,Math.ceil(dates.length/12));
    let xaxis={...plotBg.xaxis,tickangle:0,nticks:maxTicks,tickformat:'%b %Y',tickfont:{size:10,color:THEME().tick}};
    let fillColor=metric==='beta'?'rgba(99,102,241,.04)':'rgba(99,102,241,.08)';
    let fill=metric==='beta'?'none':'tozeroy';
    // Build traces: [upper_band, lower_band(fill), main_line]
    let allTraces=[];
    if(avg!=null&&stddev>0){
      allTraces.push(
        {x:dates,y:dates.map(()=>avg+stddev),type:'scatter',mode:'lines',line:{color:'transparent'},showlegend:false,hoverinfo:'skip'},
        {x:dates,y:dates.map(()=>avg-stddev),type:'scatter',mode:'lines',line:{color:'transparent'},fill:'tonexty',fillcolor:'rgba(148,163,184,0.10)',showlegend:false,hoverinfo:'skip',name:'±1σ'}
      );
      shapes.push({type:'line',y0:avg,y1:avg,xref:'paper',x0:0,x1:1,line:{color:THEME().tick,dash:'dash',width:1}});
      annotations.push({x:1,xref:'paper',y:avg,text:'avg',showarrow:false,font:{size:9,color:THEME().tick},xanchor:'left',xshift:4});
    }
    // Main data line — on top, always visible
    allTraces.push({x:dates,y:vals,type:'scatter',mode:'lines',name:labels[metric],
      line:{color:THEME().tickH,width:2.5},connectgaps:true,
      hovertemplate:'%{x|%b %d %Y}<br>'+labels[metric]+': %{y:.2f}'+(units[metric]||'')+'<extra></extra>'});
    // Beta overlays
    if(metric==='beta'&&window._betaVariants&&window._betaSelected){
      let betaColors=['#10b981','#a78bfa','#ef4444','#8b5cf6','#6366f1','#ec4899','#f97316','#22c55e'];
      let entries=Object.entries(window._betaVariants);
      entries.forEach(([k,v],i)=>{
        if(window._betaSelected.has(k)&&v!=null){
          shapes.push({type:'line',y0:v,y1:v,xref:'paper',x0:0,x1:1,line:{color:betaColors[i%betaColors.length],width:2,dash:'dot'}});
          annotations.push({x:1,xref:'paper',y:v,text:k.replace(/Beta\s*/i,'').replace(/[()]/g,''),showarrow:false,font:{size:9,color:betaColors[i%betaColors.length]},xanchor:'left',xshift:4});
        }
      });
    }
    let xaxisFinal={...xaxis,type:'date',rangeslider:{visible:true,bgcolor:THEME().card,thickness:0.08}};
    Plotly.newPlot('metricChartDiv',allTraces,{...plotBg,xaxis:xaxisFinal,yaxis,shapes,annotations,hovermode:'x unified',margin:{...plotBg.margin,r:metric==='beta'?80:20}},modalPlotCfg);
  },50);
}

function toggleBetaOverlay(key){
  if(!window._betaSelected)window._betaSelected=new Set();
  if(window._betaSelected.has(key))window._betaSelected.delete(key);
  else window._betaSelected.add(key);
  // Re-render the whole modal to update both table highlights and chart
  oDrMetric('beta',0);
}

function oDrCountry(name){
  let m=$('countryModal');
  let holdings=cs.hold.filter(h=>h.co===name);
  let country=cs.countries.find(c=>c.n===name);
  let region=CMAP[name]||'Other';
  let regData=cs.regions.find(r=>r.n===region);

  let holdRows=holdings.sort((a,b)=>(b.tr||0)-(a.tr||0)).map(h=>`<tr class="clickable" onclick="$('countryModal').classList.remove('show');oSt('${h.t}')">
    <td style="color:var(--txth);font-weight:600">${h.t}</td>
    <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis">${h.n}</td>
    <td><span class="chip">${h.sec||'—'}</span></td>
    <td class="r">${f2(h.p,1)}</td>
    <td class="r ${activeStyle(h.a)}">${fp(h.a,1)}</td>
    <td class="r">${f2(h.mcr,2)}</td>
    <td class="r" style="color:var(--pos);font-weight:600">${fp(h.tr,1)}</td>
    ${rORVQCells(h)}
  </tr>`).join('');

  $('countryContent').innerHTML=`
    <h2>${name}<button class="close" onclick="$('countryModal').classList.remove('show')">&times;</button></h2>
    <div class="grid g3" style="margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Port Weight</div><div style="font-size:18px;font-weight:700;color:var(--txth)">${country?f2(country.p):'—'}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Active Weight</div><div style="font-size:18px;font-weight:700;color:${country&&country.a>=0?'var(--pos)':'var(--neg)'}">${country?fp(country.a):'—'}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Region</div><div style="font-size:14px;font-weight:600;color:var(--txth)">${region}</div><div style="font-size:10px;color:var(--txt)">Active: ${regData?fp(regData.a):'—'}%</div></div>
    </div>
    ${renderCountryAttribSection(name)}
    <div class="card-title">Holdings in ${name} (${holdings.length})</div>
    ${holdings.length?`<table><thead><tr><th>Ticker</th><th>Name</th><th>Sector</th><th class="r">Port%</th><th class="r">Active</th><th class="r tip" data-tip="Stock-specific TE component">%S</th><th class="r tip" data-tip="% of total portfolio tracking error">Total TE%</th>${ORVQ_TH_PLAIN}</tr></thead><tbody>${holdRows}</tbody></table>`:'<p style="color:var(--txt);font-size:12px">No holdings in this country</p>'}`;
  m.classList.add('show');
  setTimeout(()=>renderCountryAttribChart(name),0);
}

function renderCountryAttribSection(name){
  let sa=cs&&cs.snap_attrib; if(!sa||!sa[name])return'';
  if(classifyAttrib(name)!=='country')return'';
  let item=sa[name], hist=item.hist||[];
  let nm=name.replace(/'/g,"\\'");
  return `
    <div class="card-title" style="margin-top:16px">FactSet Attribution — ${name}</div>
    <div class="grid g4" style="margin-bottom:8px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Cumulative Impact</div><div style="font-size:16px;font-weight:700;color:${(item.full_period_imp||0)>=0?'var(--pos)':'var(--neg)'}">${fp(item.full_period_imp,2)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Exposure</div><div style="font-size:16px;font-weight:700;color:var(--txth)">${f2(item.exp,2)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Std Dev</div><div style="font-size:16px;font-weight:700;color:var(--txt)">${f2(item.dev,1)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Weeks</div><div style="font-size:16px;font-weight:700;color:var(--txt)">${hist.length}</div></div>
    </div>
    <div id="countryAttribChart" style="height:160px"></div>
    <p style="font-size:9px;color:var(--txt);margin-top:4px">Cumulative factor attribution impact (FactSet) · <span style="cursor:pointer;color:var(--pri)" onclick="$('countryModal').classList.remove('show');oDrAttrib('${nm}')">Open full attribution drill →</span></p>`;
}
function renderCountryAttribChart(name){
  let sa=cs&&cs.snap_attrib; if(!sa||!sa[name])return;
  if(classifyAttrib(name)!=='country')return;
  let hist=sa[name].hist||[]; if(!hist.length)return;
  if(!document.getElementById('countryAttribChart'))return;
  let dates=hist.map(h=>isoDate(h.d));
  let cimp=hist.map(h=>h.cimp);
  Plotly.newPlot('countryAttribChart',[{
    x:dates,y:cimp,type:'scatter',mode:'lines',
    line:{color:'#6366f1',width:2},fill:'tozeroy',fillcolor:'rgba(99,102,241,0.1)',
    hovertemplate:'%{x|%b %d %Y}<br>Cum: %{y:.2f}%<extra></extra>'
  }],{...plotBg,margin:{l:40,r:10,t:6,b:24},
    xaxis:{...plotBg.xaxis,tickformat:'%b %y',nticks:6},
    yaxis:{...plotBg.yaxis},
    shapes:[{type:'line',y0:0,y1:0,xref:'paper',x0:0,x1:1,line:{color:THEME().tick,dash:'dot',width:1}}]
  },modalPlotCfg);
}

// ===== GROUP DRILL =====
function oDrGroup(groupName){
  let m=$('groupModal');
  let subgroups=cs.groups.filter(g=>g.n===groupName);
  // Find all holdings in sectors belonging to this group (match by subgroup name in GROUPS_DEF)
  let groupDef=GROUPS_DEF.filter(gd=>gd.sg===groupName||gd.sg===groupName.toUpperCase());
  let groupSecs=new Set();
  groupDef.forEach(gd=>gd.secs.forEach(s=>groupSecs.add(s)));
  let holdings=cs.hold.filter(h=>groupSecs.has(h.sec)).sort((a,b)=>b.p-a.p);
