function oDrRiskBudget(){
  let m=$('riskBudgetModal');
  let facs=(cs.factors||[]).filter(f=>f&&f.n&&isFinite(f.c));
  let total=facs.reduce((a,f)=>a+Math.abs(f.c),0)||1;
  let intentionalSigma=_thresholds.intentionalFactorSigma??_thresholdsDefault.intentionalFactorSigma;

  let details=facs.map(f=>{
    let pctOfTotal=Math.abs(f.c)/total*100;
    let intentional=Math.abs(f.a??0)>intentionalSigma;
    return{n:f.n,e:f.a,c:f.c,pct:pctOfTotal,mcr:+(f.c*cs.sum.te/100||0).toFixed(3),intentional};
  }).sort((a,b)=>b.pct-a.pct);

  let rows=details.map(d=>`<tr>
    <td style="color:var(--txth);font-weight:500">${d.n}</td>
    <td class="r ${d.e!=null?(d.e>=0?'pos':'neg'):''}">${fp(d.e,3)}</td>
    <td class="r">${f2(d.c)}</td>
    <td class="r">${f2(d.pct,1)}%</td>
    <td class="r">${fp(d.mcr,3)}</td>
    <td class="r"><span class="pill ${d.intentional?'pill-pos':'pill-neg'}">${d.intentional?'Intentional':'Unintentional'}</span></td>
  </tr>`).join('');

  $('riskBudgetContent').innerHTML=`
    <h2>Factor Risk Budget — Detailed<button class="close" onclick="$('riskBudgetModal').classList.remove('show')">&times;</button></h2>
    <div class="grid g2" style="margin-bottom:16px">
      <div><div id="rbPieDiv" style="height:280px"></div></div>
      <div>
        <div class="card-title">Breakdown</div>
        <table><thead><tr><th>Factor</th><th class="r">Exposure</th><th class="r">Contrib%</th><th class="r">% of Total</th><th class="r">MCR</th><th class="r">Type</th></tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>
    <div class="card-title">Risk Budget Bars</div>
    <div id="rbBarDiv" style="height:200px"></div>`;
  m.classList.add('show');

  setTimeout(()=>{
    let posColor=getComputedStyle(document.body).getPropertyValue('--pos').trim()||'#10b981';
    let negColor=getComputedStyle(document.body).getPropertyValue('--neg').trim()||'#ef4444';
    let priColor=getComputedStyle(document.body).getPropertyValue('--pri').trim()||'#6366f1';
    Plotly.newPlot('rbPieDiv',[{
      labels:details.map(d=>d.n),values:details.map(d=>d.pct),type:'pie',hole:0.45,
      marker:{colors:details.map(d=>d.c>=0?negColor:posColor)},
      textinfo:'label+percent',textfont:{size:10,color:THEME().tickH}
    }],{...plotBg,margin:{l:10,r:10,t:10,b:10},showlegend:false},plotCfg);

    Plotly.newPlot('rbBarDiv',[
      {x:details.map(d=>d.n),y:details.map(d=>d.pct),type:'bar',name:'% of Total Risk',marker:{color:details.map(d=>d.intentional?priColor:negColor)},
      text:details.map(d=>f2(d.pct,1)+'%'),textposition:'outside',textfont:{size:10,color:THEME().tick}}
    ],{...plotBg,yaxis:{...plotBg.yaxis,title:'% of Total Risk'},xaxis:{...plotBg.xaxis}},plotCfg);
  },50);
}

function aggregateCountryRisk(s){
  let agg={};
  (s.hold||[]).forEach(h=>{
    if(!h.co||isCash(h))return;
    if(!agg[h.co])agg[h.co]={tr:0,mcr:0,p:0,facContr:{},facExp:{}};
    let a=agg[h.co];
    a.tr+=(h.tr||0);
    a.mcr+=(h.mcr||0);
    a.p+=(h.p||0);
    let fc=h.factor_contr||h.fac;
    if(fc&&typeof fc==='object'){
      for(let[k,v]of Object.entries(fc)){
        if(v==null||!isFinite(v))continue;
        a.facContr[k]=(a.facContr[k]||0)+v;
        if(!a.facExp[k])a.facExp[k]={wsum:0,wtotal:0};
        a.facExp[k].wsum+=v*(h.p||0);
        a.facExp[k].wtotal+=(h.p||0);
      }
    }
  });
  return agg;
}

function facGrpColor(name){
  let n=(name||'').toLowerCase();
  if(n.includes('market'))return'#6366f1';
  if(n.includes('value')||n.includes('dividend'))return'#f59e0b';
  if(n.includes('growth'))return'#10b981';
  if(n.includes('momentum'))return'#34d399';
  if(n.includes('volatil')||n.includes('sensitivity'))return'#ef4444';
  if(n.includes('profit')||n.includes('quality'))return'#a78bfa';
  if(n.includes('size')||n.includes('small'))return'#38bdf8';
  if(n.includes('industry'))return'#fb923c';
  if(n.includes('countr')||n.includes('region'))return'#f472b6';
  if(n.includes('specific')||n.includes('idio'))return'#94a3b8';
  return'#8b5cf6';
}

    text:facs.map(function(f){return shortName(f.n);}),
    textposition:facs.map(function(f){return f.a>=0?'middle right':'middle left';}),
    textfont:{size:10,color:'#cbd5e1'},
    marker:{
      size:facs.map(function(f){return sizeScale(f.c||0);}),

function _fsScat_selectHold(ticker){
  if(!window._fsScatHold)return;
  let hold=window._fsScatHold;
  let idx=hold.findIndex(function(h){return h.t===ticker;});
  if(idx<0)return;
  // Highlight point on chart
  let n=hold.length;
  let sz=hold.map(function(h){return Math.max(Math.sqrt(h.p||0)*9,5);});
  let op=hold.map(function(_,i){return i===idx?1:0.2;});
  sz[idx]=sz[idx]*1.4;
  try{Plotly.restyle('fsChartDiv',{'marker.opacity':[op],'marker.size':[sz]});}catch(e){}
  _renderFsScatPanel(hold,ticker);
}

    '<div style="margin-top:8px"><div style="font-size:10px;font-weight:700;color:#64748b;margin-bottom:4px">FACTOR CONTRIBUTIONS</div>'+
    facEntries.map(function([k,v]){

      return'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'+
        '<div style="font-size:10px;color:#94a3b8;width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+k.replace('Medium-Term ','')+'</div>'+
        '<div style="flex:1;height:5px;background:#1e293b;border-radius:2px"><div style="width:'+Math.min(pct*4,100)+'%;height:100%;background:'+(v>=0?'#10b981':'#ef4444')+';border-radius:2px"></div></div>'+

function renderFsCountry(s){
  let countries=s.countries||[];
  if(!countries.length){$('fsChartDiv').innerHTML='<p style="color:var(--txt);padding:20px;text-align:center">No country data available</p>';return;}
  _renderFsCtryMap(s);
  _renderFsCtryPanel(s);
}

function _fsCtryGetVal(mode,param,s){
  let agg=aggregateCountryRisk(s);
  let T=THEME();
  if(mode==='port')return{get:c=>c.p||0,title:'Port %',diverge:false,scale:[[0,T.heatMid],[1,'#6366f1']]};
  if(mode==='bench')return{get:c=>c.b||0,title:'BM %',diverge:false,scale:[[0,T.heatMid],[1,'#8b5cf6']]};
  if(mode==='te')return{get:c=>(agg[c.n]?.tr||0),title:'TE Contrib %',diverge:false,scale:[[0,T.heatMid],[0.5,'#f59e0b'],[1,'#ef4444']]};
  if(mode==='specific')return{get:c=>(agg[c.n]?.mcr||0),title:'Specific Risk %',diverge:false,scale:[[0,T.heatMid],[0.5,'#f59e0b'],[1,'#ef4444']]};
  if(mode==='factor_te')return{get:c=>{let r=agg[c.n];return r?(r.tr-r.mcr):0;},title:'Factor Risk %',diverge:true,scale:[[0,'#d67272'],[0.5,T.heatMid],[1,'#10b981']]};
  if(mode.startsWith('fc:')){
    let facName=mode.slice(3);
    if(param==='contr'){
      return{get:c=>{let r=agg[c.n];return r?.facContr[facName]||0;},
        title:facName+' Contr',diverge:true,scale:[[0,'#d67272'],[0.5,T.heatMid],[1,'#10b981']]};
    }
    return{get:c=>{let r=agg[c.n];if(!r)return 0;let fc=r.facContr[facName];if(fc==null)return 0;return r.p>0?fc/r.p:0;},
      title:facName+' Exp',diverge:true,scale:[[0,'#d67272'],[0.5,T.heatMid],[1,'#10b981']]};
  }
  return{get:c=>c.a||0,title:'Active %',diverge:true,scale:[[0,'#ef4444'],[0.5,T.heatMid],[1,'#10b981']]};
}

function _renderFsCtryMap(s){
  let allCountries=s.countries||[];
  let countries=allCountries.filter(function(c){return COUNTRY_ISO3[c.n];});
  if(!countries.length)countries=allCountries;
  let mode=_mapColorMode||'active';
  let cfg=_fsCtryGetVal(mode,_mapFacParam,s);
  let vals=countries.map(cfg.get);
  let absMax=Math.max.apply(null,vals.map(Math.abs).concat([0.01]));
  let iso3=countries.map(function(c){return COUNTRY_ISO3[c.n]||c.iso3||c.co||c.n||'';});
  let reg=MAP_REGIONS[_mapRegion]||MAP_REGIONS.world;
  Plotly.newPlot('fsChartDiv',[{
    type:'choropleth',
    locations:iso3,locationmode:'ISO-3',
    z:vals,
    colorscale:cfg.scale,
    zmid:cfg.diverge?0:undefined,
    zmin:cfg.diverge?-absMax:0,
    zmax:cfg.diverge?absMax:undefined,
    text:countries.map(function(c){return c.n||c.co;}),
    customdata:countries.map(function(c){return[c.n||c.co,c.p,c.b,c.a];}),
    hovertemplate:'<b>%{customdata[0]}</b><br>'+cfg.title+': %{z:.2f}%<br>Port: %{customdata[1]:.1f}%<br>Active: %{customdata[3]:+.1f}%<extra></extra>',
    colorbar:{x:1,len:0.7,thickness:10,bgcolor:'rgba(0,0,0,0)',tickfont:{color:THEME().tick,size:9},title:{text:cfg.title,side:'right',font:{color:THEME().tick,size:9}}}
  }],Object.assign({},plotBg,{
    geo:{
      showframe:false,showcoastlines:true,coastlinecolor:THEME().grid,
      showland:true,landcolor:THEME().land,
      showocean:true,oceancolor:THEME().ocean,
      projection:{type:'natural earth'},
      center:{lon:reg.lon,lat:reg.lat},
      lonaxis:{range:[reg.lon-180/reg.scale,reg.lon+180/reg.scale]},
      lataxis:{range:[reg.lat-90/reg.scale,reg.lat+90/reg.scale]},
      bgcolor:THEME().card
    },
    margin:{l:0,r:0,t:8,b:0}
  }),Object.assign({},plotCfg,{staticPlot:false}));
  document.getElementById('fsChartDiv').on('plotly_click',function(data){
    if(data&&data.points&&data.points.length){let cn=data.points[0].customdata[0];if(cn)oDrCountry(cn);}
  });
}

function copySummary(){
  let s=cs;
  let pad=(str,n)=>str.toString().padEnd(n);
  let lpad=(str,n)=>str.toString().padStart(n);
  let topOW=[...s.sectors].sort((a,b)=>b.a-a.a).slice(0,3);
  let topUW=[...s.sectors].sort((a,b)=>a.a-b.a).slice(0,3);
  let sigFac=s.factors.filter(f=>Math.abs(f.a??0)>0.15).sort((a,b)=>Math.abs(b.a??0)-Math.abs(a.a??0)).slice(0,6);
  let dateStr=$('dataTimestamp').textContent||'';
  let lines=[
    `${s.name} (${s.id})  |  Benchmark: ${s.benchmark}`,
    dateStr,
    '',
    'RISK METRICS',
    `  Tracking Error : ${f2(s.sum.te)}%`,
    `  Active Share   : ${f2(s.sum.as)}%`,
    `  Beta           : ${f2(s.sum.beta,3)}`,
    `  Holdings       : ${s.sum.h} portfolio  /  ${s.sum.bh||'—'} benchmark`,
    `  Cash           : ${f2(s.sum.cash)}%`,
    '',
    'TOP SECTOR TILTS',
    ...topOW.map(x=>`  ${x.a>=0?'+':''}${fp(x.a)}%  ${x.n}`),
    ...topUW.map(x=>`  ${fp(x.a)}%  ${x.n}`),
  ];
  if(sigFac.length){
    lines.push('');
    lines.push('SIGNIFICANT FACTOR TILTS');
    sigFac.forEach(f=>lines.push(`  ${pad(f.n,24)} ${f.a>=0?'+':''}${fp(f.a,3)}`));
  }
  let topHold=[...s.hold].filter(h=>!isCash(h)).sort((a,b)=>b.p-a.p).slice(0,5);
  if(topHold.length){
    lines.push('');
    lines.push('TOP 5 HOLDINGS');
    topHold.forEach(h=>lines.push(`  ${pad(h.t,8)} ${pad(h.n,28)} ${lpad(f2(h.p),5)}%`));
  }
  let txt=lines.join('\n');
  navigator.clipboard.writeText(txt).then(()=>showToast('Summary copied to clipboard!','var(--pos)'));
}

function exportAllHoldings(){
  let s=cs;
  let allHold=[...s.hold];
  let header='"Ticker","Name","Sector","Country","Port%","Bench%","Active%","%S (Specific TE)","%T (TE Contrib)","Rank","OVER_WAvg","REV_WAvg","VAL_WAvg","QUAL_WAvg","MOM_WAvg","STAB_WAvg"';
  let rows=allHold.map(h=>[
    h.t,h.n,h.sec||'',h.co||'',h.p,h.b,h.a,h.mcr,h.tr,h.r,
    h.over,h.rev,h.val,h.qual,h.mom,h.stab
  ].map(v=>'"'+(v==null?'':String(v).replace(/"/g,'""'))+'"').join(','));
  let csv=[header,...rows].join('\n');
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`holdings_${s.id}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`Exported ${allHold.length} holdings`,'var(--pos)');
}

function generateEmailSnapshot(){
  let s=cs;
  let dateStr=$('dataTimestamp').textContent||new Date().toLocaleDateString();

  // Deltas from hist.sum
  let prevSum=s.hist&&s.hist.sum&&s.hist.sum.length>=2?s.hist.sum[s.hist.sum.length-2]:null;
  let teDelta=prevSum&&s.sum.te!=null&&prevSum.te!=null?+(s.sum.te-prevSum.te).toFixed(2):null;
  let asDelta=prevSum&&s.sum.as!=null&&prevSum.as!=null?+(s.sum.as-prevSum.as).toFixed(1):null;
  let betaDelta=prevSum&&s.sum.beta!=null&&prevSum.beta!=null?+(s.sum.beta-prevSum.beta).toFixed(3):null;
  let hDelta=prevSum&&prevSum.h?((s.sum.h||equityCount(s.hold))-prevSum.h):null;

  // Factor/idio split
  let totalFacTE=s.factors.reduce((a,f)=>a+Math.abs(f.c||0),0);
  let facPct=s.sum.te?+(totalFacTE/s.sum.te*100).toFixed(1):null;
  let idioPct=facPct!=null?+(100-facPct).toFixed(1):null;

  // Colors
  let teColor=s.sum.te>=10?'#dc2626':s.sum.te<5?'#d97706':'#059669';
  let betaColor=Math.abs((s.sum.beta||1)-1)>0.1?'#d97706':'#059669';

  // Delta formatter
  const dFmt=(v,unit='',negGood=false)=>{
    if(v==null)return'<span style="color:#94a3b8;font-size:10px">no prior</span>';
    let good=negGood?v<0:v>0;
    let col=v>0?(negGood?'#059669':'#dc2626'):(negGood?'#dc2626':'#059669');
    if(v===0)col='#94a3b8';
    let arrow=v>0?'↑':'↓';
    return`<span style="font-size:10px;color:${col}">${arrow}${Math.abs(v).toFixed(v===Math.round(v)?0:2)}${unit} vs prior</span>`;
  };

  // Section 2: Top 5 by %T
  let top5Risk=[...s.hold].filter(h=>!isCash(h)).sort((a,b)=>(b.tr||0)-(a.tr||0)).slice(0,5);
  let hold5Rows=top5Risk.map((h,i)=>`<tr style="background:${i%2?'#f9fafb':'#fff'}">
    <td style="padding:5px 10px;font-size:11px;font-weight:700;color:#1e293b">${h.t}</td>
    <td style="padding:5px 10px;font-size:11px;color:#334155;max-width:160px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${h.n}</td>
    <td style="padding:5px 10px;font-size:11px;text-align:right">${f2(h.p,1)}%</td>
    <td style="padding:5px 10px;font-size:11px;text-align:right;font-weight:700;color:#dc2626">${fp(h.tr,2)}%</td>

  </tr>`).join('');

  // Section 3: Primary factors
  let sigFac=s.factors.filter(f=>Math.abs(f.a??0)>0.1).sort((a,b)=>Math.abs(b.c||0)-Math.abs(a.c||0)).slice(0,8);
  let facRows=sigFac.map(f=>{
    let isProf=f.n==='Profitability';
    return`<tr style="background:${isProf?'rgba(5,150,105,.04)':'transparent'}">
      <td style="padding:5px 10px;font-size:11px;color:${isProf?'#059669':'#334155'};font-weight:${isProf?700:400}">${isProf?'✦ ':''}${f.n}</td>
      <td style="padding:5px 10px;font-size:11px;text-align:right;font-weight:700;color:${(f.a??0)>=0?'#059669':'#dc2626'}">${fp(f.a,3)}</td>
      <td style="padding:5px 10px;font-size:11px;text-align:right;color:#334155">${f2(f.c,2)}%</td>
    </tr>`;
  }).join('');

  // Section 4: Sector tilts
  let topOW=[...s.sectors].sort((a,b)=>b.a-a.a).slice(0,5);
  let topUW=[...s.sectors].sort((a,b)=>a.a-b.a).slice(0,5);
  let owRows=topOW.map(x=>`<tr><td style="padding:4px 10px;font-size:11px;color:#334155">${x.n}</td><td style="padding:4px 10px;font-size:11px;text-align:right;font-weight:700;color:#059669">${fp(x.a)}%</td></tr>`).join('');

// ===== FACTSET CSV PARSER v3 (section-driven, matches factset_parser_v3.py) =====
function pf(s){if(!s||!String(s).trim())return null;let v=parseFloat(s);return isNaN(v)?null:v;}
function r2(v){return v!=null?Math.round(v*100)/100:null;}
function parseDate(d){if(!d)return null;var s=String(d).trim();if(s.length===8&&/^\d{8}$/.test(s)){return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6));}return new Date(s);}
function isoDate(d){if(!d)return d;var s=String(d).trim();if(s.length===8&&/^\d{8}$/.test(s))return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6);var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');return s;}
function parseCSVLine(line){
  let result=[],cell='',inQ=false;
  for(let i=0;i<line.length;i++){
    let c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){cell+='"';i++;}else if(c==='"'){inQ=false;}else{cell+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','){result.push(cell);cell='';}else{cell+=c;}}
  }
  result.push(cell);
  return result;
}
const ACCT_MAP={'IDM':'IDM','ACWIXUS':'IOP','EM':'EM','ISC':'ISC','SCG':'SCG','ACWI':'ACWI','GSC':'GSC'};
const ACCT_NAME={'IDM':'International Developed Markets','ACWIXUS':'International Opportunities','EM':'Emerging Markets','ISC':'International Small Cap','SCG':'Small Cap Growth','ACWI':'All Country World','GSC':'Global Small Cap'};
const ACCT_BM={'IDM':'MSCI EAFE','ACWIXUS':'MSCI ACWI ex USA','EM':'MSCI Emerging Markets','ISC':'MSCI World ex USA Small Cap','SCG':'Russell 2000 Growth','ACWI':'MSCI ACWI','GSC':'MSCI ACWI Small Cap'};
const FACTOR_MAP={'Dividend Yield':'Dividend Yield','Earnings Yield':'Earnings Yield','Exchange Rate Sensitivity':'FX Sensitivity','Growth':'Growth','Leverage':'Leverage','Liquidity':'Liquidity','Market Sensitivity':'Market Sensitivity','Medium-Term Momentum':'Momentum','Profitability':'Profitability','Size':'Size','Value':'Value','Volatility':'Volatility','Market':'Market','Industry':'Industry','Country':'Country','Currency':'Currency'};
const STYLE_FACTORS=new Set(Object.values(FACTOR_MAP));
function isDate(s){return s&&/\d+\/\d+\/\d+/.test(s.trim());}
function getGroups(row,startCol,gSize){
  let groups=[];let col=startCol;
  while(col<row.length){
    let d=(row[col]||'').trim();
    if(!isDate(d)){col++;continue;}
    let m=gSize===24?col+6:col+1;
    if(m+11>=row.length)break;
    groups.push({
      date:d,
      sec:gSize===24?(row[col+1]||'').trim()||null:null,
      reg:gSize===24?(row[col+2]||'').trim()||null:null,
      co:gSize===24?(row[col+3]||'').trim()||null:null,
      ind:gSize===24?(row[col+4]||'').trim()||null:null,
      grp:gSize===24?(row[col+5]||'').trim()||null:null,
      w:pf(row[m]),bw:pf(row[m+1]),aw:pf(row[m+2]),
      pct_s:pf(row[m+3]),pct_t:pf(row[m+4]),check:pf(row[m+5]),
      over:pf(row[m+6]),rev:pf(row[m+7]),val:pf(row[m+8]),
      qual:pf(row[m+9]),mom:pf(row[m+10]),stab:pf(row[m+11])
    });
    col+=gSize;
  }
  return groups;
}

function parseFactSetCSV(csvText){
  const t0=Date.now();
  let lines=csvText.split(/\r?\n/).filter(l=>l.trim());
  let strategies={};let riskMH=null;
  
  for(let i=1;i<lines.length;i++){
    let row=parseCSVLine(lines[i]);
    if(row[0]==='Section'){
      let j=row.slice(7,50).join('|');
      if(j.includes('Total Risk')&&j.includes('% Asset Specific'))riskMH=row;
      continue;
    }
    let sec=row[0],acct=row[1];
    if(!ACCT_MAP[acct])continue;
    let sid=ACCT_MAP[acct];
    if(!strategies[sid])strategies[sid]={id:sid,name:ACCT_NAME[acct]||acct,benchmark:ACCT_BM[acct]||'',sum:{te:0,as:0,beta:1,h:0,bh:0,sr:null,cash:0},hold:[],sectors:[],regions:[],countries:[],industries:[],groups:[],factors:[],chars:[],ranks:[],unowned:[],hist:{sum:[],fac:{},sec:{}}};
    let s=strategies[sid],l2=(row[5]||'').trim();
    
    if(sec==='Sector Weights'||sec==='Country'||sec==='Region'||sec==='Industry'||sec==='Group'||sec==='Overall'||sec==='REV'||sec==='VAL'||sec==='QUAL'){
      if(!l2||l2==='Data')continue;
      let tgt=sec==='Sector Weights'?'sectors':sec==='Country'?'countries':sec==='Region'?'regions':sec==='Industry'?'industries':sec==='Group'?'groups':'ranks';
      let gs=getGroups(row,7,19);if(!gs.length)continue;
      let g=gs[gs.length-1];
      if(!s[tgt].find(x=>x.n===l2))s[tgt].push({n:l2,p:r2(g.w),b:r2(g.bw),a:r2(g.aw),mcr:r2(g.pct_s),tr:r2(g.pct_t),over:r2(g.over),rev:r2(g.rev),val:r2(g.val),qual:r2(g.qual),mom:r2(g.mom),stab:r2(g.stab)});
    }
    else if(sec==='Security'){
      if(!l2||l2==='Data')continue;
      let gs=getGroups(row,7,24);if(!gs.length)continue;
      let g=gs[gs.length-1];
      let rank=g.over,rInt=(rank!=null&&rank>=1&&rank<=5)?Math.round(rank):null;
      if(l2.startsWith('CASH_')){s.sum.cash=(s.sum.cash||0)+(g.w||0);continue;}
      s.hold.push({t:l2,n:(row[6]||'').trim()||l2,sec:g.sec||(row[8]||'').trim()||null,co:g.co||(row[10]||'').trim()||null,reg:g.reg||(row[9]||'').trim()||null,ind:g.ind||(row[11]||'').trim()||null,grp:g.grp||(row[12]||'').trim()||null,p:r2(g.w),b:r2(g.bw),a:r2(g.aw),mcr:r2(g.pct_s),tr:r2(g.pct_t),r:rInt,over:r2(g.over),rev:r2(g.rev),val:r2(g.val),qual:r2(g.qual),mom:r2(g.mom),stab:r2(g.stab)});
    }
    else if(sec==='RiskM'){
      if(l2!=='Data')continue;
      let date=(row[7]||'').trim();
      let pe_p=pf(row[9]),pb_p=pf(row[10]),pe_b=pf(row[11]),pb_b=pf(row[12]);
      let tR=pf(row[15]),bR=pf(row[16]),beta=pf(row[17]);
      let pS=pf(row[20]),pF=pf(row[21]);
      let fR={},fE={};
      if(riskMH){for(let c=23;c<Math.min(40,row.length);c++){let fn=(riskMH[c]||'').trim();if(fn&&FACTOR_MAP[fn]&&pf(row[c])!=null)fR[FACTOR_MAP[fn]]=pf(row[c]);}
      for(let c=43;c<Math.min(50,row.length);c++){let fn=(riskMH[c]||'').trim();if(fn&&FACTOR_MAP[fn]&&pf(row[c])!=null)fE[FACTOR_MAP[fn]]=pf(row[c]);}}
      if(!s.sum._rd||date>s.sum._rd){
        s.sum.te=r2(tR)||s.sum.te;s.sum.beta=r2(beta)||s.sum.beta;
        s.sum.pe_p=r2(pe_p);s.sum.pe_b=r2(pe_b);s.sum.pb_p=r2(pb_p);s.sum.pb_b=r2(pb_b);
        s.sum.pct_specific=r2(pS);s.sum.pct_factor=r2(pF);s.sum.total_risk=r2(tR);s.sum.bm_risk=r2(bR);
        s.sum._rd=date;s.sum._fr=fR;s.sum._fe=fE;
      }
      s.hist.sum.push({d:date,te:r2(tR),beta:r2(beta),pct_specific:r2(pS),pct_factor:r2(pF)});
    }
    else if(sec==='Portfolio Characteristics'){
      if(l2!=='Data')continue;
      let date=(row[7]||'').trim();
      let te=pf(row[10]),bP=pf(row[11]),h=pf(row[12]),as=pf(row[13]),mc=pf(row[14]);
      let hB=pf(row[16]),mB=pf(row[17]),ep=pf(row[18]),fc=pf(row[22]),dy=pf(row[23]),ro=pf(row[24]),om=pf(row[25]);
      let bMc=pf(row[33]),bFc=pf(row[38]),bDy=pf(row[39]),bRo=pf(row[40]),bOm=pf(row[41]),bEp=pf(row[42]);
      if(!s.sum._cd||date>s.sum._cd){
        if(te!=null)s.sum.te=r2(te);if(as!=null)s.sum.as=r2(as);if(bP!=null)s.sum.beta=r2(bP);if(h!=null)s.sum.h=Math.round(h);
        s.sum.mc=r2(mc);s.sum.roe=r2(ro);s.sum.fcfy=r2(fc);s.sum.divy=r2(dy);s.sum.epsg=r2(ep);s.sum.opmgn=r2(om);
        s.sum.betas={predicted:r2(bP),historical:r2(hB),mpt:r2(mB)};s.sum._cd=date;
        s.chars=[{m:'Market Cap ($M)',p:r2(mc),b:r2(bMc)},{m:'P/E Ratio',p:s.sum.pe_p,b:s.sum.pe_b},{m:'P/B Ratio',p:s.sum.pb_p,b:s.sum.pb_b},{m:'ROE NTM (%)',p:r2(ro),b:r2(bRo)},{m:'FCF Yield (%)',p:r2(fc),b:r2(bFc)},{m:'Div Yield (%)',p:r2(dy),b:r2(bDy)},{m:'EPS Growth 3Y (%)',p:r2(ep),b:r2(bEp)},{m:'Op Margin (%)',p:r2(om),b:r2(bOm)}];
      }
      s.hist.sum.push({d:date,te:r2(te),as:r2(as),beta:r2(bP),h:h?Math.round(h):null,cash:s.sum.cash});
    }
    else if(sec==='18 Style Snapshot'){
      if(!l2||l2==='Data')continue;
      let fname=FACTOR_MAP[l2]||l2;
      if(!STYLE_FACTORS.has(fname))continue; // skip non-style factors
      let lastE=null,lastR=null,lastI=null,col=7;
      while(col+6<row.length){
        if(isDate((row[col]||'').trim())){
          let e=pf(row[col+2]),r=pf(row[col+3]),im=pf(row[col+4]);
          if(e!=null||r!=null){lastE=e;lastR=r;lastI=im;}
        }
        col+=7;
      }
      let ex=s.factors.find(f=>f.n===fname);
      if(ex){if(lastE!=null)ex.a=r2(lastE);if(lastR!=null)ex.ret=r2(lastR);if(lastI!=null)ex.imp=r2(lastI);}
      else s.factors.push({n:fname,e:0,bm:0,a:r2(lastE),c:0,ret:r2(lastR),imp:r2(lastI)});
    }
  }
  
  for(let[sid,s]of Object.entries(strategies)){
    let fR=s.sum._fr||{},fE=s.sum._fe||{};delete s.sum._fr;delete s.sum._fe;delete s.sum._rd;delete s.sum._cd;
    for(let[fn,r]of Object.entries(fR)){let ex=s.factors.find(f=>f.n===fn);if(ex)ex.c=r2(r);else s.factors.push({n:fn,e:0,bm:0,a:r2(fE[fn]),c:r2(r),ret:null,imp:null});}
    for(let[fn,e]of Object.entries(fE)){let ex=s.factors.find(f=>f.n===fn);if(ex&&ex.a==null)ex.a=r2(e);}
    s.sum.h=s.sum.h||s.hold.filter(h=>!h.t.startsWith('CASH')).length;
    s.hist.sum.sort((a,b)=>(a.d||'').localeCompare(b.d||''));
    let seen=new Set();s.hist.sum=s.hist.sum.filter(h=>{if(seen.has(h.d))return false;seen.add(h.d);return true;});
  }
  return{strategies,validation_issues:[],report_date:'',parse_stats:{total_rows:lines.length-1,parse_time_ms:Date.now()-t0}};
}

function showValidPanel(normalizedData,parseStats,issues,filename){
  const panel=$('validPanel');
  if(!panel)return;
  const hasIssues=issues&&issues.length>0;
  const dotCls=hasIssues?'warn':'ok';
  const sc=Object.keys(normalizedData).length;
  const reps=parseStats.repair_warnings||0;
  const ms=parseStats.parse_time_ms||0;
  const summary=`${sc} strategies · ${(parseStats.total_rows||0).toLocaleString()} rows · ${(ms/1000).toFixed(1)}s${reps?' · '+reps+' comma repair'+(reps!==1?'s':''):''}${hasIssues?' · '+issues.length+' warning'+(issues.length!==1?'s':''):''}`;

  let perStrat='';
  for(const[sid,s]of Object.entries(normalizedData)){
    const ss=(parseStats.strat_stats||{})[sid]||{};
    const secSum=s.sectors.reduce((a,x)=>a+(x.p||0),0);
    const ctrySum=s.countries.reduce((a,x)=>a+(x.p||0),0);
    const te=s.sum.te!=null?s.sum.te+'%':'--';
    const as=s.sum.as!=null?s.sum.as+'%':'--';
    const beta=s.sum.beta!=null?s.sum.beta:'--';
    perStrat+=`<div class="valid-strat">
      <div class="vs-name">${sid} — ${s.name}</div>
      <div class="vs-row"><span>${s.hold.length} holdings · ${s.sectors.length} sectors · ${s.countries.length} countries · ${s.factors.length} factors</span><span style="color:var(--pos)">TE ${te} · AS ${as} · β ${beta}</span></div>
      <div class="vs-row"><span>Sector sum ${secSum.toFixed(1)}% · Country sum ${ctrySum.toFixed(1)}%</span><span>${(ss.factorDates||[]).length} factor dates</span></div>
    </div>`;
  }

  let issueHtml='';
  if(hasIssues){
    issueHtml=issues.map(i=>`<div class="valid-issue">⚠ ${i}</div>`).join('');
  }

  panel.innerHTML=`<div class="valid-panel">
    <div class="valid-header" onclick="toggleValidPanel()">
      <div class="valid-dot ${dotCls}"></div>
      <div class="valid-summary">${filename} — ${summary}</div>
      <div class="valid-toggle" id="validToggle">▼</div>
    </div>
    <div class="valid-body" id="validBody">
      ${issueHtml}
      ${perStrat}
    </div>
  </div>`;
  panel.style.display='block';
}

// ===== FACTSET NORMALIZE EXTENSION =====
function normalizeFactSet(fsResponse){
  // Transform FactSet-style response into our internal format
  // Supports: portfolioAnalytics, paEngine, spar responses
  let out={};
  let cfg={};
  try{cfg=JSON.parse(localStorage.getItem('rr_config')||'{}')}catch(e){}
  let stratMap={};
  try{stratMap=JSON.parse(cfg.stratMap||'{}')}catch(e){}

  // Reverse map: FactSet ID -> our strategy code
  let reverseMap={};
  Object.entries(stratMap).forEach(([k,v])=>reverseMap[v]=k);

  // Handle array of portfolios
  let portfolios=fsResponse.data||fsResponse.portfolios||fsResponse;
  if(!Array.isArray(portfolios))portfolios=[portfolios];

  portfolios.forEach(p=>{
    let fsId=p.portfolioId||p.id||'UNKNOWN';
    let stratId=reverseMap[fsId]||fsId;
    let stratDef=STRATS.find(s=>s.id===stratId)||{id:stratId,name:p.name||stratId,bm:p.benchmarkId||''};

    let s={
      id:stratId,name:p.name||stratDef.name,benchmark:p.benchmarkName||p.benchmarkId||stratDef.bm,
      sum:{
        te:p.trackingError||p.te||0,
        as:p.activeShare||p.as||0,
        beta:p.beta||1,
        h:p.holdingsCount||0,
        bh:p.benchmarkHoldings||0,
        sr:p.selectionRate||0,
        cash:p.cashWeight||0
      },
      sectors:(p.sectors||p.sectorExposures||[]).map(x=>({
        n:x.name||x.sector,p:x.portfolioWeight||x.p||0,b:x.benchmarkWeight||x.b||0,
        a:x.activeWeight||x.a||(x.portfolioWeight-x.benchmarkWeight)||0,
        s:x.stockSpecific||0,t:x.totalReturn||0
      })),
      regions:(p.regions||p.regionExposures||[]).map(x=>({
        n:x.name||x.region,p:x.portfolioWeight||x.p||0,b:x.benchmarkWeight||x.b||0,
        a:x.activeWeight||x.a||(x.portfolioWeight-x.benchmarkWeight)||0
      })),
      countries:(p.countries||p.countryExposures||[]).map(x=>({
        n:x.name||x.country,p:x.portfolioWeight||x.p||0,b:x.benchmarkWeight||x.b||0,
        a:x.activeWeight||x.a||(x.portfolioWeight-x.benchmarkWeight)||0
      })),
      factors:(p.factors||p.factorExposures||[]).map(x=>({
        n:x.name||x.factor,e:x.exposure||x.e||0,a:x.activeExposure||x.exposure||0,bm:x.benchmarkExposure||0,
        c:x.contribution||x.c||0,ret:x.factorReturn||0,imp:x.impact||0
      })),
      hold:(p.holdings||p.positions||[]).map(x=>({
        t:x.ticker||x.symbol||x.id,n:x.name||x.securityName||'',
        sec:x.sector||'',co:x.country||'',
        p:x.portfolioWeight||x.weight||0,b:x.benchmarkWeight||0,
        a:x.activeWeight||(x.portfolioWeight-x.benchmarkWeight)||0,
        mcr:x.mcr||x.marginalContribution||0,tr:x.totalReturn||0,
        r:x.rank||x.quantRank||3,
        over:x.overallScore||3,rev:x.revenueScore||3,val:x.valueScore||3,
        qual:x.qualityScore||3,mom:x.momentumScore||3,stab:x.stabilityScore||3
      })),
      ranks:p.ranks||[],chars:p.characteristics||[],groups:p.groups||[],
      unowned:(p.unownedRisk||p.unowned||[]).map(x=>({
        t:x.ticker||x.id,n:x.name||'',reg:x.region||'',b:x.benchmarkWeight||0,tr:x.teContribution||0
      }))
    };
    out[stratId]=s;
  });
  return out;
}

// ===== ENHANCED NORMALIZE (accepts both formats) =====
let _origNormalize=normalize;
normalize=function(raw){
  // Detect FactSet format
  if(raw.data||raw.portfolios||(raw[Object.keys(raw)[0]]&&raw[Object.keys(raw)[0]].portfolioId)){
    return _origNormalize(normalizeFactSet(raw));
  }
  return _origNormalize(raw);
};

// ===== LIVE REFRESH =====
let refreshTimer=null;
function startLiveRefresh(){
  let cfg={};
  try{cfg=JSON.parse(localStorage.getItem('rr_config')||'{}')}catch(e){}
  let interval=(parseInt(cfg.refresh)||300)*1000;
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(async()=>{
    try{
      let data=await fetchFromAPI('portfolio/analytics');
      A=normalize(data);
      let keys=Object.keys(A);
      if(cs&&keys.includes(cs.id))cs=A[cs.id];
      else if(keys.length)cs=A[keys[0]];
      upd();
      $('dataTimestamp').textContent='Live · '+new Date().toLocaleTimeString();
      showToast('Data refreshed','var(--pos)');
    }catch(e){
      let dot=$('connStatus').querySelector('.conn-dot');
      dot.className='conn-dot off';
    }
  },interval);
}

// ===== AUTO-LOAD WITH DEMO DATA =====
window.addEventListener('DOMContentLoaded',()=>{
  loadPrefs();
  loadThresholds();
  loadConfig();
  // Check for shared state in URL hash
  if(location.hash){
    try{
      let state=JSON.parse(atob(location.hash.slice(1)));
      if(state.t)activeTab=state.t;
      if(state.s)window._sharedStrat=state.s;
    }catch(e){}
  }
  // Clear session data but preserve user preferences
  let _sp='';
  try{_sp=localStorage.getItem(PREFS_KEY)||'';}catch(e){}
  try{localStorage.removeItem('rr_history');}catch(e){}
  try{if(_sp)localStorage.setItem(PREFS_KEY,_sp);}catch(e){}
  // Auto-load latest_data.json if available (for server deployment)
  // Falls back to upload zone if file not found
  fetch('latest_data.json').then(r=>{
    if(!r.ok)throw new Error('No auto-load file');
    return r.json();
  }).then(data=>{
    A=normalize(data);
    let keys=Object.keys(A);
    if(keys.length){
      init();
      if(window._sharedStrat&&A[window._sharedStrat]){go(window._sharedStrat);delete window._sharedStrat;}
      showToast('Auto-loaded latest data — '+keys.length+' strategies','var(--pos)');
    }else{throw new Error('No strategies');}
  }).catch(()=>{
    // No latest_data.json found — show upload zone (normal local usage)
    document.getElementById('content').style.display='none';
    document.getElementById('uploadZone').style.display='flex';
  });
});
</script>
