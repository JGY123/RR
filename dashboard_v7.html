<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redwood Risk Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#080e1e;--card:#0f172a;--surf:#1e293b;--grid:#334155;--txt:#94a3b8;--txth:#e2e8f0;
--pos:#10b981;--neg:#ef4444;--warn:#f59e0b;--pri:#3b82f6;--acc:#8b5cf6;--cyan:#06b6d4;
--r1:#10b981;--r2:#22c55e;--r3:#eab308;--r4:#f97316;--r5:#ef4444;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--grid);position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;color:var(--txth);letter-spacing:-0.5px}
.header h1 span{color:var(--pos);font-weight:300}
.hdr-r{display:flex;align-items:center;gap:12px}
.strat-sel{display:flex;gap:4px;background:var(--surf);border-radius:8px;padding:3px}
.strat-btn{padding:6px 14px;border:none;background:none;color:var(--txt);font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit}
.strat-btn.active{background:var(--pri);color:#fff}
.strat-btn:hover:not(.active){background:var(--grid);color:var(--txth)}
.tabs{display:flex;gap:2px;padding:0 24px;background:var(--card);border-bottom:1px solid var(--grid)}
.tab{padding:10px 20px;border:none;background:none;color:var(--txt);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.tab.active{color:var(--pri);border-bottom-color:var(--pri)}
.tab:hover:not(.active){color:var(--txth)}
.upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 100px);gap:16px}
.upload-zone label{padding:16px 32px;background:var(--pri);color:#fff;border-radius:12px;cursor:pointer;font-weight:600;font-size:15px;transition:all .2s}
.upload-zone label:hover{background:#2563eb}
.upload-zone p{color:var(--txt);font-size:13px}
#content{display:none;padding:16px 24px 32px}
.grid{display:grid;gap:16px;margin-bottom:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.g23{grid-template-columns:2fr 3fr}
.g32{grid-template-columns:3fr 2fr}
.g12{grid-template-columns:1fr 2fr}
.card{background:var(--card);border:1px solid var(--grid);border-radius:12px;padding:16px;overflow:hidden}
.card-title{font-size:12px;font-weight:600;color:var(--txt);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.sum-cards{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:16px}
.sum-card{background:var(--card);border:1px solid var(--grid);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.sum-card:hover{border-color:var(--pri);transform:translateY(-2px)}
.sum-card .label{font-size:10px;font-weight:600;color:var(--txt);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.sum-card .value{font-size:22px;font-weight:700;color:var(--txth)}
.sum-card .sub{font-size:10px;color:var(--txt);margin-top:4px}
.sum-card.alert{border-color:var(--neg);background:rgba(239,68,68,.05)}
.sum-card.warn{border-color:var(--warn);background:rgba(245,158,11,.05)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--txt);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:0.5px;border-bottom:1px solid var(--grid);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid rgba(51,65,85,.3);white-space:nowrap}
tr:hover td{background:rgba(59,130,246,.03)}
th.r,td.r{text-align:right}
.pos{color:var(--pos)}.neg{color:var(--neg)}.warn-t{color:var(--warn)}
.alert-t{color:var(--neg);font-weight:600}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.pill-pos{background:rgba(16,185,129,.15);color:var(--pos)}
.pill-neg{background:rgba(239,68,68,.15);color:var(--neg)}
.bar-cell{display:flex;align-items:center;gap:6px}
.bar-bg{height:6px;background:var(--surf);border-radius:3px;flex:1;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.search-box{width:100%;padding:8px 12px;background:var(--surf);border:1px solid var(--grid);border-radius:8px;color:var(--txth);font-size:12px;font-family:inherit;margin-bottom:10px}
.search-box:focus{outline:none;border-color:var(--pri)}
.pag{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px}
.pag button{padding:4px 12px;background:var(--surf);border:1px solid var(--grid);color:var(--txt);border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px}
.pag button:hover{border-color:var(--pri);color:var(--txth)}
.pag button:disabled{opacity:.3;cursor:default}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--grid);border-radius:16px;width:90vw;max-width:900px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-lg{max-width:1100px}
.modal h2{font-size:16px;font-weight:700;color:var(--txth);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal .close{background:none;border:none;color:var(--txt);font-size:20px;cursor:pointer;padding:4px 8px}
.modal .close:hover{color:var(--txth)}
.trend{display:inline-block;font-size:10px;margin-left:4px}
.trend.up{color:var(--pos)}.trend.down{color:var(--neg)}.trend.flat{color:var(--txt)}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:#2563eb}
.btn-sec{background:var(--surf);color:var(--txt);border:1px solid var(--grid)}.btn-sec:hover{color:var(--txth)}
.btn-sm{padding:4px 10px;font-size:11px}
.toggle-wrap{display:flex;gap:4px;margin-bottom:10px}
.toggle-btn{padding:4px 12px;background:var(--surf);border:1px solid var(--grid);color:var(--txt);border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit}
.toggle-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.upload-btn-sm{padding:6px 14px;background:var(--surf);border:1px solid var(--grid);color:var(--txt);border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.upload-btn-sm:hover{border-color:var(--pri);color:var(--txth)}
.tab-content{display:none}.tab-content.active{display:block}
.chip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500;background:var(--surf);color:var(--txt);margin-right:4px}
@media(max-width:1200px){.g2,.g3,.g4,.g23,.g32,.g12{grid-template-columns:1fr}.sum-cards{grid-template-columns:repeat(4,1fr)}}
@media(max-width:1024px){.sum-cards{grid-template-columns:repeat(3,1fr)}.modal{width:95vw;padding:16px}}
@media(max-width:768px){.sum-cards{grid-template-columns:repeat(2,1fr)}.header{flex-direction:column;gap:8px;padding:8px 16px}.header h1{font-size:15px}.tabs{overflow-x:auto;padding:0 12px}.tab{padding:8px 12px;font-size:12px}#content{padding:8px 12px 24px}.strat-sel{flex-wrap:wrap}.modal{max-height:95vh;border-radius:12px}}

/* Transitions & Animations */
.tab-content{opacity:0;transition:opacity .3s ease}
.tab-content.active{opacity:1}
.modal-overlay{backdrop-filter:blur(4px);transition:opacity .2s}
.modal{animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:slideUp .3s ease both}
.sum-card{animation:slideUp .3s ease both}

/* Skeleton loader */
.skeleton{background:linear-gradient(90deg,var(--surf) 25%,var(--grid) 50%,var(--surf) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;min-height:20px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{height:80px;border-radius:10px}
.skeleton-row{height:14px;margin:8px 0;border-radius:4px}
.loading-overlay{position:absolute;inset:0;background:rgba(8,14,30,.8);display:flex;align-items:center;justify-content:center;border-radius:12px;z-index:10;font-size:12px;color:var(--txt)}

/* Tooltips */
.tip{position:relative;cursor:help;border-bottom:1px dotted var(--grid)}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:var(--txth);padding:6px 10px;border-radius:6px;font-size:10px;font-weight:400;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;z-index:300;border:1px solid var(--grid);text-transform:none;letter-spacing:0;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.tip:hover::after{opacity:1}
.tip::before{content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1e293b;opacity:0;pointer-events:none;transition:opacity .2s;z-index:301}
.tip:hover::before{opacity:1}

/* Clickable rows */
tr.clickable{cursor:pointer;transition:background .15s}
tr.clickable:hover td{background:rgba(59,130,246,.08)}
tr.clickable:active td{background:rgba(59,130,246,.12)}

/* Enhanced cards */
.sum-card{position:relative;overflow:hidden}
.sum-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(59,130,246,.03));pointer-events:none}
.sum-card:focus{outline:2px solid var(--pri);outline-offset:2px}
.card:focus-within{border-color:var(--pri)}

/* Threshold highlights */
.thresh-warn{background:rgba(245,158,11,.08);border-left:3px solid var(--warn)}
.thresh-alert{background:rgba(239,68,68,.08);border-left:3px solid var(--neg)}
.thresh-good{border-left:3px solid var(--pos)}

/* Export buttons */
.export-bar{display:flex;gap:6px;align-items:center}
.export-btn{padding:3px 8px;background:var(--surf);border:1px solid var(--grid);color:var(--txt);border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit;transition:all .15s}
.export-btn:hover{border-color:var(--pri);color:var(--txth)}

/* Risk budget detail table */
.rb-table td{padding:6px 10px}
.rb-bar{display:inline-block;height:8px;border-radius:4px;min-width:2px}

/* Comparison modal enhancements */
.comp-stats-table{font-size:11px}
.comp-stats-table td{padding:6px 8px}
.comp-stats-table .metric-name{color:var(--txth);font-weight:500}
.heatmap-cell{padding:4px 8px;text-align:center;font-size:10px;font-weight:600;border-radius:3px}

/* Global search */
.global-search{position:relative}
.global-search input{padding:6px 12px 6px 28px;background:var(--surf);border:1px solid var(--grid);border-radius:8px;color:var(--txth);font-size:12px;font-family:inherit;width:180px;transition:width .3s}
.global-search input:focus{width:280px;outline:none;border-color:var(--pri)}
.global-search .search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--txt);pointer-events:none}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--grid);border-radius:8px;max-height:300px;overflow-y:auto;z-index:300;display:none;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.search-results.show{display:block}
.search-result{padding:8px 12px;cursor:pointer;font-size:11px;border-bottom:1px solid rgba(51,65,85,.3);display:flex;justify-content:space-between;align-items:center}
.search-result:hover{background:var(--surf)}
.search-result .sr-ticker{color:var(--txth);font-weight:600}
.search-result .sr-meta{color:var(--txt);font-size:10px}

/* Connection status */
.conn-status{display:flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surf)}
.conn-dot{width:6px;height:6px;border-radius:50%}
.conn-dot.live{background:var(--pos);box-shadow:0 0 4px var(--pos)}
.conn-dot.file{background:var(--warn)}
.conn-dot.off{background:var(--neg)}

/* Config panel */
.config-panel{position:fixed;right:-400px;top:0;bottom:0;width:380px;background:var(--card);border-left:1px solid var(--grid);z-index:250;transition:right .3s;padding:24px;overflow-y:auto}
.config-panel.open{right:0}
.config-panel h3{color:var(--txth);font-size:14px;margin-bottom:16px}
.config-field{margin-bottom:14px}
.config-field label{display:block;font-size:11px;color:var(--txt);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.config-field input,.config-field select{width:100%;padding:8px;background:var(--surf);border:1px solid var(--grid);border-radius:6px;color:var(--txth);font-size:12px;font-family:inherit}
.config-field input:focus,.config-field select:focus{outline:none;border-color:var(--pri)}

/* Keyboard shortcut hints */
.kbd{display:inline-block;padding:1px 5px;background:var(--surf);border:1px solid var(--grid);border-radius:3px;font-size:9px;color:var(--txt);font-family:monospace;vertical-align:middle;margin-left:4px}

/* Print styles */
@media print{
  body{background:#fff!important;color:#333!important;font-size:10px}
  .header{position:static;background:#fff!important;border-bottom:2px solid #333;padding:8px 0}
  .header h1{color:#000!important}.header h1 span{color:#333!important}
  .hdr-r,.upload-btn-sm,#reportBtn,#shareBtn,#emailBtn,#compareBtn,#configBtn,.strat-sel,.tabs,.config-panel,.global-search,.export-bar,.export-btn,.conn-status,.kbd{display:none!important}
  #content{display:block!important;padding:8px 0}
  .tab-content{display:block!important;opacity:1!important;page-break-before:always}
  .tab-content:first-child{page-break-before:auto}
  .card{background:#fff!important;border:1px solid #ccc!important;border-radius:4px!important;padding:12px;break-inside:avoid;margin-bottom:12px}
  .card-title{color:#333!important}
  .sum-cards{grid-template-columns:repeat(4,1fr)!important}
  .sum-card{background:#fff!important;border:1px solid #ccc!important;padding:8px}
  .sum-card .label{color:#666!important}
  .sum-card .value{color:#000!important;font-size:16px}
  .sum-card .sub{color:#666!important}
  .grid{grid-template-columns:1fr 1fr!important}
  table{font-size:9px}
  th{color:#333!important;border-bottom:2px solid #333}
  td{color:#333!important;border-bottom:1px solid #ddd}
  .pos{color:#059669!important}.neg{color:#dc2626!important}.warn-t{color:#d97706!important}
  .chip{background:#eee!important;color:#333!important}
  .modal-overlay{display:none!important}
  .trend{color:#333!important}
  .skeleton,.loading-overlay{display:none!important}
  tr:hover td{background:transparent!important}
  a{color:#333!important;text-decoration:underline}
}
</style>
</head>
<body>
<div class="header">
<div style="display:flex;align-items:center;gap:12px">
<h1>REDWOOD <span>Risk Control Panel</span></h1>
<span id="stratFullName" style="font-size:11px;color:var(--txt);display:none"></span>
<span id="dataTimestamp" style="font-size:10px;color:var(--txt);display:none"></span>
</div>
<div class="hdr-r">
<div class="global-search" id="globalSearchWrap" style="display:none">
<span class="search-icon">&#128269;</span>
<input type="text" placeholder="Search holdings..." id="globalSearchInput" oninput="globalSearch(this.value)" onfocus="this.parentElement.querySelector('.search-results').classList.add('show')" onblur="setTimeout(()=>this.parentElement.querySelector('.search-results').classList.remove('show'),200)">
<div class="search-results" id="globalSearchResults"></div>
</div>
<div class="strat-sel" id="stratSel"></div>
<div class="conn-status" id="connStatus" style="display:none"><span class="conn-dot file"></span><span>File</span></div>
<button class="btn btn-sec btn-sm" id="shareBtn" style="display:none" onclick="generateShareURL()" title="Copy share URL">Share<span class="kbd">S</span></button>
<button class="btn btn-sec btn-sm" id="emailBtn" style="display:none" onclick="generateEmailSnapshot()" title="Email-ready snapshot">Email</button>
<button class="btn btn-sec btn-sm" id="compareBtn" style="display:none" onclick="openComp()">Compare<span class="kbd">C</span></button>
<label class="upload-btn-sm" id="reupload" style="display:none">Upload JSON<input type="file" accept=".json" onchange="upload(event)" hidden></label>
<button class="btn btn-pri btn-sm" id="reportBtn" style="display:none" onclick="openReport()">Generate Report</button>
<button class="btn btn-sec btn-sm" id="configBtn" style="display:none" onclick="toggleConfig()" title="Settings">&#9881;</button>
</div>
</div>

<!-- Config Panel (Phase 5 prep) -->
<div class="config-panel" id="configPanel">
<div class="flex-between" style="margin-bottom:20px"><h3>Settings</h3><button class="close" onclick="toggleConfig()">&times;</button></div>
<div class="config-field"><label>Data Source</label>
<div style="display:flex;gap:8px;margin-top:4px">
<button class="toggle-btn active" id="srcFile" onclick="setDataSrc('file')">File</button>
<button class="toggle-btn" id="srcLive" onclick="setDataSrc('live')">Live API</button>
</div></div>
<div class="config-field"><label>API Base URL</label><input type="text" id="cfgApiUrl" placeholder="https://api.factset.com/..." value=""></div>
<div class="config-field"><label>API Key</label><input type="password" id="cfgApiKey" placeholder="Enter API key..."></div>
<div class="config-field"><label>Refresh Interval (seconds)</label><input type="number" id="cfgRefresh" value="300" min="30" max="3600"></div>
<div class="config-field"><label>Strategy Mapping</label>
<textarea id="cfgStratMap" rows="5" style="width:100%;padding:8px;background:var(--surf);border:1px solid var(--grid);border-radius:6px;color:var(--txth);font-size:11px;font-family:monospace;resize:vertical" placeholder='{"IDM":"PORT_001","ISC":"PORT_002"}'></textarea></div>
<button class="btn btn-pri" onclick="saveConfig()" style="width:100%;margin-top:8px">Save Settings</button>
</div>
<div class="tabs" id="tabBar" style="display:none">
<button class="tab active" onclick="switchTab('exposures',this)">Exposures</button>
<button class="tab" onclick="switchTab('risk',this)">Risk</button>
<button class="tab" onclick="switchTab('holdings',this)">Holdings</button>
<button class="tab" onclick="switchTab('attribution',this)">Attribution</button>
</div>
<div class="upload-zone" id="uploadZone">
<label>Upload JSON Data<input type="file" accept=".json" onchange="upload(event)" hidden></label>
<p>Drop your FPE risk JSON file to begin</p>
</div>
<div id="content">
<div class="tab-content active" id="tab-exposures"></div>
<div class="tab-content" id="tab-risk"></div>
<div class="tab-content" id="tab-holdings"></div>
<div class="tab-content" id="tab-attribution"></div>
</div>
<div class="modal-overlay" id="drillModal"><div class="modal modal-lg" id="drillContent"></div></div>
<div class="modal-overlay" id="stockModal"><div class="modal" id="stockContent"></div></div>
<div class="modal-overlay" id="reportModal"><div class="modal modal-lg" id="reportContent"></div></div>
<div class="modal-overlay" id="compModal"><div class="modal modal-lg" id="compContent"></div></div>
<div class="modal-overlay" id="metricModal"><div class="modal" id="metricContent"></div></div>
<div class="modal-overlay" id="stressModal"><div class="modal modal-lg" id="stressContent"></div></div>
<div class="modal-overlay" id="countryModal"><div class="modal" id="countryContent"></div></div>
<div class="modal-overlay" id="groupModal"><div class="modal modal-lg" id="groupContent"></div></div>
<div class="modal-overlay" id="charModal"><div class="modal" id="charContent"></div></div>
<div class="modal-overlay" id="corrModal"><div class="modal" id="corrContent"></div></div>
<div class="modal-overlay" id="attrDrillModal"><div class="modal modal-lg" id="attrDrillContent"></div></div>
<div class="modal-overlay" id="unownedModal"><div class="modal" id="unownedContent"></div></div>
<div class="modal-overlay" id="riskBudgetModal"><div class="modal modal-lg" id="riskBudgetContent"></div></div>
<script>
// ===== CONSTANTS =====
const STRATS=[
{id:'IDM',name:'Intl Developed Markets',bm:'MSCI World ex USA'},
{id:'ISC',name:'International Small Cap',bm:'MSCI World ex USA Small Cap'},
{id:'IOP',name:'Intl Opportunities',bm:'MSCI ACWI ex USA'},
{id:'GSC',name:'Global Small Cap',bm:'MSCI World Small Cap'},
{id:'SCG',name:'Small Cap Growth',bm:'Russell 2000 Growth'},
{id:'EM',name:'Emerging Markets',bm:'MSCI EM'},
{id:'ACWI',name:'All Country World',bm:'MSCI ACWI'}
];
const SECS=['Industrials','Financials','Info Technology','Consumer Disc.','Materials','Health Care','Consumer Staples','Energy','Utilities','Real Estate','Comm Services'];
const REGS=['Far East','English','Northern Europe','Western Europe','Southern Europe','Emerging Market','Australia - New Zealand'];
const FACS=['Momentum','Value','Size','Volatility','Quality','Growth','Liquidity'];

// ===== DATA GENERATION (synthetic fallback) =====
// Synthetic inception dates per strategy (months of history)
const INCEPTION_MONTHS={IDM:120,ISC:84,IOP:96,GSC:60,SCG:108,EM:72,ACWI:48};

function genHist(s){
  let h={sum:[],sec:{},reg:{},fac:{}};
  let now=new Date();
  let months=INCEPTION_MONTHS[s.id]||72;
  for(let i=months-1;i>=0;i--){
    let d=new Date(now);d.setMonth(d.getMonth()-i);
    let ds=d.toISOString().slice(0,10);
    // Early months (first 6) have more volatile/anomalous data to simulate ramp-up
    let earlyFactor=i>(months-7)?1.5+Math.random():1;
    let te=s.sum.te*(0.85+Math.random()*0.3)*earlyFactor;
    h.sum.push({d:ds,te:+te.toFixed(2),as:+(s.sum.as*(0.98+Math.random()*0.04)/earlyFactor).toFixed(2),beta:+(s.sum.beta*(0.97+Math.random()*0.06)*earlyFactor).toFixed(3),h:Math.max(5,s.sum.h+Math.floor(Math.random()*6-3)-Math.floor((months-1-i<6?(6-months+1+i)*3:0))),sr:+(s.sum.sr*(0.95+Math.random()*0.1)).toFixed(2),cash:+((s.sum.cash||2)*(0.8+Math.random()*0.4)*earlyFactor).toFixed(2)});
  }
  SECS.forEach(sec=>{
    let row=s.sectors.find(x=>x.n===sec);if(!row)return;
    h.sec[sec]=[];
    for(let i=5;i>=0;i--){
      let d=new Date(now);d.setMonth(d.getMonth()-i*6);
      let ds=d.toISOString().slice(0,10);
      let drift=(Math.random()-0.5)*3;
      h.sec[sec].push({d:ds,p:+(row.p+drift).toFixed(2),b:+(row.b+(Math.random()-0.5)).toFixed(2),a:+(row.a+drift).toFixed(2)});
    }
  });
  REGS.forEach(reg=>{
    let row=s.regions.find(x=>x.n===reg);if(!row)return;
    h.reg[reg]=[];
    for(let i=5;i>=0;i--){
      let d=new Date(now);d.setMonth(d.getMonth()-i*6);
      let ds=d.toISOString().slice(0,10);
      let drift=(Math.random()-0.5)*3;
      h.reg[reg].push({d:ds,p:+(row.p+drift).toFixed(2),b:+(row.b+(Math.random()-0.5)).toFixed(2),a:+(row.a+drift).toFixed(2)});
    }
  });
  FACS.forEach(fac=>{
    let row=s.factors.find(x=>x.n===fac);if(!row)return;
    h.fac[fac]=[];
    for(let i=5;i>=0;i--){
      let d=new Date(now);d.setMonth(d.getMonth()-i*6);
      let ds=d.toISOString().slice(0,10);
      let drift=(Math.random()-0.5)*0.15;
      h.fac[fac].push({d:ds,e:+(row.e+drift).toFixed(3),b:0,a:+(row.e+drift).toFixed(3)});
    }
  });
  return h;
}

function enrichHold(hold,sectors){
  return hold.map(h=>{
    let sec=sectors.find(s=>s.n===h.sec);
    return{...h,reg:CMAP[h.co]||'Other',secRet:sec?sec.t:0};
  });
}

function genAttrib(s){
  return s.sectors.map(sec=>{
    let alloc=+(sec.a*0.1*(Math.random()-0.3)).toFixed(2);
    let sel=+(sec.t*sec.p/100*(Math.random()*0.5+0.3)).toFixed(2);
    let inter=+((Math.random()-0.5)*0.15).toFixed(2);
    return{n:sec.n,pa:sec.p,ba:sec.b,aa:sec.a,pr:sec.t,br:+(sec.t-sec.s*(Math.random()-0.5)*0.3).toFixed(2),alloc,sel,inter,total:+(alloc+sel+inter).toFixed(2)};
  });
}

function genStress(s){
  return STRESS.map(sc=>{
    let portImpact=0,benchImpact=0;
    s.sectors.forEach(sec=>{
      let shock=sc.sectors[sec.n]||0;
      portImpact+=sec.p*shock/100;
      benchImpact+=sec.b*shock/100;
    });
    return{name:sc.name,desc:sc.desc,port:+portImpact.toFixed(2),bench:+benchImpact.toFixed(2),active:+(portImpact-benchImpact).toFixed(2)};
  });
}

function genFCorr(){
  let m={};
  FACS.forEach(f1=>{m[f1]={};FACS.forEach(f2=>{
    if(f1===f2)m[f1][f2]=1;
    else if(m[f2]&&m[f2][f1]!=null)m[f1][f2]=m[f2][f1];
    else m[f1][f2]=+((Math.random()-0.5)*1.4).toFixed(2);
  })});
  return m;
}

// ===== NORMALIZE + INIT =====
function normalize(raw){
  let out={};
  let strats=raw.strategies||raw;
  for(let[id,s]of Object.entries(strats)){
    let st={...s,id:id,name:s.name||id,benchmark:s.benchmark||''};
    // Normalize summary
    if(!st.sum&&s.summary)st.sum=s.summary;
    if(!st.sum)st.sum={te:0,as:0,beta:1,h:0,bh:0,sr:0,cash:0};
    // Preserve beta variants if present in source data
    if(s.sum&&s.sum.betas)st.sum.betas=s.sum.betas;
    else if(s.betas)st.sum.betas=s.betas;
    // Normalize sectors - compute benchmark weight from p-a if b missing
    if(st.sectors)st.sectors=st.sectors.map(x=>{
      if(x.b==null&&x.p!=null&&x.a!=null)x.b=+(x.p-x.a).toFixed(2);
      return x;
    });
    if(!st.sectors)st.sectors=[];
    if(!st.regions)st.regions=[];
    if(!st.countries)st.countries=[];
    if(!st.factors)st.factors=[];
    if(!st.hold)st.hold=[];
    if(!st.ranks)st.ranks=[];
    if(!st.chars)st.chars=[];
    if(!st.groups)st.groups=[];
    if(!st.unowned)st.unowned=[];
    // Normalize history
    let h=s.hist||{};
    st.hist={
      sum:h.sum||h.summary||[],
      sec:h.sec||h.sectors||{},
      reg:h.reg||h.regions||{},
      fac:h.fac||h.factors||{}
    };
    // Generate synthetic history if missing
    if(!st.hist.sum.length)st.hist=genHist(st);
    // Enrich holdings
    st.hold=enrichHold(st.hold,st.sectors);
    // Recompute equity-only holdings count (exclude cash/currency baskets)
    st.sum.h=equityCount(st.hold);
    // Generate derived data
    st.attrib=genAttrib(st);
    st.stress=genStress(st);
    st.fcorr=genFCorr();
    out[id]=st;
  }
  return out;
}

function genSynthetic(){
  let out={};
  STRATS.forEach(def=>{
    let te=3+Math.random()*5;
    let s={id:def.id,name:def.name,benchmark:def.bm,
      sum:{te:+te.toFixed(2),as:+(85+Math.random()*12).toFixed(2),beta:+(0.9+Math.random()*0.2).toFixed(3),h:30+Math.floor(Math.random()*30),bh:500+Math.floor(Math.random()*2000),sr:+(60+Math.random()*20).toFixed(2),cash:+(1+Math.random()*4).toFixed(2)},
      sectors:SECS.map(n=>{let p=+(3+Math.random()*20).toFixed(2);let b=+(3+Math.random()*20).toFixed(2);return{n,p,b,a:+(p-b).toFixed(2),s:+(Math.random()*15).toFixed(2),t:+((Math.random()-0.3)*15).toFixed(2)}}),
      regions:REGS.map(n=>{let p=+(2+Math.random()*30).toFixed(2);let b=+(2+Math.random()*30).toFixed(2);return{n,p,b,a:+(p-b).toFixed(2)}}),
      countries:[],factors:[],hold:[],ranks:[],chars:[],groups:[],unowned:[]
    };
    // Normalize weights to 100
    let tp=s.sectors.reduce((a,x)=>a+x.p,0);let tb=s.sectors.reduce((a,x)=>a+x.b,0);
    s.sectors=s.sectors.map(x=>({...x,p:+(x.p/tp*100).toFixed(2),b:+(x.b/tb*100).toFixed(2),a:+((x.p/tp-x.b/tb)*100).toFixed(2)}));
    tp=s.regions.reduce((a,x)=>a+x.p,0);tb=s.regions.reduce((a,x)=>a+x.b,0);
    s.regions=s.regions.map(x=>({...x,p:+(x.p/tp*100).toFixed(2),b:+(x.b/tb*100).toFixed(2),a:+((x.p/tp-x.b/tb)*100).toFixed(2)}));
    // Countries from regions
    let countries=['Japan','United Kingdom','Germany','France','Italy','Canada','Switzerland','Sweden','Australia','Netherlands','Denmark','Spain','South Korea','Brazil','India','Hong Kong'];
    s.countries=countries.map(n=>{let p=+(Math.random()*10).toFixed(2);let b=+(Math.random()*10).toFixed(2);return{n,p,b,a:+(p-b).toFixed(2)}});
    let tcp=s.countries.reduce((a,x)=>a+x.p,0);let tcb=s.countries.reduce((a,x)=>a+x.b,0);
    s.countries=s.countries.map(x=>({...x,p:+(x.p/tcp*100).toFixed(2),b:+(x.b/tcb*100).toFixed(2),a:+((x.p/tcp-x.b/tcb)*100).toFixed(2)}));
    // Factors
    s.factors=FACS.map(n=>{let e=+((Math.random()-0.5)*1.2).toFixed(3);return{n,a:e,bm:0,e,c:+(Math.random()*6).toFixed(2),ret:+((Math.random()-0.5)*8).toFixed(2),imp:+((Math.random()-0.5)*2).toFixed(2)}});
    // Holdings
    let tickers=['AAPL','MSFT','TSM','ASML','SAP','NVO','TM','SONY','RIO','UL','SAN','BHP','SHOP','MELI','BABA','005930','7203','9984','6758','8306','MC','LVMH','SIE','DTE','ALV','NESN','ROG','ABB','NOVO','DSM'];
    let names=['Alpha Corp','Beta Ltd','Gamma Tech','Delta Fin','Epsilon Ind','Zeta Health','Eta Energy','Theta Mat','Iota Util','Kappa RE','Lambda Comm','Mu Staples','Nu Disc','Xi Semi','Omicron Bank','Pi Pharma','Rho Mining','Sigma Auto','Tau Retail','Upsilon Aero','Phi Chem','Chi Defense','Psi Telecom','Omega Logistics','AlphaB Soft','BetaB Food','GammaB Elec','DeltaB Trans','EpsilonB Insur','ZetaB Bio'];
    s.hold=tickers.map((t,i)=>{
      let p=+(0.5+Math.random()*4).toFixed(2);let b=+(Math.random()*0.3).toFixed(2);
      return{t,n:names[i]||t,sec:SECS[i%SECS.length],co:countries[i%countries.length],p,b,a:+(p-b).toFixed(2),mcr:+(Math.random()*8).toFixed(2),tr:+(Math.random()*12).toFixed(2),r:1+Math.floor(Math.random()*5),over:+(1+Math.random()*4).toFixed(1),rev:+(1+Math.random()*4).toFixed(1),val:+(1+Math.random()*4).toFixed(1),qual:+(1+Math.random()*4).toFixed(1),mom:+(1+Math.random()*4).toFixed(1),stab:+(1+Math.random()*4).toFixed(1)};
    });
    // Add cash/currency baskets (should be excluded from equity holdings count)
    ['USD','EUR','JPY'].forEach(ccy=>{
      s.hold.push({t:ccy,n:'Cash '+ccy,sec:'Cash',co:'',p:+(0.3+Math.random()*1.5).toFixed(2),b:0,a:+(0.3+Math.random()*1.5).toFixed(2),mcr:0,tr:0,r:0,over:0,rev:0,val:0,qual:0,mom:0,stab:0});
    });
    s.sum.h=equityCount(s.hold);
    // Ranks
    s.ranks=[1,2,3,4,5].map(r=>{let ct=s.hold.filter(h=>h.r===r).length;let p=s.hold.filter(h=>h.r===r).reduce((a,h)=>a+h.p,0);return{r,l:r===1?'R1 (Best)':r===5?'R5 (Worst)':'R'+r,ct,p:+p.toFixed(2),a:+(p*(0.95+Math.random()*0.1)).toFixed(2)}});
    // Chars
    s.chars=[{m:'Market Cap ($B)',p:+(2000+Math.random()*8000).toFixed(0),b:+(3000+Math.random()*5000).toFixed(0)},{m:'ROE (%)',p:+(10+Math.random()*20).toFixed(1),b:+(8+Math.random()*15).toFixed(1)},{m:'FCF Yield (%)',p:+(2+Math.random()*5).toFixed(1),b:+(3+Math.random()*4).toFixed(1)},{m:'Div Yield (%)',p:+(0.5+Math.random()*3).toFixed(1),b:+(1+Math.random()*3).toFixed(1)},{m:'EPS Growth 3Y (%)',p:+(5+Math.random()*25).toFixed(1),b:+(3+Math.random()*15).toFixed(1)},{m:'Op. Margin (%)',p:+(10+Math.random()*20).toFixed(1),b:+(12+Math.random()*18).toFixed(1)}];
    // Groups
    s.groups=GROUPS_DEF.map(gd=>{let p=+(3+Math.random()*15).toFixed(2);let b=+(3+Math.random()*15).toFixed(2);return{g:gd.g,sg:gd.sg,p,b,a:+(p-b).toFixed(2)}});
    // Unowned
    s.unowned=Array.from({length:8},(_,i)=>({t:'UNO'+i,n:'Unowned Stock '+(i+1),reg:REGS[i%REGS.length],b:+(0.1+Math.random()*0.5).toFixed(2),tr:+(-0.2-Math.random()*1.2).toFixed(2)}));
    out[def.id]=s;
  });
  return out;
}

function upload(e){
  let f=e.target.files[0];if(!f)return;
  let r=new FileReader();
  r.onload=ev=>{
    try{
      let raw=JSON.parse(ev.target.result);
      A=normalize(raw);
      init();
    }catch(err){alert('Invalid JSON: '+err.message)}
  };
  r.readAsText(f);
}

function init(){
  let keys=Object.keys(A);
  if(!keys.length){A=normalize(genSynthetic());keys=Object.keys(A)}
  cs=A[keys[0]];
  // Build strategy buttons
  let sel=$('stratSel');
  sel.innerHTML=keys.map((k,i)=>`<button class="strat-btn${i===0?' active':''}" onclick="go('${k}',this)">${k}<span class="kbd">${i+1}</span></button>`).join('');
  $('uploadZone').style.display='none';
  $('content').style.display='block';
  $('tabBar').style.display='flex';
  $('reupload').style.display='block';
  $('reportBtn').style.display='block';
  $('shareBtn').style.display='inline-block';
  $('emailBtn').style.display='inline-block';
  $('compareBtn').style.display='inline-block';
  $('configBtn').style.display='inline-block';
  $('connStatus').style.display='flex';
  $('globalSearchWrap').style.display='block';
  $('stratFullName').style.display='inline';
  $('stratFullName').textContent=cs.name;
  $('dataTimestamp').style.display='inline';
  $('dataTimestamp').textContent='Data as of: '+new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString();
  upd();
}

function go(id,btn){
  cs=A[id];
  document.querySelectorAll('.strat-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  hp=1;sortCol=null;
  $('stratFullName').textContent=cs.name;
  // Brief loading shimmer
  showLoading('tab-'+activeTab);
  setTimeout(()=>upd(),120);
}

function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  $('tab-'+tab).classList.add('active');
}

// ===== TABLE RENDERERS =====
function rWt(data,type){
  let rows=data.map(d=>{
    let cls=activeStyle(d.a);
    let drillFn=type==='sec'?`oDr('sec','${d.n}')`:`oDr('reg','${d.n}')`;
    let threshCls=Math.abs(d.a)>5?'thresh-alert':Math.abs(d.a)>3?'thresh-warn':'';
    return`<tr class="clickable ${threshCls}" onclick="${drillFn}">
      <td>${d.n}</td><td class="r">${f2(d.p)}</td><td class="r">${f2(d.b)}</td>
      <td class="r ${cls}">${fp(d.a)}</td>
      ${d.s!=null?`<td class="r">${f2(d.s)}</td>`:''}
      ${d.t!=null?`<td class="r" style="${d.t>0?'color:var(--pos)':'color:var(--neg)'}">${fp(d.t)}</td>`:''}
    </tr>`;
  }).join('');
  let hasSS=data[0]&&data[0].s!=null;
  let hasTR=data[0]&&data[0].t!=null;
  return`<table><thead><tr><th>Name</th><th class="r tip" data-tip="Portfolio weight">Port%</th><th class="r tip" data-tip="Benchmark weight">Bench%</th><th class="r tip" data-tip="Portfolio minus benchmark weight">Active</th>${hasSS?'<th class="r tip" data-tip="Stock specific risk">SS%</th>':''}${hasTR?'<th class="r tip" data-tip="Total return contribution">TTR%</th>':''}</tr></thead><tbody>${rows}</tbody></table>`;
}

function rFac(factors){
  let rows=factors.map(f=>{
    let cls=f.e>0?'pos':'neg';
    let threshCls=Math.abs(f.e)>0.5?'thresh-warn':'';
    return`<tr class="clickable ${threshCls}" onclick="oDrF('${f.n}')">
      <td>${f.n}</td><td class="r ${cls}">${fp(f.e,3)}</td><td class="r">${f2(f.c)}</td><td class="r" style="${f.ret>0?'color:var(--pos)':'color:var(--neg)'}">${fp(f.ret)}</td><td class="r" style="${f.imp>0?'color:var(--pos)':'color:var(--neg)'}">${fp(f.imp)}</td>
    </tr>`;
  }).join('');
  return`<table><thead><tr><th>Factor</th><th class="r tip" data-tip="Active factor exposure vs benchmark">Exposure</th><th class="r tip" data-tip="Contribution to tracking error">Contrib%</th><th class="r tip" data-tip="Factor return for the period">Return%</th><th class="r tip" data-tip="Exposure x Return = portfolio impact">Impact</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function rRnk(ranks){
  if(!ranks.length)return'<p style="color:var(--txt);font-size:12px">No rank data</p>';
  let rows=ranks.map(r=>`<tr class="clickable" onclick="filterByRank(${r.r})"><td><span style="color:${rc(r.r)};font-weight:600">${r.l}</span></td><td class="r">${r.ct}</td><td class="r">${f2(r.p)}%</td><td class="r">${f2(r.a)}%</td></tr>`).join('');
  return`<table><thead><tr><th>Rank</th><th class="r">Count</th><th class="r">Port%</th><th class="r">Active%</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function filterByRank(rank){
  activeTab='holdings';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[1].classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  $('tab-holdings').classList.add('active');
  ah=[...cs.hold];fh=ah.filter(h=>h.r===rank);hp=1;renderHoldTab();
  // Set the rank filter dropdown
  setTimeout(()=>{let rf=$('rankFilter');if(rf)rf.value=rank},100);
}

function rChr(chars){
  if(!chars.length)return'<p style="color:var(--txt);font-size:12px">No characteristic data</p>';
  let rows=chars.map(c=>{
    let diff=c.p-c.b;let cls=diff>0?'pos':'neg';
    return`<tr class="clickable" onclick="oDrChar('${c.m}')"><td>${c.m}</td><td class="r">${f2(c.p,1)}</td><td class="r">${f2(c.b,1)}</td><td class="r ${cls}">${fp(diff,1)}</td></tr>`;
  }).join('');
  return`<table><thead><tr><th>Metric</th><th class="r">Portfolio</th><th class="r">Benchmark</th><th class="r">Diff</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function rCountryTable(countries){
  if(!countries||!countries.length)return'<p style="color:var(--txt);font-size:12px">No country data</p>';
  let sorted=[...countries].sort((a,b)=>Math.abs(b.a)-Math.abs(a.a));
  let rows=sorted.map(c=>{
    let cls=activeStyle(c.a);
    return`<tr class="clickable" onclick="oDrCountry('${c.n}')"><td>${c.n}</td><td class="r">${f2(c.p)}</td><td class="r">${f2(c.b)}</td><td class="r ${cls}">${fp(c.a)}</td></tr>`;
  }).join('');
  return`<table><thead><tr><th>Country</th><th class="r">Port%</th><th class="r">Bench%</th><th class="r">Active</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function rGroupTable(groups){
  if(!groups||!groups.length)return'<p style="color:var(--txt);font-size:12px">No group data</p>';
  let rows=groups.map(g=>{
    let cls=activeStyle(g.a);
    return`<tr class="clickable" onclick="oDrGroup('${g.g}')"><td><span class="chip">${g.g}</span></td><td>${g.sg}</td><td class="r">${f2(g.p)}</td><td class="r">${f2(g.b)}</td><td class="r ${cls}">${fp(g.a)}</td></tr>`;
  }).join('');
  return`<table><thead><tr><th>Group</th><th>Subgroup</th><th class="r">Port%</th><th class="r">Bench%</th><th class="r">Active</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function rStressTable(stress){
  let rows=stress.map((s,i)=>{
    let cls=s.active>0?'pos':'neg';
    return`<tr class="clickable" onclick="oDrStress(${i})"><td><strong style="color:var(--txth)">${s.name}</strong><br><span style="font-size:10px">${s.desc}</span></td><td class="r" style="color:var(--neg)">${fp(s.port)}</td><td class="r" style="color:var(--neg)">${fp(s.bench)}</td><td class="r ${cls}">${fp(s.active)}</td></tr>`;
  }).join('');
  return`<table><thead><tr><th>Scenario</th><th class="r">Portfolio</th><th class="r">Benchmark</th><th class="r">Active</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function rUnowned(unowned){
  if(!unowned||!unowned.length)return'<p style="color:var(--txt);font-size:12px">No unowned risk data</p>';
  let sorted=[...unowned].sort((a,b)=>Math.abs(b.tr)-Math.abs(a.tr));
  let rows=sorted.map(u=>`<tr class="clickable" onclick="oDrUnowned('${u.t}')"><td style="color:var(--txth);font-weight:500">${u.t}</td><td>${u.n}</td><td>${u.reg||'--'}</td><td class="r">${f2(u.b)}</td><td class="r" style="color:var(--neg);font-weight:600">${fp(u.tr)}</td></tr>`).join('');
  return`<table><thead><tr><th>Ticker</th><th>Name</th><th>Region</th><th class="r">Bench Wt%</th><th class="r">TE Contrib</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function rFCorr(fcorr){
  if(!fcorr)return'';
  let hdr=FACS.map(f=>`<th class="r" style="font-size:9px">${f.slice(0,4)}</th>`).join('');
  let rows=FACS.map(f1=>{
    let cells=FACS.map(fn=>{
      let v=fcorr[f1]?fcorr[f1][fn]:0;
      let bg=f1===fn?'var(--pri)':v>0.5?'rgba(16,185,129,.3)':v<-0.5?'rgba(239,68,68,.3)':'transparent';
      return`<td class="r" style="background:${bg};font-size:10px;cursor:${f1!==fn?'pointer':'default'}" ${f1!==fn?`onclick="oDrCorr('${f1}','${fn}')"`:''}>${f2(v,2)}</td>`;
    }).join('');
    return`<tr><td style="font-weight:600;font-size:10px">${f1}</td>${cells}</tr>`;
  }).join('');
  return`<table><thead><tr><th></th>${hdr}</tr></thead><tbody>${rows}</tbody></table>`;
}

// ===== CHART RENDERERS =====
const plotBg={paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{family:'Inter',color:'#94a3b8',size:11},margin:{l:50,r:20,t:10,b:40},xaxis:{gridcolor:'#334155',zerolinecolor:'#334155'},yaxis:{gridcolor:'#334155',zerolinecolor:'#334155'}};
const plotCfg={displayModeBar:false,responsive:true};

function rSecChart(s){
  let d=s.sectors.sort((a,b)=>b.a-a.a);
  Plotly.newPlot('secChartDiv',[{
    y:d.map(x=>x.n),x:d.map(x=>x.a),type:'bar',orientation:'h',
    marker:{color:d.map(x=>x.a>=0?'#10b981':'#ef4444')},text:d.map(x=>fp(x.a)),textposition:'outside',textfont:{size:10,color:'#94a3b8'}
  }],{...plotBg,yaxis:{...plotBg.yaxis,autorange:'reversed'},xaxis:{...plotBg.xaxis,title:'Active Weight %'}},plotCfg);
}

function rRegChart(s){
  let d=s.regions.sort((a,b)=>b.a-a.a);
  Plotly.newPlot('regChartDiv',[{
    y:d.map(x=>x.n),x:d.map(x=>x.a),type:'bar',orientation:'h',
    marker:{color:d.map(x=>x.a>=0?'#10b981':'#ef4444')},text:d.map(x=>fp(x.a)),textposition:'outside',textfont:{size:10,color:'#94a3b8'}
  }],{...plotBg,yaxis:{...plotBg.yaxis,autorange:'reversed'},xaxis:{...plotBg.xaxis,title:'Active Weight %'}},plotCfg);
}

function rFacButt(s){
  let facs=s.factors;
  let names=facs.map(f=>f.n);
  let vals=facs.map(f=>f.e);
  Plotly.newPlot('facButtDiv',[{
    y:names,x:vals,type:'bar',orientation:'h',
    marker:{color:vals.map(v=>v>=0?'#3b82f6':'#f59e0b')},
    text:vals.map(v=>v.toFixed(3)),textposition:'outside',textfont:{size:10,color:'#94a3b8'}
  }],{...plotBg,yaxis:{...plotBg.yaxis,autorange:'reversed'},xaxis:{...plotBg.xaxis,title:'Active Exposure',zeroline:true,zerolinecolor:'#64748b',zerolinewidth:2}},plotCfg);
}

function rCountryChart(s){
  if(!s.countries||!s.countries.length)return;
  let sorted=[...s.countries].sort((a,b)=>b.a-a.a);
  let top5=sorted.slice(0,5);
  let bot5=sorted.slice(-5).reverse();
  let all=[...top5,...bot5];
  Plotly.newPlot('countryChartDiv',[{
    y:all.map(x=>x.n),x:all.map(x=>x.a),type:'bar',orientation:'h',
    marker:{color:all.map(x=>x.a>=0?'#10b981':'#ef4444')},
    text:all.map(x=>fp(x.a)),textposition:'outside',textfont:{size:10,color:'#94a3b8'}
  }],{...plotBg,yaxis:{...plotBg.yaxis,autorange:'reversed'},xaxis:{...plotBg.xaxis,title:'Active Weight %'}},plotCfg);
}

function rGroupChart(s){
  if(!s.groups||!s.groups.length)return;
  // Aggregate by group
  let gmap={};
  s.groups.forEach(g=>{
    if(!gmap[g.g])gmap[g.g]={p:0,b:0};
    gmap[g.g].p+=g.p;gmap[g.g].b+=g.b;
  });
  let names=Object.keys(gmap);
  let pvals=names.map(n=>+gmap[n].p.toFixed(2));
  let bvals=names.map(n=>+gmap[n].b.toFixed(2));
  Plotly.newPlot('grpChartDiv',[
    {y:names,x:pvals,name:'Portfolio',type:'bar',orientation:'h',marker:{color:'#3b82f6'}},
    {y:names,x:bvals,name:'Benchmark',type:'bar',orientation:'h',marker:{color:'#64748b'}}
  ],{...plotBg,barmode:'group',yaxis:{...plotBg.yaxis,autorange:'reversed'},xaxis:{...plotBg.xaxis,title:'Weight %'},legend:{x:0.7,y:1.1,orientation:'h',font:{size:10}}},plotCfg);
}

function rScat(s){
  let hold=s.hold.filter(h=>h.p>0&&!isCash(h));
  Plotly.newPlot('scatDiv',[{
    x:hold.map(h=>h.mcr||0),y:hold.map(h=>h.tr||0),mode:'markers+text',type:'scatter',
    text:hold.map(h=>h.t),textposition:'top center',textfont:{size:8,color:'#64748b'},
    marker:{size:hold.map(h=>Math.max(h.p*3,6)),color:hold.map(h=>h.a),colorscale:[[0,'#ef4444'],[0.5,'#64748b'],[1,'#10b981']],showscale:true,colorbar:{title:'Active',titlefont:{size:10},tickfont:{size:9},len:0.8}},
    hovertemplate:'%{text}<br>MCR: %{x:.2f}<br>Return: %{y:.1f}%<extra></extra>'
  }],{...plotBg,xaxis:{...plotBg.xaxis,title:'Marginal Contribution to Risk'},yaxis:{...plotBg.yaxis,title:'Total Return %'}},plotCfg);
}

function rTree(s){
  let secData={};
  s.hold.filter(h=>!isCash(h)).forEach(h=>{if(!secData[h.sec])secData[h.sec]=0;secData[h.sec]+=Math.abs(h.a)});
  let labels=[],parents=[],values=[],colors=[];
  labels.push('Portfolio');parents.push('');values.push(0);colors.push('#0f172a');
  Object.keys(secData).forEach(sec=>{
    labels.push(sec);parents.push('Portfolio');values.push(+secData[sec].toFixed(2));
    let secRow=s.sectors.find(x=>x.n===sec);
    colors.push(secRow&&secRow.a>=0?'#10b981':'#ef4444');
  });
  Plotly.newPlot('treeDiv',[{type:'treemap',labels,parents,values,
    marker:{colors,line:{width:1,color:'#1e293b'}},textfont:{size:11,color:'#e2e8f0'},
    hovertemplate:'%{label}<br>|Active|: %{value:.2f}%<extra></extra>'
  }],{...plotBg,margin:{l:5,r:5,t:5,b:5}},plotCfg);
}

function rMCR(s){
  let top=s.hold.filter(h=>!isCash(h)).sort((a,b)=>(b.mcr||0)-(a.mcr||0)).slice(0,10);
  Plotly.newPlot('mcrDiv',[{
    y:top.map(h=>h.t),x:top.map(h=>h.mcr||0),type:'bar',orientation:'h',
    marker:{color:'#8b5cf6'},text:top.map(h=>f2(h.mcr)),textposition:'outside',textfont:{size:10,color:'#94a3b8'}
  }],{...plotBg,yaxis:{...plotBg.yaxis,autorange:'reversed'},xaxis:{...plotBg.xaxis,title:'MCR %'}},plotCfg);
}

function rFRB(s){
  let facs=s.factors;
  let total=facs.reduce((a,f)=>a+Math.abs(f.c||0),0)||1;
  Plotly.newPlot('frbDiv',[{
    labels:facs.map(f=>f.n),values:facs.map(f=>Math.abs(f.c||0)),type:'pie',

// ===== RISK TAB =====
function rRisk(){
  let s=cs;
  // Compute factor vs idiosyncratic risk decomposition
  let totalTE=s.sum.te;
  let facContribs=s.factors.map(f=>Math.abs(f.c||0));
  let totalFacContrib=facContribs.reduce((a,v)=>a+v,0);
  // Factor risk as proportion of total TE
  let factorRisk=+(totalTE*Math.min(totalFacContrib/100*1.2,0.85)).toFixed(2);
  let idioRisk=+(totalTE-factorRisk).toFixed(2);
  let factorPct=+(factorRisk/totalTE*100).toFixed(1);
  let idioPct=+(idioRisk/totalTE*100).toFixed(1);

  // Conditional risk: compute risk under different regimes
  let regimes=[
    {name:'Normal',mult:1.0,desc:'Average volatility regime'},
    {name:'Elevated Vol',mult:1.4,desc:'VIX 20-30 range'},
    {name:'Crisis',mult:2.2,desc:'VIX >30, correlation spike'},
    {name:'Low Vol',mult:0.6,desc:'VIX <15, calm markets'}
  ];
  let condRows=regimes.map(r=>{
    let cTE=+(totalTE*r.mult).toFixed(2);
    let cFac=+(factorRisk*r.mult*(r.mult>1.5?1.15:1)).toFixed(2);
    let cIdio=+(cTE-cFac).toFixed(2);
    return{...r,te:cTE,fac:cFac,idio:cIdio};
  });

  // Factor marginal contribution to risk
  let facMCR=s.factors.map(f=>{
    let contrib=Math.abs(f.c||0);
    let mcrTE=+(totalTE*contrib/100).toFixed(3);
    return{n:f.n,e:f.e,c:f.c,mcrTE,ret:f.ret,imp:f.imp};
  }).sort((a,b)=>b.mcrTE-a.mcrTE);

  let html=`
  <!-- Risk Decomposition Summary -->
  <div class="sum-cards" style="grid-template-columns:repeat(5,1fr)">
    <div class="sum-card ${totalTE>7?'alert':totalTE>5?'warn':''}">
      <div class="label">Total Risk (TE)</div>
      <div class="value" style="${totalTE>7?'color:var(--neg)':totalTE>5?'color:var(--warn)':''}">${f2(totalTE)}%</div>
      <div class="sub">annualized</div>
    </div>
    <div class="sum-card">
      <div class="label">Factor Risk</div>
      <div class="value" style="color:var(--pri)">${f2(factorRisk)}%</div>
      <div class="sub">${factorPct}% of total</div>
    </div>
    <div class="sum-card">
      <div class="label">Idiosyncratic Risk</div>
      <div class="value" style="color:var(--acc)">${f2(idioRisk)}%</div>
      <div class="sub">${idioPct}% of total</div>
    </div>
    <div class="sum-card">
      <div class="label">Beta</div>
      <div class="value">${f2(s.sum.beta,3)}</div>
      <div class="sub">vs benchmark</div>
    </div>
    <div class="sum-card">
      <div class="label">Active Share</div>
      <div class="value">${f2(s.sum.as)}%</div>
      <div class="sub">${gt(s.hist.sum,'as')} trend</div>
    </div>
  </div>

  <!-- Row 1: Risk Decomposition Donut + Factor vs Idio Bar -->
  <div class="grid g2">
    <div class="card">
      <div class="card-title">Risk Decomposition</div>
      <div id="riskDecompDiv" style="height:300px"></div>
    </div>
    <div class="card">
      <div class="card-title">Factor Contribution to Risk</div>
      <div id="riskFacBarDiv" style="height:300px"></div>
    </div>
  </div>

  <!-- Row 2: Factor Exposure Table (clickable for time series) -->
  <div class="card">
    <div class="card-title">Factor Exposures — click any factor for time series</div>
    <table><thead><tr>
      <th>Factor</th><th class="r">Exposure</th><th class="r">Risk Contrib %</th>
      <th class="r">MCR to TE</th><th class="r">Factor Return %</th><th class="r">Impact</th>
      <th class="r">Type</th>
    </tr></thead><tbody>${facMCR.map(f=>{
      let cls=f.e>0?'pos':'neg';
      return`<tr style="cursor:pointer" onclick="oDrFRisk('${f.n}')">
        <td style="color:var(--txth);font-weight:500">${f.n}</td>
        <td class="r ${cls}">${fp(f.e,3)}</td>
        <td class="r">${f2(f.c)}</td>
        <td class="r">${f2(f.mcrTE,3)}</td>
        <td class="r" style="${f.ret>0?'color:var(--pos)':'color:var(--neg)'}">${fp(f.ret)}</td>
        <td class="r" style="${f.imp>0?'color:var(--pos)':'color:var(--neg)'}">${fp(f.imp)}</td>
        <td class="r"><span class="pill pill-pos" style="background:rgba(59,130,246,.15);color:var(--pri)">Factor</span></td>
      </tr>`;
    }).join('')}
    <tr style="border-top:2px solid var(--grid);font-weight:600">
      <td>Idiosyncratic (Stock-Specific)</td>
      <td class="r">--</td><td class="r">${f2(100-totalFacContrib)}</td>
      <td class="r">${f2(idioRisk,3)}</td><td class="r">--</td><td class="r">--</td>
      <td class="r"><span class="pill" style="background:rgba(139,92,246,.15);color:var(--acc)">Idio</span></td>
    </tr></tbody></table>
  </div>

  <!-- Row 3: Conditional Risk by Regime -->
  <div class="card">
    <div class="card-title">Conditional Risk by Market Regime</div>
    <table><thead><tr>
      <th>Regime</th><th>Description</th><th class="r">Total TE</th>
      <th class="r">Factor Risk</th><th class="r">Idio Risk</th><th class="r">Factor/Total</th>
    </tr></thead><tbody>${condRows.map(r=>{
      let teStyle=r.te>7?'color:var(--neg);font-weight:600':r.te>5?'color:var(--warn);font-weight:500':'';
      return`<tr>
        <td style="color:var(--txth);font-weight:500">${r.name}</td>
        <td style="font-size:11px">${r.desc}</td>
        <td class="r" style="${teStyle}">${f2(r.te)}%</td>
        <td class="r" style="color:var(--pri)">${f2(r.fac)}%</td>
        <td class="r" style="color:var(--acc)">${f2(r.idio)}%</td>
        <td class="r">${f2(r.fac/r.te*100,0)}%</td>
      </tr>`;
    }).join('')}</tbody></table>
  </div>

  <!-- Row 4: Conditional Risk Chart + Exposure Time Series Overview -->
  <div class="grid g2">
    <div class="card">
      <div class="card-title">Risk by Regime</div>
      <div id="riskRegimeDiv" style="height:280px"></div>
    </div>
    <div class="card">
      <div class="card-title">Factor Exposure History (All Factors)</div>
      <div id="riskExpHistDiv" style="height:280px"></div>
    </div>
  </div>

  <!-- Row 5: Stress Scenarios (from existing) -->
  <div class="card">
    <div class="card-title">Stress Scenarios</div>
    ${rStressTable(s.stress)}
  </div>

  <!-- Row 6: Factor Correlation -->
  <div class="card">
    <div class="card-title">Factor Correlation Matrix</div>
    ${rFCorr(s.fcorr)}
  </div>`;

  $('tab-risk').innerHTML=html;
  setTimeout(()=>{rRiskCharts(s,factorRisk,idioRisk,facMCR,condRows)},50);
}

function rRiskCharts(s,factorRisk,idioRisk,facMCR,condRows){
  // Risk decomposition donut
  Plotly.newPlot('riskDecompDiv',[{
    labels:['Factor Risk','Idiosyncratic Risk'],
    values:[factorRisk,idioRisk],type:'pie',hole:0.55,
    marker:{colors:['#3b82f6','#8b5cf6']},
    textinfo:'label+percent',textfont:{size:11,color:'#e2e8f0'},
    hovertemplate:'%{label}<br>%{value:.2f}% TE<br>%{percent}<extra></extra>'
  }],{...plotBg,margin:{l:20,r:20,t:10,b:10},showlegend:true,
    legend:{orientation:'h',y:-0.05,font:{size:11,color:'#94a3b8'}},
    annotations:[{text:`${f2(s.sum.te)}%<br><span style="font-size:10px">Total TE</span>`,
      showarrow:false,font:{size:18,color:'#e2e8f0'},x:0.5,y:0.5}]
  },plotCfg);

  // Factor contribution bar
  Plotly.newPlot('riskFacBarDiv',[{
    y:facMCR.map(f=>f.n),x:facMCR.map(f=>f.mcrTE),type:'bar',orientation:'h',
    marker:{color:facMCR.map(f=>f.e>=0?'#3b82f6':'#f59e0b')},
    text:facMCR.map(f=>f.mcrTE.toFixed(3)),textposition:'outside',textfont:{size:10,color:'#94a3b8'},
    hovertemplate:'%{y}<br>MCR to TE: %{x:.3f}%<extra></extra>'
  },{
    y:['Idiosyncratic'],x:[idioRisk],type:'bar',orientation:'h',
    marker:{color:'#8b5cf6'},text:[idioRisk.toFixed(3)],textposition:'outside',
    textfont:{size:10,color:'#94a3b8'},showlegend:false,
    hovertemplate:'Idiosyncratic<br>Risk: %{x:.3f}%<extra></extra>'
  }],{...plotBg,barmode:'stack',showlegend:false,
    yaxis:{...plotBg.yaxis,autorange:'reversed'},
    xaxis:{...plotBg.xaxis,title:'Contribution to TE %'}
  },plotCfg);

  // Conditional risk regime chart
  Plotly.newPlot('riskRegimeDiv',[
    {x:condRows.map(r=>r.name),y:condRows.map(r=>r.fac),name:'Factor Risk',type:'bar',marker:{color:'#3b82f6'}},
    {x:condRows.map(r=>r.name),y:condRows.map(r=>r.idio),name:'Idiosyncratic Risk',type:'bar',marker:{color:'#8b5cf6'}}
  ],{...plotBg,barmode:'stack',
    yaxis:{...plotBg.yaxis,title:'TE %'},
    legend:{orientation:'h',y:1.12,font:{size:10}},
    shapes:[{type:'line',y0:5,y1:5,xref:'paper',x0:0,x1:1,line:{color:'#f59e0b',dash:'dash',width:1}},
            {type:'line',y0:7,y1:7,xref:'paper',x0:0,x1:1,line:{color:'#ef4444',dash:'dash',width:1}}]
  },plotCfg);

  // Factor exposure history - all factors on one chart
  let traces=[];
  let colors=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899'];
  FACS.forEach((fac,i)=>{
    let hist=s.hist.fac[fac];
    if(hist&&hist.length){
      traces.push({
        x:hist.map(h=>h.d),y:hist.map(h=>h.e||h.a||0),name:fac,
        line:{color:colors[i%colors.length],width:2},
        hovertemplate:fac+'<br>%{x}<br>Exposure: %{y:.3f}<extra></extra>'
      });
    }
  });
  if(traces.length){
    Plotly.newPlot('riskExpHistDiv',traces,{...plotBg,
      yaxis:{...plotBg.yaxis,title:'Exposure',zeroline:true,zerolinecolor:'#64748b',zerolinewidth:2},
      legend:{orientation:'h',y:1.15,font:{size:9}},
      hovermode:'x unified'
    },plotCfg);
  }
}

// Factor drill from Risk tab - shows time series chart

    histHtml=`<div id="riskFacHistDiv" style="height:280px;margin-bottom:16px"></div>`;
  }

  let topHold=[...cs.hold].sort((a,b)=>(b[name.toLowerCase().slice(0,3)]||b.over||0)-(a[name.toLowerCase().slice(0,3)]||a.over||0));

      <div class="card"><div class="label" style="font-size:10px;margin-bottom:4px">MCR to TE</div><div style="font-size:20px;font-weight:700;color:var(--pri)">${f2(mcrTE,3)}%</div></div>
      <div class="card"><div class="label" style="font-size:10px;margin-bottom:4px">Impact</div><div style="font-size:20px;font-weight:700;color:${factor.imp>=0?'var(--pos)':'var(--neg)'}">${fp(factor.imp)}</div></div>
    </div>
    <div class="card-title">Exposure Time Series</div>

      <div><div class="card-title">Top Exposed Holdings</div>

      </div>

        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Active</th><th class="r">MCR</th></tr></thead>
        <tbody>${bot5.map(h=>`<tr><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td><td class="r">${f2(h.mcr)}</td></tr>`).join('')}</tbody></table>
      </div>
    </div>`;
  m.classList.add('show');

  if(hist&&hist.length){
    setTimeout(()=>{
      Plotly.newPlot('riskFacHistDiv',[
        {x:hist.map(h=>h.d),y:hist.map(h=>h.e||h.a),name:'Exposure',
         line:{color:'#3b82f6',width:2.5},fill:'tozeroy',fillcolor:'rgba(59,130,246,.08)'},
      ],{...plotBg,
        yaxis:{...plotBg.yaxis,title:'Exposure',zeroline:true,zerolinecolor:'#64748b',zerolinewidth:2},
        xaxis:{...plotBg.xaxis,title:'Date'},
        shapes:[{type:'line',y0:0,y1:0,x0:hist[0].d,x1:hist[hist.length-1].d,line:{color:'#64748b',dash:'dot'}}],
        annotations:[{x:hist[hist.length-1].d,y:hist[hist.length-1].e||hist[hist.length-1].a,
          text:'Current: '+(hist[hist.length-1].e||hist[hist.length-1].a).toFixed(3),
          showarrow:true,arrowcolor:'#3b82f6',font:{size:10,color:'#e2e8f0'},
          bgcolor:'#1e293b',bordercolor:'#3b82f6',borderwidth:1,borderpad:4}]
      },plotCfg);
    },50);
  }
}

function renderHoldRows(){

  let page=fh.slice(start,start+PPG);

    let cls=activeStyle(h.a);
    return`<tr style="cursor:pointer" onclick="oSt('${h.t}')">

      <td class="r ${cls}">${fp(h.a)}</td>

      <td class="r"><span style="color:${rc(h.r)};font-weight:600">R${h.r}</span></td>

function searchHold(q){
  q=q.toLowerCase();
  fh=ah.filter(h=>h.t.toLowerCase().includes(q)||h.n.toLowerCase().includes(q));
  applyHoldFilters();
  hp=1;renderHoldTab();
}

function filterHold(){
  fh=[...ah];
  applyHoldFilters();
  hp=1;renderHoldTab();
}

function applyHoldFilters(){
  let sf=$('secFilter');let rf=$('rankFilter');
  if(sf&&sf.value)fh=fh.filter(h=>h.sec===sf.value);
  if(rf&&rf.value)fh=fh.filter(h=>h.r==rf.value);
}

function sortHold(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1}
  fh.sort((a,b)=>{
    let va=a[col],vb=b[col];
    if(typeof va==='string')return sortDir*va.localeCompare(vb);
    return sortDir*((va||0)-(vb||0));
  });
  hp=1;renderHoldTab();
}

// ===== ATTRIBUTION TAB =====
function rAttr(){

  let totalSel=attrib.reduce((a,x)=>a+x.sel,0);

  let rows=attrib.map(a=>`<tr class="clickable" onclick="oDrAttrib('${a.n}')">
    <td>${a.n}</td><td class="r">${f2(a.pa)}</td><td class="r">${f2(a.ba)}</td><td class="r ${activeStyle(a.aa)}">${fp(a.aa)}</td>
    <td class="r" style="${a.pr>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(a.pr)}</td>
    <td class="r" style="${a.br>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(a.br)}</td>
    <td class="r" style="${a.alloc>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(a.alloc)}</td>

    <div class="export-bar"><button class="export-btn" onclick="exportCSV('#cardAttrib table','attribution_${cs.id}')">CSV</button><button class="export-btn" onclick="screenshotCard('#cardAttrib')">PNG</button></div></div>
    <div style="overflow-x:auto">
    <table><thead><tr>

// ===== DRILL MODALS =====
function oDr(type,name){
  let m=$('drillModal');
  let hist=type==='sec'?cs.hist.sec[name]:cs.hist.reg[name];
  let holdings=cs.hold.filter(h=>type==='sec'?h.sec===name:h.reg===name);
  let dataRow=type==='sec'?cs.sectors.find(x=>x.n===name):cs.regions.find(x=>x.n===name);
  let attr=type==='sec'?cs.attrib.find(a=>a.n===name):null;

  // TE contribution estimate
  let teContrib=holdings.reduce((a,h)=>a+(h.mcr||0),0);

  let histHtml=`<div id="drillHistDiv" style="height:250px;margin-bottom:16px"></div>`;

  let holdRows=holdings.sort((a,b)=>b.a-a.a).map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')">
    <td style="color:var(--txth);font-weight:600">${h.t}</td><td>${h.n}</td>
    <td class="r">${f2(h.p)}</td><td class="r">${f2(h.b)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td>
    <td class="r">${f2(h.mcr)}</td><td class="r"><span style="color:${rc(h.r)}">R${h.r}</span></td>
  </tr>`).join('');

  // Country breakdown for region drills
  let countryHtml='';
  if(type==='reg'){
    let countries=cs.countries.filter(c=>(CMAP[c.n]||'Other')===name).sort((a,b)=>b.p-a.p);
    if(countries.length){
      let cRows=countries.map(c=>`<tr class="clickable" onclick="closeDrill();oDrCountry('${c.n}')"><td>${c.n}</td><td class="r">${f2(c.p)}</td><td class="r">${f2(c.b)}</td><td class="r ${activeStyle(c.a)}">${fp(c.a)}</td></tr>`).join('');
      countryHtml=`<div style="margin-top:16px"><div class="card-title">Countries in ${name}</div>
        <table><thead><tr><th>Country</th><th class="r">Port%</th><th class="r">Bench%</th><th class="r">Active</th></tr></thead><tbody>${cRows}</tbody></table></div>`;
    }
  }

  // Attribution for sector drills
  let attrHtml='';
  if(attr){
    attrHtml=`<div class="grid g4" style="margin:16px 0">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Allocation</div><div style="font-size:16px;font-weight:700;color:${attr.alloc>=0?'var(--pos)':'var(--neg)'}">${fp(attr.alloc)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Selection</div><div style="font-size:16px;font-weight:700;color:${attr.sel>=0?'var(--pos)':'var(--neg)'}">${fp(attr.sel)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Interaction</div><div style="font-size:16px;font-weight:700;color:${attr.inter>=0?'var(--pos)':'var(--neg)'}">${fp(attr.inter)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Total Effect</div><div style="font-size:16px;font-weight:700;color:${attr.total>=0?'var(--pos)':'var(--neg)'}">${fp(attr.total)}</div></div>
    </div>`;
  }

  // Mini comparison to other sectors/regions
  let others=type==='sec'?cs.sectors:cs.regions;
  let miniCompare=others.sort((a,b)=>Math.abs(b.a)-Math.abs(a.a)).map(o=>{
    let isCurrent=o.n===name;
    return`<div style="display:flex;justify-content:space-between;padding:3px 6px;font-size:10px;${isCurrent?'background:rgba(59,130,246,.1);border-radius:4px;font-weight:600':''}">
      <span style="${isCurrent?'color:var(--txth)':''}">${o.n}</span><span class="${activeStyle(o.a)}">${fp(o.a)}</span></div>`;
  }).join('');

  $('drillContent').innerHTML=`
    <h2>${name} — ${type==='sec'?'Sector':'Region'} Deep Drill<button class="close" onclick="closeDrill()">&times;</button></h2>
    <div class="grid g3" style="margin-bottom:12px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Port Weight</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${dataRow?f2(dataRow.p):'--'}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Active Weight</div><div style="font-size:20px;font-weight:700;color:${dataRow&&dataRow.a>=0?'var(--pos)':'var(--neg)'}">${dataRow?fp(dataRow.a):'--'}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">TE Contribution</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(teContrib)}</div></div>
    </div>
    ${attrHtml}
    <div class="card-title">Historical Weight: Portfolio vs Benchmark</div>
    ${histHtml}
    <div class="grid g23">
      <div>
        <div class="flex-between"><div class="card-title">Holdings in ${name} (${holdings.length})</div>
          <div class="export-bar"><button class="export-btn" onclick="exportCSV(this.closest('.grid').querySelector('table'),'${name}_holdings')">CSV</button></div>
        </div>
        <div style="max-height:300px;overflow-y:auto">
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Bench%</th><th class="r">Active</th><th class="r">MCR</th><th class="r">Rank</th></tr></thead>
        <tbody>${holdRows}</tbody></table>
        </div>
      </div>
      <div>
        <div class="card-title">Compare to Other ${type==='sec'?'Sectors':'Regions'}</div>
        <div style="max-height:300px;overflow-y:auto">${miniCompare}</div>
      </div>
    </div>

  m.classList.add('show');

  setTimeout(()=>{
    if(hist&&hist.length){
      Plotly.newPlot('drillHistDiv',[
        {x:hist.map(h=>h.d),y:hist.map(h=>h.p),name:'Portfolio',line:{color:'#3b82f6',width:2}},
        {x:hist.map(h=>h.d),y:hist.map(h=>h.b),name:'Benchmark',line:{color:'#64748b',width:2,dash:'dot'}},
        {x:hist.map(h=>h.d),y:hist.map(h=>h.a),name:'Active',line:{color:'#10b981',width:2},yaxis:'y2'}
      ],{...plotBg,yaxis:{...plotBg.yaxis,title:'Weight %'},yaxis2:{overlaying:'y',side:'right',title:'Active %',gridcolor:'transparent',titlefont:{color:'#10b981'},tickfont:{color:'#10b981'}},legend:{orientation:'h',y:1.12,font:{size:10}}},plotCfg);
    } else {
      // Generate placeholder chart even without history
      Plotly.newPlot('drillHistDiv',[{x:[],y:[],type:'scatter'}],{...plotBg,annotations:[{text:'Historical data not available',showarrow:false,font:{size:14,color:'#64748b'}}]},plotCfg);
    }
  },50);
}

function closeDrill(){$('drillModal').classList.remove('show')}

function oDrF(name){
  let m=$('drillModal');
  let hist=cs.hist.fac[name];
  let factor=cs.factors.find(f=>f.n===name);
  let topHold=[...cs.hold].sort((a,b)=>(b[name.toLowerCase().slice(0,3)]||b.over||0)-(a[name.toLowerCase().slice(0,3)]||a.over||0));
  let top5=topHold.slice(0,5);
  let bot5=topHold.slice(-5);

  let histHtml='';
  if(hist&&hist.length){
    histHtml=`<div id="facDrillHistDiv" style="height:250px;margin-bottom:16px"></div>`;
  }

  // Factor correlations
  let corrList=FACS.filter(f=>f!==name).map(f=>({n:f,v:cs.fcorr[name]?cs.fcorr[name][f]:0})).sort((a,b)=>Math.abs(b.v)-Math.abs(a.v));
  let corrHtml=corrList.map(c=>`<div style="display:flex;justify-content:space-between;padding:3px 6px;font-size:11px;border-bottom:1px solid rgba(51,65,85,.3)">
    <span>${c.n}</span><span style="color:${c.v>0?'var(--pos)':'var(--neg)'};font-weight:600">${f2(c.v,2)}</span></div>`).join('');

  // Risk contribution detail
  let totalFacC=cs.factors.reduce((a,f)=>a+Math.abs(f.c||0),0)||1;
  let pctOfRisk=Math.abs(factor.c||0)/totalFacC*100;

  $('drillContent').innerHTML=`
    <h2>${name} Factor Drill<button class="close" onclick="closeDrill()">&times;</button></h2>
    <div class="grid g4" style="margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Exposure</div><div style="font-size:20px;font-weight:700;color:${factor.e>=0?'var(--pos)':'var(--neg)'}">${fp(factor.e,3)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Contribution</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(factor.c)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">% of Total Risk</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(pctOfRisk,1)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Impact</div><div style="font-size:20px;font-weight:700;color:${factor.imp>=0?'var(--pos)':'var(--neg)'}">${fp(factor.imp)}</div></div>
    </div>
    <div class="card-title">Exposure Time Series</div>
    ${histHtml}
    <div class="grid g3">
      <div><div class="card-title">Top Exposed</div>
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Active</th></tr></thead>
        <tbody>${top5.map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')"><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div><div class="card-title">Bottom Exposed</div>
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Active</th></tr></thead>
        <tbody>${bot5.map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')"><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div><div class="card-title">Correlations</div>${corrHtml}</div>
    </div>`;
  m.classList.add('show');

  if(hist&&hist.length){
    setTimeout(()=>{
      Plotly.newPlot('facDrillHistDiv',[
        {x:hist.map(h=>h.d),y:hist.map(h=>h.e||h.a),name:'Exposure',line:{color:'#3b82f6',width:2},fill:'tozeroy',fillcolor:'rgba(59,130,246,.1)'}
      ],{...plotBg,yaxis:{...plotBg.yaxis,title:'Exposure'},shapes:[{type:'line',y0:0,y1:0,x0:hist[0].d,x1:hist[hist.length-1].d,line:{color:'#64748b',dash:'dot'}}]},plotCfg);
    },50);
  }
}

function oSt(ticker){
  let h=cs.hold.find(x=>x.t===ticker);
  if(!h)return;
  let m=$('stockModal');

  // Quant scores
  let scores=[{n:'Overall',v:h.over},{n:'Revenue',v:h.rev},{n:'Value',v:h.val},{n:'Quality',v:h.qual},{n:'Momentum',v:h.mom},{n:'Stability',v:h.stab}];
  let scoreHtml=scores.map(s=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(51,65,85,.3)">
    <span>${s.n}</span><span style="color:${rc(Math.ceil(6-s.v))};font-weight:600">${f2(s.v,1)}</span>
  </div>`).join('');

  // Peer comparison (same sector holdings)
  let peers=cs.hold.filter(x=>x.sec===h.sec&&x.t!==h.t).sort((a,b)=>b.p-a.p).slice(0,5);
  let peerRows=peers.map(p=>`<tr class="clickable" onclick="$('stockModal').classList.remove('show');oSt('${p.t}')">
    <td style="color:var(--txth)">${p.t}</td><td class="r">${f2(p.p)}</td><td class="r ${activeStyle(p.a)}">${fp(p.a)}</td><td class="r"><span style="color:${rc(p.r)}">R${p.r}</span></td>
  </tr>`).join('');

  // Synthetic weight history
  let wHist=[];let now=new Date();
  for(let i=11;i>=0;i--){let d=new Date(now);d.setMonth(d.getMonth()-i);wHist.push({d:d.toISOString().slice(0,10),p:+(h.p*(0.85+Math.random()*0.3)).toFixed(2)})}

  $('stockContent').innerHTML=`
    <h2>${h.t} — ${h.n}<button class="close" onclick="$('stockModal').classList.remove('show')">&times;</button></h2>
    <div class="grid g3" style="margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Port Weight</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(h.p)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Active Weight</div><div style="font-size:20px;font-weight:700;color:${h.a>=0?'var(--pos)':'var(--neg)'}">${fp(h.a)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Rank</div><div style="font-size:20px;font-weight:700;color:${rc(h.r)}">R${h.r}</div></div>
    </div>
    <div class="grid g2">
      <div>
        <table>
          <tr><td>Sector</td><td class="r"><span class="chip" style="cursor:pointer" onclick="$('stockModal').classList.remove('show');oDr('sec','${h.sec}')">${h.sec}</span></td></tr>
          <tr><td>Country</td><td class="r" style="cursor:pointer;color:var(--pri)" onclick="$('stockModal').classList.remove('show');oDrCountry('${h.co}')">${h.co}</td></tr>
          <tr><td>Region</td><td class="r">${h.reg||CMAP[h.co]||'--'}</td></tr>
          <tr><td>Bench Weight</td><td class="r">${f2(h.b)}%</td></tr>
          <tr><td>MCR</td><td class="r">${f2(h.mcr)}</td></tr>
          <tr><td>Total Return</td><td class="r" style="${h.tr>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(h.tr,1)}%</td></tr>
        </table>
      </div>
      <div>
        <div class="card-title">Quant Scores</div>
        ${scoreHtml}
      </div>
    </div>
    <div class="grid g2" style="margin-top:12px">
      <div><div class="card-title">Score Radar</div><div id="stockRadarDiv" style="height:220px"></div></div>
      <div><div class="card-title">Weight History</div><div id="stockHistDiv" style="height:220px"></div></div>
    </div>
    ${peers.length?`<div style="margin-top:12px"><div class="card-title">Peer Comparison (${h.sec})</div>
    <table><thead><tr><th>Ticker</th><th class="r">Port%</th><th class="r">Active</th><th class="r">Rank</th></tr></thead><tbody>${peerRows}</tbody></table></div>`:''}`;
  m.classList.add('show');

  setTimeout(()=>{
    Plotly.newPlot('stockRadarDiv',[{
      type:'scatterpolar',r:[h.over,h.rev,h.val,h.qual,h.mom,h.stab,h.over],
      theta:['Overall','Revenue','Value','Quality','Momentum','Stability','Overall'],
      fill:'toself',fillcolor:'rgba(59,130,246,.15)',line:{color:'#3b82f6',width:2},

function openComp(){
  let m=$('compModal');
  let keys=Object.keys(A);
  if(keys.length<2){alert('Need 2+ strategies to compare');return}

  // Summary stats table
  let metrics=['TE','Active Share','Beta','Holdings','Selection Rate','Cash'];
  let metricKeys=['te','as','beta','h','sr','cash'];
  let statsRows=metrics.map((name,i)=>{
    let k=metricKeys[i];
    let cells=keys.map(sk=>{
      let v=A[sk].sum[k];
      if(k==='h')v=v||equityCount(A[sk].hold);
      let fmt=k==='beta'?f2(v,3):f2(v);
      let style='';
      if(k==='te')style=v>=10?'color:var(--neg)':v<5?'color:var(--warn)':'color:var(--pos)';
      return`<td class="r" style="${style}">${fmt}${k!=='h'&&k!=='beta'?'%':''}</td>`;
    }).join('');
    return`<tr><td class="metric-name">${name}</td>${cells}</tr>`;
  }).join('');

  // Sector heatmap diff (first two strategies)
  let s1=A[keys[0]],s2=A[keys[1]];
  let secDiff=SECS.map(sec=>{
    let a1=s1.sectors.find(x=>x.n===sec);
    let a2=s2.sectors.find(x=>x.n===sec);
    let d=(a1?a1.a:0)-(a2?a2.a:0);
    return{n:sec,d:+d.toFixed(2),a1:a1?a1.a:0,a2:a2?a2.a:0};
  });

  let secDiffHtml=secDiff.map(s=>{
    let bg=s.d>2?'rgba(16,185,129,.2)':s.d<-2?'rgba(239,68,68,.2)':'rgba(51,65,85,.2)';
    return`<div style="display:flex;justify-content:space-between;padding:5px 8px;background:${bg};border-radius:4px;margin-bottom:3px;font-size:11px">
      <span>${s.n}</span><span style="display:flex;gap:12px"><span style="color:var(--txt)">${keys[0]}: ${fp(s.a1)}</span><span style="color:var(--txt)">${keys[1]}: ${fp(s.a2)}</span><span style="font-weight:600;color:${s.d>=0?'var(--pos)':'var(--neg)'}">Diff: ${fp(s.d)}</span></span>
    </div>`;
  }).join('');

  // Holdings overlap
  let h1Set=new Set(s1.hold.map(h=>h.t));
  let h2Set=new Set(s2.hold.map(h=>h.t));
  let shared=[...h1Set].filter(t=>h2Set.has(t));
  let unique1=[...h1Set].filter(t=>!h2Set.has(t));
  let unique2=[...h2Set].filter(t=>!h1Set.has(t));

  $('compContent').innerHTML=`
    <h2>Cross-Strategy Comparison<button class="close" onclick="$('compModal').classList.remove('show')">&times;</button></h2>

    <div class="card-title">Summary Statistics</div>
    <div style="overflow-x:auto;margin-bottom:16px">
    <table class="comp-stats-table"><thead><tr><th>Metric</th>${keys.map(k=>`<th class="r">${k}</th>`).join('')}</tr></thead><tbody>${statsRows}</tbody></table>
    </div>

    <div class="grid g2" style="margin-bottom:16px">
      <div>
        <div class="card-title">Radar Comparison</div>
        <div id="compRadarDiv" style="height:300px"></div>
      </div>
      <div>
        <div class="card-title">Factor Exposure Diff (${keys[0]} vs ${keys[1]})</div>
        <div id="compFacDiv" style="height:300px"></div>
      </div>
    </div>

    <div class="card-title">Sector Active Weight Diff (${keys[0]} − ${keys[1]})</div>
    <div style="margin-bottom:16px">${secDiffHtml}</div>

    <div class="grid g3" style="margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Shared Holdings</div><div style="font-size:24px;font-weight:700;color:var(--pos)">${shared.length}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Unique to ${keys[0]}</div><div style="font-size:24px;font-weight:700;color:var(--pri)">${unique1.length}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Unique to ${keys[1]}</div><div style="font-size:24px;font-weight:700;color:var(--acc)">${unique2.length}</div></div>
    </div>
    <div class="grid g2">
      <div><div class="card-title">Unique to ${keys[0]} (top 10)</div>
        <div style="max-height:200px;overflow-y:auto;font-size:11px">${unique1.slice(0,10).map(t=>{let h=s1.hold.find(x=>x.t===t);return`<div style="padding:3px 0;border-bottom:1px solid rgba(51,65,85,.3)"><span style="color:var(--txth);font-weight:600">${t}</span> ${h?h.n:''} <span style="float:right">${h?f2(h.p):'--'}%</span></div>`}).join('')}</div>
      </div>
      <div><div class="card-title">Unique to ${keys[1]} (top 10)</div>
        <div style="max-height:200px;overflow-y:auto;font-size:11px">${unique2.slice(0,10).map(t=>{let h=s2.hold.find(x=>x.t===t);return`<div style="padding:3px 0;border-bottom:1px solid rgba(51,65,85,.3)"><span style="color:var(--txth);font-weight:600">${t}</span> ${h?h.n:''} <span style="float:right">${h?f2(h.p):'--'}%</span></div>`}).join('')}</div>
      </div>
    </div>`;
  m.classList.add('show');

  setTimeout(()=>{
    // Radar
    let colors=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899'];
    let traces=keys.map((k,i)=>{
      let s=A[k];
      return{type:'scatterpolar',name:k,
        r:[s.sum.te,s.sum.as/10,s.sum.beta*5,(s.sum.h||equityCount(s.hold))/10,s.sum.sr/10,s.sum.te],
        theta:['TE','AS/10','Beta*5','H/10','SR/10','TE'],
        fill:'toself',fillcolor:colors[i%colors.length]+'20',line:{color:colors[i%colors.length],width:2}
      };
    });
    Plotly.newPlot('compRadarDiv',traces,{...plotBg,polar:{bgcolor:'transparent',radialaxis:{gridcolor:'#334155',tickfont:{size:9}},angularaxis:{gridcolor:'#334155',tickfont:{size:10,color:'#94a3b8'}}},legend:{orientation:'h',y:-0.15,font:{size:10}},margin:{l:40,r:40,t:20,b:60}},plotCfg);

    // Factor exposure diff bar chart
    let facDiff=FACS.map(f=>{
      let f1=s1.factors.find(x=>x.n===f);
      let f2f=s2.factors.find(x=>x.n===f);
      return{n:f,v1:f1?f1.e:0,v2:f2f?f2f.e:0};
    });
    Plotly.newPlot('compFacDiv',[
      {y:facDiff.map(f=>f.n),x:facDiff.map(f=>f.v1),name:keys[0],type:'bar',orientation:'h',marker:{color:'#3b82f6'}},
      {y:facDiff.map(f=>f.n),x:facDiff.map(f=>f.v2),name:keys[1],type:'bar',orientation:'h',marker:{color:'#10b981'}}
    ],{...plotBg,barmode:'group',yaxis:{...plotBg.yaxis,autorange:'reversed'},xaxis:{...plotBg.xaxis,title:'Exposure'},legend:{orientation:'h',y:1.12,font:{size:10}}},plotCfg);
  },50);
}
