    <td class="r">--</td><td class="r">--</td>
    <td class="r" style="${totalAlloc>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(totalAlloc)}</td>
    <td class="r" style="${totalSel>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(totalSel)}</td>
    <td class="r" style="${totalInter>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(totalInter)}</td>
    <td class="r" style="${totalTotal>=0?'color:var(--pos)':'color:var(--neg)'}">${fp(totalTotal)}</td>
  </tr>`;

  let html=`
  <div class="card" id="cardAttrib" style="margin-bottom:16px">
    <div class="flex-between"><div class="card-title tip" data-tip="Click any sector row for holdings-level attribution decomposition">Brinson Attribution (Sector-Based)</div>
    <div class="export-bar"><button class="export-btn" onclick="exportCSV('#cardAttrib table','attribution_${cs.id}')">CSV</button><button class="export-btn" onclick="screenshotCard('#cardAttrib')">PNG</button></div></div>
    <div style="overflow-x:auto">
    <table><thead><tr>
      <th>Sector</th><th class="r">Port%</th><th class="r">Bench%</th><th class="r">Active</th>
      <th class="r">Port Ret</th><th class="r">Bench Ret</th>
      <th class="r">Alloc</th><th class="r">Select</th><th class="r">Inter</th><th class="r">Total</th>
    </tr></thead><tbody>${rows}${totalRow}</tbody></table>

  <div class="grid g2">

      <div class="card-title">Attribution by Component</div>
      <div id="attribCompDiv" style="height:300px"></div>

    <div class="card-title">Stress Scenarios</div>

  // Render into factor attribution area on Exposures tab (Attribution tab removed)
  let target=$('facAttribArea');
  if(target){target.innerHTML=html;}

    // Fallback: append to factor detail card area
    let fc=$('cardFacDetail');

// ===== DRILL MODALS =====
function oDr(type,name){
  let m=$('drillModal');
  let hist=type==='sec'?cs.hist.sec[name]:cs.hist.reg[name];
  let holdings=cs.hold.filter(h=>type==='sec'?h.sec===name:h.reg===name);
  let dataRow=type==='sec'?cs.sectors.find(x=>x.n===name):cs.regions.find(x=>x.n===name);
  let attr=type==='sec'?cs.attrib.find(a=>a.n===name):null;

  // TE contribution estimate
  let teContrib=holdings.reduce((a,h)=>a+(h.tr||0),0);

  let histHtml=`<div id="drillHistDiv" style="height:250px;margin-bottom:16px"></div>`;

  let holdRows=holdings.sort((a,b)=>(b.tr||0)-(a.tr||0)).map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')">
    <td style="color:var(--txth);font-weight:600">${h.t}</td><td>${h.n}</td>
    <td class="r">${f2(h.p)}</td><td class="r">${f2(h.b)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td>
    <td class="r">${f2(h.mcr)}</td><td class="r">${rRVQ(h)}</td>
  </tr>`).join('');

  // Country breakdown for region drills
  let countryHtml='';
  if(type==='reg'){
    let countries=cs.countries.filter(c=>(CMAP[c.n]||'Other')===name).sort((a,b)=>b.p-a.p);
    if(countries.length){
      let cRows=countries.map(c=>`<tr class="clickable" onclick="closeDrill();oDrCountry('${c.n}')"><td>${c.n}</td><td class="r">${f2(c.p)}</td><td class="r">${f2(c.b)}</td><td class="r ${activeStyle(c.a)}">${fp(c.a)}</td></tr>`).join('');
      countryHtml=`<div style="margin-top:16px"><div class="card-title">Countries in ${name}</div>
        <table><thead><tr><th>Country</th><th class="r">Port%</th><th class="r">Bench%</th><th class="r">Active</th></tr></thead><tbody>${cRows}</tbody></table></div>`;
    }
  }

  // Factor scores for sector drills (avg OVER/REV/VAL/QUAL/MOM/STAB from holdings)
  let facScoreHtml='';
  if(type==='sec'&&holdings.length){
    let avg=n=>{let vs=holdings.filter(h=>h[n]!=null);return vs.length?+(vs.reduce((a,h)=>a+h[n],0)/vs.length).toFixed(2):null};
    let sc=[{k:'over',l:'Overall'},{k:'rev',l:'Rev'},{k:'val',l:'Value'},{k:'qual',l:'Quality'}];
    let scoreCards=sc.map(({k,l})=>{
      let v=avg(k);if(v==null)return'';
      let col=v<=2?'var(--pos)':v>=4?'var(--neg)':'var(--warn)';
      return`<div class="card" style="text-align:center;padding:8px">
        <div class="label" style="font-size:10px;margin-bottom:4px">${l}</div>

function closeDrill(){$('drillModal').classList.remove('show')}

function oDrF(name,range){
  let m=$('drillModal');
  let hist=cs.hist.fac[name]||[];
  let factor=cs.factors.find(f=>f.n===name);
  if(range!=null)_facDrillRange=range;
  let rangeWks={All:Infinity,'3Y':156,'1Y':52,'6M':26,'3M':13};
  let wks=rangeWks[_facDrillRange]||Infinity;
  let histSlice=wks===Infinity?hist:(hist.slice(-wks)||hist);
  if(!histSlice.length)histSlice=hist;
  let topHold=[...cs.hold].sort((a,b)=>(b[name.toLowerCase().slice(0,3)]||b.over||0)-(a[name.toLowerCase().slice(0,3)]||a.over||0));
  let top5=topHold.slice(0,5);
  let bot5=topHold.slice(-5);

  let histHtml='';
  if(histSlice.length){
    let nm=name.replace(/'/g,"\\'");
    let rangeBtns=['3M','6M','1Y','3Y','All'].map(r=>`<button class="range-btn${_facDrillRange===r?' active':''}" onclick="oDrF('${nm}','${r}')">${r}</button>`).join('');
    let hasRetData=histSlice.some(h=>h.ret!=null||h.imp!=null);
    let retChartHtml=hasRetData?`<div class="card-title" style="margin-top:8px">Factor Return &amp; Impact</div><div id="facDrillRetDiv" style="height:160px;margin-bottom:16px"></div>`:'';
    histHtml=`<div class="range-btns">${rangeBtns}</div><div class="card-title">Active Exposure</div><div id="facDrillHistDiv" style="height:200px;margin-bottom:4px"></div>${retChartHtml}`;
  }

  // Factor correlations
  let corrList=FACS.filter(f=>f!==name).map(f=>({n:f,v:cs.fcorr[name]?cs.fcorr[name][f]:0})).sort((a,b)=>Math.abs(b.v)-Math.abs(a.v));
  let corrHtml=corrList.map(c=>`<div style="display:flex;justify-content:space-between;padding:3px 6px;font-size:11px;border-bottom:1px solid rgba(51,65,85,.3)">
    <span>${c.n}</span><span style="color:${c.v>0?'var(--pos)':'var(--neg)'};font-weight:600">${f2(c.v,2)}</span></div>`).join('');

  // Risk contribution detail
  let totalFacC=cs.factors.reduce((a,f)=>a+Math.abs(f.c||0),0)||1;
  let pctOfRisk=Math.abs(factor.c||0)/totalFacC*100;

  $('drillContent').innerHTML=`
    <h2>${name} Factor Drill<button class="close" onclick="closeDrill()">&times;</button></h2>
    <div class="grid g4" style="margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Active Exposure</div><div style="font-size:20px;font-weight:700;color:${(factor.a??0)>=0?'var(--pos)':'var(--neg)'}">${fp(factor.a,3)}</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Contribution</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(factor.c)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">% of Total Risk</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(pctOfRisk,1)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Impact</div><div style="font-size:20px;font-weight:700;color:${factor.imp!=null?(factor.imp>=0?'var(--pos)':'var(--neg)'):'var(--txt)'}">${fp(factor.imp)}</div></div>
    </div>
    <div class="card-title">Exposure Time Series</div>
    ${histHtml}
    <div class="grid g3">
      <div><div class="card-title">Top Exposed</div>
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Active</th></tr></thead>
        <tbody>${top5.map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')"><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div><div class="card-title">Bottom Exposed</div>
        <table><thead><tr><th>Ticker</th><th>Name</th><th class="r">Port%</th><th class="r">Active</th></tr></thead>
        <tbody>${bot5.map(h=>`<tr class="clickable" onclick="closeDrill();oSt('${h.t}')"><td style="color:var(--txth)">${h.t}</td><td>${h.n}</td><td class="r">${f2(h.p)}</td><td class="r ${activeStyle(h.a)}">${fp(h.a)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div><div class="card-title">Correlations</div>${corrHtml}</div>
    </div>`;
  m.classList.add('show');

  if(histSlice.length){
    setTimeout(()=>{
      let expVals=histSlice.map(h=>h.bm!=null?+(h.e-h.bm).toFixed(4):h.e);
      let expDates=histSlice.map(h=>isoDate(h.d));
      let numExp=expVals.filter(v=>v!=null);
      let expAvg=numExp.length?(numExp.reduce((a,v)=>a+v,0)/numExp.length):null;
      let expSd=numExp.length>1&&expAvg!=null?Math.sqrt(numExp.reduce((a,v)=>a+(v-expAvg)**2,0)/numExp.length):0;
      let expShapes=[{type:'line',y0:0,y1:0,x0:expDates[0],x1:expDates[expDates.length-1],line:{color:'#64748b',dash:'dot'}}];
      let expAnno=[];
      let expTraces=[];
      if(expAvg!=null&&expSd>0){
        expTraces.push(
          {x:expDates,y:expDates.map(()=>expAvg+expSd),type:'scatter',mode:'lines',line:{color:'transparent'},showlegend:false,hoverinfo:'skip'},
          {x:expDates,y:expDates.map(()=>expAvg-expSd),type:'scatter',mode:'lines',line:{color:'transparent'},fill:'tonexty',fillcolor:'rgba(148,163,184,0.10)',showlegend:false,hoverinfo:'skip'}
        );
        expShapes.push({type:'line',y0:expAvg,y1:expAvg,xref:'paper',x0:0,x1:1,line:{color:'#94a3b8',dash:'dash',width:1}});
        expAnno.push({x:1,xref:'paper',y:expAvg,text:'avg',showarrow:false,font:{size:9,color:'#94a3b8'},xanchor:'left',xshift:4});
      }
      expTraces.push({x:expDates,y:expVals,name:'Active Exposure',line:{color:'#3b82f6',width:2},fill:'tozeroy',fillcolor:'rgba(59,130,246,.1)'});
      let xFac={...plotBg.xaxis,rangeslider:{visible:true,bgcolor:'#0f172a',thickness:0.08}};
      Plotly.newPlot('facDrillHistDiv',expTraces,{...plotBg,xaxis:xFac,yaxis:{...plotBg.yaxis,title:'Exposure'},shapes:expShapes,annotations:expAnno,margin:{...plotBg.margin,r:40}},modalPlotCfg);

      // Second chart: Factor Return & Impact (if data present)
      if(document.getElementById('facDrillRetDiv')){
        let retVals=histSlice.map(h=>h.ret??null);
        let impVals=histSlice.map(h=>h.imp??null);
        Plotly.newPlot('facDrillRetDiv',[
          {x:expDates,y:retVals,name:'Factor Return',line:{color:'#f59e0b',width:2},mode:'lines'},
          {x:expDates,y:impVals,name:'Factor Impact',line:{color:'#10b981',width:2,dash:'dot'},mode:'lines'}
        ],{...plotBg,xaxis:{...plotBg.xaxis},yaxis:{...plotBg.yaxis,title:''},legend:{orientation:'h',y:1.15,font:{size:10}},margin:{...plotBg.margin,r:20}},modalPlotCfg);
      }
    },50);
  }
}

function oSt(ticker){
  let h=cs.hold.find(x=>x.t===ticker);
  if(!h)return;
  let m=$('stockModal');

  // Quant scores
  let scores=[{n:'Overall',v:h.over},{n:'Revision',v:h.rev},{n:'Value',v:h.val},{n:'Quality',v:h.qual},{n:'Momentum',v:h.mom},{n:'Stability',v:h.stab}];
  let scoreHtml=scores.map(s=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(51,65,85,.3)">
    <span>${s.n}</span><span style="color:${rc(Math.ceil(6-s.v))};font-weight:600">${f2(s.v,1)}</span>
  </div>`).join('');

  // Peer comparison (same sector holdings)
  let peers=cs.hold.filter(x=>x.sec===h.sec&&x.t!==h.t).sort((a,b)=>b.p-a.p).slice(0,5);
  let peerRows=peers.map(p=>`<tr class="clickable" onclick="$('stockModal').classList.remove('show');oSt('${p.t}')">
    <td style="color:var(--txth)">${p.t}</td><td class="r">${f2(p.p)}</td><td class="r ${activeStyle(p.a)}">${fp(p.a)}</td><td class="r">${rRVQ(p)}</td>
  </tr>`).join('');

  // Synthetic weight history
  let wHist=[];let now=new Date();
  for(let i=11;i>=0;i--){let d=new Date(now);d.setMonth(d.getMonth()-i);wHist.push({d:d.toISOString().slice(0,10),p:+(h.p*(0.85+Math.random()*0.3)).toFixed(2)})}

  $('stockContent').innerHTML=`
    <h2>${h.t} — ${h.n}<button class="close" onclick="$('stockModal').classList.remove('show')">&times;</button></h2>
    <div class="grid g3" style="margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Port Weight</div><div style="font-size:20px;font-weight:700;color:var(--txth)">${f2(h.p)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Active Weight</div><div style="font-size:20px;font-weight:700;color:${h.a>=0?'var(--pos)':'var(--neg)'}">${fp(h.a)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Rank</div><div style="font-size:20px;font-weight:700;color:${h.r!=null?rc(h.r):'#475569'}">${h.r!=null?'Q'+h.r:'—'}</div></div>
    </div>
    <div class="grid g2">
      <div>
        <table>
          <tr><td>Sector</td><td class="r"><span class="chip" style="cursor:pointer" onclick="${h.sec?`$('stockModal').classList.remove('show');oDr('sec','${h.sec}')`:'void 0'}">${h.sec||'--'}</span></td></tr>
          <tr><td>Country</td><td class="r" style="cursor:pointer;color:var(--pri)" onclick="${h.co?`$('stockModal').classList.remove('show');oDrCountry('${h.co}')`:'void 0'}">${h.co||'--'}</td></tr>
          <tr><td>Region</td><td class="r">${h.reg||CMAP[h.co]||'--'}</td></tr>
          <tr><td>Bench Weight</td><td class="r">${f2(h.b)}%</td></tr>
          <tr><td>%S (Specific TE)</td><td class="r">${f2(h.mcr)}</td></tr>
          <tr><td>TE Contrib (%T)</td><td class="r">${f2(h.tr,1)}%</td></tr>
        </table>
      </div>
      <div>
        <div class="card-title">Quant Scores</div>
        ${scoreHtml}
      </div>
    </div>
    <div class="grid g2" style="margin-top:12px">
      <div><div class="card-title">Score Radar</div><div id="stockRadarDiv" style="height:220px"></div></div>
      <div><div class="card-title">Weight History</div><div id="stockHistDiv" style="height:220px"></div></div>
    </div>
    ${peers.length&&h.sec?`<div style="margin-top:12px"><div class="card-title">Peer Comparison (${h.sec})</div>

  m.classList.add('show');

  setTimeout(()=>{
    Plotly.newPlot('stockRadarDiv',[{
      type:'scatterpolar',r:[h.over,h.rev,h.val,h.qual,h.mom,h.stab,h.over],
      theta:['Overall','Revision','Value','Quality','Momentum','Stability','Overall'],
      fill:'toself',fillcolor:'rgba(59,130,246,.15)',line:{color:'#3b82f6',width:2},
      marker:{size:4,color:'#3b82f6'}
    }],{...plotBg,polar:{bgcolor:'transparent',radialaxis:{range:[0,5],gridcolor:'#334155',tickfont:{size:9,color:'#64748b'}},angularaxis:{gridcolor:'#334155',tickfont:{size:10,color:'#94a3b8'}}},margin:{l:40,r:40,t:20,b:20},showlegend:false},plotCfg);

    Plotly.newPlot('stockHistDiv',[{
      x:wHist.map(w=>w.d),y:wHist.map(w=>w.p),type:'scatter',mode:'lines',

    }],{...plotBg,yaxis:{...plotBg.yaxis,title:'Weight %'},margin:{l:40,r:10,t:10,b:30}},plotCfg);
  },50);
}

let _compSel=null; // Set of selected strategy keys (null = all)
function openComp(selOverride){
  let m=$('compModal');
  let allKeys=Object.keys(A);
  if(allKeys.length<2){showToast('Need 2+ strategies to compare','var(--warn)');return}
  if(selOverride)_compSel=selOverride;
  if(!_compSel||_compSel.size<2)_compSel=new Set(allKeys);
  let keys=allKeys.filter(k=>_compSel.has(k));
  if(keys.length<2)keys=allKeys;

  // Summary stats table
  let metrics=['TE','Active Share','Beta','Holdings','Selection Rate','Cash'];
  let metricKeys=['te','as','beta','h','sr','cash'];
  let statsRows=metrics.map((name,i)=>{
    let k=metricKeys[i];
    let cells=keys.map(sk=>{
      let v=A[sk].sum[k];
      if(k==='h')v=v||equityCount(A[sk].hold);
      let fmt=k==='beta'?f2(v,3):f2(v);
      let style='';
      if(k==='te')style=v>=10?'color:var(--neg)':v<5?'color:var(--warn)':'color:var(--pos)';
      return`<td class="r" style="${style}">${fmt}${k!=='h'&&k!=='beta'?'%':''}</td>`;
    }).join('');
    return`<tr><td class="metric-name">${name}</td>${cells}</tr>`;
  }).join('');

  let s1=A[keys[0]],s2=A[keys[1]];

  // Sector heatmap — all strategies, color-coded active weights
  function secHeatColor(v){
    if(v==null)return'rgba(51,65,85,.1)';
    let abs=Math.min(Math.abs(v)/6,1);
    return v>0?`rgba(16,185,129,${abs*0.7+0.05})`:`rgba(239,68,68,${abs*0.7+0.05})`;
  }
  let secHeatRows=SECS.map(sec=>{
    let cells=keys.map(k=>{
      let row=A[k].sectors.find(x=>x.n===sec);
      let v=row?row.a:null;
      let bg=secHeatColor(v);
      return`<td class="heatmap-cell" style="background:${bg};color:${v!=null?(v>=0?'var(--pos)':'var(--neg)'):'var(--txt)'}">${v!=null?fp(v):'—'}</td>`;

    <div class="grid g2" style="margin-bottom:20px">

        r:[s.sum.te,s.sum.as/10,s.sum.beta*5,(s.sum.h||equityCount(s.hold))/10,(s.sum.sr||0)/10,s.sum.te],

async function generateReport(skipAI){
  let status=$('rptStatus');
  let selected=[...document.querySelectorAll('.rpt-tile:checked')].map(c=>c.value);
  if(!selected.length){status.innerHTML='<span class="neg">Select at least one slide</span>';return}
  let tone=document.querySelector('input[name="tone"]:checked').value;
  let context=$('rptContext').value;
  let apiKey=$('rptApiKey').value;

  if(!skipAI&&!apiKey){status.innerHTML='<span class="warn-t">Enter API key or use "Generate without AI"</span>';return}

  status.textContent='Loading pptxgenjs...';

  // Load pptxgenjs dynamically
  if(!window.PptxGenJS){
    await new Promise((res,rej)=>{
      let sc=document.createElement('script');
      sc.src='pptxgenjs.bundle.js';
      sc.onload=res;sc.onerror=rej;document.head.appendChild(sc);
    });
  }

  let narratives={};
  if(!skipAI&&apiKey){
    status.textContent='Generating narratives with Claude...';
    try{
      narratives=await getNarratives(selected,tone,context,apiKey);
    }catch(e){
      status.innerHTML=`<span class="warn-t">AI failed: ${e.message}. Generating without narratives.</span>`;
    }
  }

  status.textContent='Building PPTX...';
  try{
    await buildPPTX(selected,narratives);
    status.innerHTML='<span class="pos">Report generated successfully!</span>';
  }catch(e){
    status.innerHTML=`<span class="neg">PPTX error: ${e.message}</span>`;
  }
}

async function getNarratives(selected,tone,context,apiKey){
  let s=cs;
  let dataSnippet={strategy:s.id,name:s.name,te:s.sum.te,as:s.sum.as,beta:s.sum.beta,
    topSectors:s.sectors.sort((a,b)=>Math.abs(b.a)-Math.abs(a.a)).slice(0,5).map(x=>({n:x.n,a:x.a})),
    topFactors:s.factors.sort((a,b)=>Math.abs(b.e)-Math.abs(a.e)).slice(0,3).map(x=>({n:x.n,e:x.e}))
  };

  let prompt=`You are a portfolio risk analyst writing slide narratives for an institutional investor presentation.
Strategy: ${s.name} (${s.id})
Data: ${JSON.stringify(dataSnippet)}
Tone: ${tone}
${context?'Context: '+context:''}
Generate a JSON object with keys for each slide: ${selected.join(',')}
Each value should be 2-3 sentences of professional narrative. Return ONLY valid JSON.`;

  let resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  let data=await resp.json();
  let text=data.content[0].text;
  // Extract JSON from response
  let match=text.match(/\{[\s\S]*\}/);
  return match?JSON.parse(match[0]):{};
}

async function buildPPTX(selected,narratives){
  let pptx=new PptxGenJS();
  pptx.layout='LAYOUT_WIDE';
  let s=cs;
  let bgColor='080e1e';let txtColor='94a3b8';let headColor='e2e8f0';let accentColor='3b82f6';

  // Title slide
  let slide=pptx.addSlide();
  slide.background={color:bgColor};
  slide.addText('REDWOOD RISK CONTROL PANEL',{x:0.5,y:1.5,w:12,h:1,fontSize:28,color:headColor,fontFace:'Arial',bold:true});
  slide.addText(`${s.name} (${s.id})`,{x:0.5,y:2.5,w:12,h:0.5,fontSize:18,color:accentColor,fontFace:'Arial'});
  slide.addText(`Generated: ${new Date().toLocaleDateString()}`,{x:0.5,y:3.2,w:12,h:0.4,fontSize:12,color:txtColor,fontFace:'Arial'});

  selected.forEach(sec=>{
    let sl=pptx.addSlide();
    sl.background={color:bgColor};
    let title=sec.charAt(0).toUpperCase()+sec.slice(1);
    sl.addText(title,{x:0.5,y:0.3,w:12,h:0.6,fontSize:22,color:headColor,fontFace:'Arial',bold:true});
    let narr=narratives[sec]||'';
    if(narr)sl.addText(narr,{x:0.5,y:1,w:12,h:0.8,fontSize:11,color:txtColor,fontFace:'Arial',italic:true});

    let dataY=narr?2:1.2;
    if(sec==='summary'){
      sl.addText(`Tracking Error: ${f2(s.sum.te)}%  |  Active Share: ${f2(s.sum.as)}%  |  Beta: ${f2(s.sum.beta,3)}  |  Holdings: ${s.sum.h||equityCount(s.hold)}`,{x:0.5,y:dataY,w:12,h:0.5,fontSize:14,color:headColor,fontFace:'Arial'});
    }else if(sec==='sectors'){
      let rows=s.sectors.sort((a,b)=>Math.abs(b.a)-Math.abs(a.a)).map(x=>[x.n,f2(x.p),f2(x.b),fp(x.a)]);
      sl.addTable([['Sector','Port%','Bench%','Active'],...rows],{x:0.5,y:dataY,w:12,h:4,fontSize:10,color:txtColor,fontFace:'Arial',border:{type:'solid',color:'334155',pt:0.5},colW:[4,2.5,2.5,2.5]});
    }else if(sec==='factors'){
      let rows=s.factors.map(f=>[f.n,(f.a??0).toFixed(3),f2(f.c),fp(f.ret),fp(f.imp)]);
      sl.addTable([['Factor','Exposure','Contrib%','Return%','Impact'],...rows],{x:0.5,y:dataY,w:12,h:3,fontSize:10,color:txtColor,fontFace:'Arial',border:{type:'solid',color:'334155',pt:0.5}});
    }else{
      sl.addText(`Data available for ${sec}`,{x:0.5,y:dataY,w:12,h:0.5,fontSize:12,color:txtColor,fontFace:'Arial'});
    }
  });

  pptx.writeFile({fileName:`Redwood_${s.id}_Report_${new Date().toISOString().slice(0,10)}.pptx`});
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown',e=>{
  let inInput=document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='SELECT';
  if(e.key==='Escape'){
    closeAllModals();
    $('configPanel').classList.remove('open');
    return;
  }
  if(inInput)return;
  // C = compare
  if(e.key==='c'&&!e.ctrlKey&&!e.metaKey)openComp();
  // S = share
  if(e.key==='s'&&!e.ctrlKey&&!e.metaKey)generateShareURL();
  // / = focus global search
  if(e.key==='/'){e.preventDefault();let si=$('globalSearchInput');if(si)si.focus()}
  // Number keys 1-7 for strategy switching
  let num=parseInt(e.key);
  if(num>=1&&num<=7&&!e.ctrlKey&&!e.metaKey){
    let keys=Object.keys(A);
    if(keys[num-1])go(keys[num-1]);
  }
  // Arrow keys for strategy switching
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    let keys=Object.keys(A);
    let idx=keys.indexOf(cs.id);
    if(e.key==='ArrowLeft')idx=Math.max(0,idx-1);
    else idx=Math.min(keys.length-1,idx+1);
    go(keys[idx]);
  }
  // Tab key for tab switching (with shift for reverse)
  if(e.key==='Tab'&&!e.ctrlKey&&!e.metaKey){
    let tabNames=['exposures','holdings','risk'];
    let tabBtns=document.querySelectorAll('.tab');
    let idx=tabNames.indexOf(activeTab);
    if(e.shiftKey)idx=(idx-1+tabNames.length)%tabNames.length;
    else idx=(idx+1)%tabNames.length;
    e.preventDefault();
    switchTab(tabNames[idx],tabBtns[idx]);
  }
});

function globalSearch(q){
  let res=$('globalSearchResults');
  if(!q||q.length<1){res.innerHTML='';return}
  q=q.toLowerCase();
  let matches=[];
  Object.entries(A).forEach(([sid,s])=>{
    s.hold.forEach(h=>{
      if(h.t.toLowerCase().includes(q)||h.n.toLowerCase().includes(q)){
        matches.push({...h,sid});
      }
    });
  });
  matches=matches.slice(0,15);
  if(!matches.length){res.innerHTML='<div class="search-result"><span style="color:var(--txt)">No results</span></div>';return}
  res.innerHTML=matches.map(m=>`<div class="search-result" onmousedown="go('${m.sid}');setTimeout(()=>oSt('${m.t}'),100)">
    <span><span class="sr-ticker">${m.t}</span> ${m.n}</span>
    <span class="sr-meta">${m.sid}${m.sec?' | '+m.sec:''} | ${fp(m.a)}%</span>
  </div>`).join('');
}

function exportCSV(tableEl,filename){
  if(typeof tableEl==='string')tableEl=document.querySelector(tableEl);
  if(!tableEl)return;
  let rows=[...tableEl.querySelectorAll('tr')];
  let csv=rows.map(r=>[...r.querySelectorAll('th,td')].map(c=>'"'+c.textContent.trim().replace(/"/g,'""')+'"').join(',')).join('\n');
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(filename||'export')+'.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

    if(cfg.apiKey)$('cfgApiKey').value=cfg.apiKey;

// ===== FACTSET API WRAPPER =====
async function fetchFromAPI(endpoint,params={}){
  let cfg={};
  try{cfg=JSON.parse(localStorage.getItem('rr_config')||'{}')}catch(e){}
  if(!cfg.apiUrl||!cfg.apiKey){throw new Error('API not configured')}
  let url=cfg.apiUrl.replace(/\/$/,'')+'/'+endpoint;
  let qs=new URLSearchParams(params).toString();
  if(qs)url+='?'+qs;
  let retries=3;
  for(let i=0;i<retries;i++){
    try{
      let resp=await fetch(url,{headers:{'Authorization':'Bearer '+cfg.apiKey,'Content-Type':'application/json'}});
      if(!resp.ok)throw new Error('HTTP '+resp.status);
      return await resp.json();
    }catch(e){
      if(i===retries-1)throw e;
      await new Promise(r=>setTimeout(r,1000*Math.pow(2,i)));
    }
  }
}

  let fullHist=cs.hist.sum;
  if(!fullHist||!fullHist.length)return;
  if(range!=null)_metricRange=range;

  let rangeWks={All:Infinity,'3Y':156,'1Y':52,'6M':26,'3M':13};
  let wks=rangeWks[_metricRange]||Infinity;
  let hist=wks===Infinity?fullHist:fullHist.slice(-wks);
  if(!hist.length)hist=fullHist;

  let labels={te:'Tracking Error',as:'Active Share',beta:'Beta',h:'Holdings Count',sr:'Selection Rate',cash:'Cash %'};
  let units={te:'%',as:'%',beta:'',h:'',sr:'%',cash:'%'};
  let thresholds={
    te:[{v:5,c:'#10b981',l:'5% floor',dir:'floor'},{v:10,c:'#ef4444',l:'10% ceiling',dir:'ceil'}],
    beta:[{v:0.9,c:'#f59e0b',l:'0.9',dir:'floor'},{v:1.1,c:'#f59e0b',l:'1.1',dir:'ceil'}]

  let vals=hist.map(h=>h[metric]);
  let dates=hist.map(h=>isoDate(h.d));
  let current=vals[vals.length-1];
  let numVals=vals.filter(v=>v!=null);
  let min=numVals.length?Math.min(...numVals):null;
  let max=numVals.length?Math.max(...numVals):null;
  let avg=numVals.length?(numVals.reduce((a,v)=>a+v,0)/numVals.length):null;
  let stddev=numVals.length>1&&avg!=null?Math.sqrt(numVals.reduce((a,v)=>a+(v-avg)**2,0)/numVals.length):0;
  let totalMonths=fullHist.length;
  let inception=fullHist[0].d;
  let dec=metric==='beta'?3:2;

  // Find threshold breaches
  let breaches=[];
  (thresholds[metric]||[]).forEach(t=>{
    hist.forEach(h=>{
      if(metric==='te'){
        if(t.dir==='ceil'&&h[metric]>=t.v)breaches.push({date:h.d,val:h[metric],label:'above '+t.l});
        if(t.dir==='floor'&&h[metric]<t.v)breaches.push({date:h.d,val:h[metric],label:'below '+t.l});
      }

        }
      });
    }
    let xaxisFinal={...xaxis,rangeslider:{visible:true,bgcolor:'#0f172a',thickness:0.08}};
    Plotly.newPlot('metricChartDiv',allTraces,{...plotBg,xaxis:xaxisFinal,yaxis,shapes,annotations,margin:{...plotBg.margin,r:metric==='beta'?80:20}},modalPlotCfg);
  },50);
}

// ===== STRESS SCENARIO DRILL =====
function oDrStress(idx){
  let m=$('stressModal');
  let sc=STRESS[idx];
  let stress=cs.stress[idx];
  if(!sc||!stress)return;

  // Per-sector impact
  let sectorImpacts=cs.sectors.map(sec=>{
    let shock=sc.sectors[sec.n]||0;
    let portImpact=sec.p*shock/100;
    let benchImpact=sec.b*shock/100;
    return{n:sec.n,shock,portW:sec.p,benchW:sec.b,portImpact:+portImpact.toFixed(3),benchImpact:+benchImpact.toFixed(3),activeImpact:+(portImpact-benchImpact).toFixed(3)};
  }).sort((a,b)=>a.activeImpact-b.activeImpact);

  let rows=sectorImpacts.map(s=>`<tr>
    <td>${s.n}</td><td class="r">${s.shock}%</td><td class="r">${f2(s.portW)}</td>
    <td class="r" style="color:var(--neg)">${fp(s.portImpact,3)}</td>
    <td class="r" style="color:var(--neg)">${fp(s.benchImpact,3)}</td>
    <td class="r ${s.activeImpact>=0?'pos':'neg'}">${fp(s.activeImpact,3)}</td>
  </tr>`).join('');

  $('stressContent').innerHTML=`
    <h2>${sc.name}<button class="close" onclick="$('stressModal').classList.remove('show')">&times;</button></h2>
    <p style="font-size:12px;color:var(--txt);margin-bottom:16px">${sc.desc}</p>
    <div class="grid g3" style="margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Portfolio Impact</div><div style="font-size:20px;font-weight:700;color:var(--neg)">${fp(stress.port)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Benchmark Impact</div><div style="font-size:20px;font-weight:700;color:var(--neg)">${fp(stress.bench)}%</div></div>
      <div class="card" style="text-align:center"><div class="label" style="font-size:10px;margin-bottom:4px">Active Impact</div><div style="font-size:20px;font-weight:700;color:${stress.active>=0?'var(--pos)':'var(--neg)'}">${fp(stress.active)}%</div></div>
    </div>
    <div id="stressWaterfallDiv" style="height:300px;margin-bottom:16px"></div>
    <div class="card-title">Per-Sector Impact Detail</div>
    <table><thead><tr><th>Sector</th><th class="r">Shock</th><th class="r">Port Wt</th><th class="r">Port Impact</th><th class="r">Bench Impact</th><th class="r">Active Impact</th></tr></thead><tbody>${rows}</tbody></table>`;
  m.classList.add('show');

  setTimeout(()=>{
    Plotly.newPlot('stressWaterfallDiv',[{
      y:sectorImpacts.map(s=>s.n),x:sectorImpacts.map(s=>s.activeImpact),type:'bar',orientation:'h',
      marker:{color:sectorImpacts.map(s=>s.activeImpact>=0?'#10b981':'#ef4444')},
      text:sectorImpacts.map(s=>fp(s.activeImpact,3)),textposition:'outside',textfont:{size:10,color:'#94a3b8'}
    }],{...plotBg,yaxis:{...plotBg.yaxis},xaxis:{...plotBg.xaxis,title:'Active Impact %'}},plotCfg);
  },50);
}

  let m=$('groupModal');
  let subgroups=cs.groups.filter(g=>g.g===groupName);
  // Find all holdings in sectors belonging to this group

// ===== RISK BUDGET DETAILED DRILL =====
function oDrRiskBudget(){
  let m=$('riskBudgetModal');
  let facs=cs.factors;
  let total=facs.reduce((a,f)=>a+Math.abs(f.c||0),0)||1;

  let details=facs.map(f=>{
    let pctOfTotal=Math.abs(f.c||0)/total*100;
    let intentional=Math.abs(f.a??0)>0.2;
    return{n:f.n,e:f.a,c:f.c||0,pct:pctOfTotal,mcr:+(f.c*cs.sum.te/100||0).toFixed(3),intentional};
  }).sort((a,b)=>b.pct-a.pct);

  let rows=details.map(d=>`<tr>
    <td style="color:var(--txth);font-weight:500">${d.n}</td>

    <td class="r">${f2(d.pct,1)}%</td>
    <td class="r">${fp(d.mcr,3)}</td>
    <td class="r"><span class="pill ${d.intentional?'pill-pos':'pill-neg'}">${d.intentional?'Intentional':'Unintentional'}</span></td>

// ===== COPY SUMMARY =====
function copySummary(){
  let s=cs;
  let pad=(str,n)=>str.toString().padEnd(n);
  let lpad=(str,n)=>str.toString().padStart(n);
  let topOW=[...s.sectors].sort((a,b)=>b.a-a.a).slice(0,3);
  let topUW=[...s.sectors].sort((a,b)=>a.a-b.a).slice(0,3);
  let sigFac=s.factors.filter(f=>Math.abs(f.a??0)>0.15).sort((a,b)=>Math.abs(b.a??0)-Math.abs(a.a??0)).slice(0,6);
  let dateStr=$('dataTimestamp').textContent||'';
  let lines=[
    `${s.name} (${s.id})  |  Benchmark: ${s.benchmark}`,
    dateStr,
    '',
    'RISK METRICS',
    `  Tracking Error : ${f2(s.sum.te)}%`,
    `  Active Share   : ${f2(s.sum.as)}%`,
    `  Beta           : ${f2(s.sum.beta,3)}`,
    `  Holdings       : ${s.sum.h} portfolio  /  ${s.sum.bh||'—'} benchmark`,
    `  Cash           : ${f2(s.sum.cash)}%`,
    '',
    'TOP SECTOR TILTS',
    ...topOW.map(x=>`  ${x.a>=0?'+':''}${fp(x.a)}%  ${x.n}`),
    ...topUW.map(x=>`  ${fp(x.a)}%  ${x.n}`),
  ];
  if(sigFac.length){
    lines.push('');
    lines.push('SIGNIFICANT FACTOR TILTS');
    sigFac.forEach(f=>lines.push(`  ${pad(f.n,24)} ${f.a>=0?'+':''}${fp(f.a,3)}`));
  }
  let topHold=[...s.hold].filter(h=>!isCash(h)).sort((a,b)=>b.p-a.p).slice(0,5);
  if(topHold.length){
    lines.push('');
    lines.push('TOP 5 HOLDINGS');
    topHold.forEach(h=>lines.push(`  ${pad(h.t,8)} ${pad(h.n,28)} ${lpad(f2(h.p),5)}%`));
  }
  let txt=lines.join('\n');
  navigator.clipboard.writeText(txt).then(()=>showToast('Summary copied to clipboard!','var(--pos)'));
}

    h.t,h.n,h.sec||'',h.co||'',h.p,h.b,h.a,h.mcr,h.tr,h.r,
    h.over,h.rev,h.val,h.qual,h.mom,h.stab
  ].map(v=>'"'+(v==null?'':String(v).replace(/"/g,'""'))+'"').join(','));
  let csv=[header,...rows].join('\n');
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`holdings_${s.id}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`Exported ${allHold.length} holdings`,'var(--pos)');
}

// ===== FACTSET CSV PARSER v3 (section-driven, matches factset_parser_v3.py) =====
function pf(s){if(!s||!String(s).trim())return null;let v=parseFloat(s);return isNaN(v)?null:v;}
function r2(v){return v!=null?Math.round(v*100)/100:null;}
function parseDate(d){if(!d)return null;var s=String(d).trim();if(s.length===8&&/^\d{8}$/.test(s)){return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6));}return new Date(s);}
function isoDate(d){if(!d)return d;var s=String(d).trim();if(s.length===8&&/^\d{8}$/.test(s))return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6);return s;}
function parseCSVLine(line){
  let result=[],cell='',inQ=false;
  for(let i=0;i<line.length;i++){
    let c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){cell+='"';i++;}else if(c==='"'){inQ=false;}else{cell+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','){result.push(cell);cell='';}else{cell+=c;}}
  }
  result.push(cell);
  return result;
}
const ACCT_MAP={'IDM':'IDM','ACWIXUS':'IOP','EM':'EM','ISC':'ISC','SCG':'SCG','ACWI':'ACWI','GSC':'GSC'};
const ACCT_NAME={'IDM':'International Developed Markets','ACWIXUS':'International Opportunities','EM':'Emerging Markets','ISC':'International Small Cap','SCG':'Small Cap Growth','ACWI':'All Country World','GSC':'Global Small Cap'};
const ACCT_BM={'IDM':'MSCI EAFE','ACWIXUS':'MSCI ACWI ex USA','EM':'MSCI Emerging Markets','ISC':'MSCI World ex USA Small Cap','SCG':'Russell 2000 Growth','ACWI':'MSCI ACWI','GSC':'MSCI ACWI Small Cap'};
const FACTOR_MAP={'Dividend Yield':'Dividend Yield','Earnings Yield':'Earnings Yield','Exchange Rate Sensitivity':'FX Sensitivity','Growth':'Growth','Leverage':'Leverage','Liquidity':'Liquidity','Market Sensitivity':'Market Sensitivity','Medium-Term Momentum':'Momentum','Profitability':'Profitability','Size':'Size','Value':'Value','Volatility':'Volatility','Market':'Market','Industry':'Industry','Country':'Country','Currency':'Currency'};
const STYLE_FACTORS=new Set(Object.values(FACTOR_MAP));
function isDate(s){return s&&/\d+\/\d+\/\d+/.test(s.trim());}
function getGroups(row,startCol,gSize){
  let groups=[];let col=startCol;
  while(col<row.length){
    let d=(row[col]||'').trim();
    if(!isDate(d)){col++;continue;}
    let m=gSize===24?col+6:col+1;
    if(m+11>=row.length)break;
    groups.push({
      date:d,
      sec:gSize===24?(row[col+1]||'').trim()||null:null,
      reg:gSize===24?(row[col+2]||'').trim()||null:null,
      co:gSize===24?(row[col+3]||'').trim()||null:null,
      ind:gSize===24?(row[col+4]||'').trim()||null:null,
      grp:gSize===24?(row[col+5]||'').trim()||null:null,
      w:pf(row[m]),bw:pf(row[m+1]),aw:pf(row[m+2]),
      pct_s:pf(row[m+3]),pct_t:pf(row[m+4]),check:pf(row[m+5]),
      over:pf(row[m+6]),rev:pf(row[m+7]),val:pf(row[m+8]),
      qual:pf(row[m+9]),mom:pf(row[m+10]),stab:pf(row[m+11])
    });
    col+=gSize;
  }
  return groups;
}

function parseFactSetCSV(csvText){
  const t0=Date.now();
  let lines=csvText.split(/\r?\n/).filter(l=>l.trim());
  let strategies={};let riskMH=null;
  
  for(let i=1;i<lines.length;i++){
    let row=parseCSVLine(lines[i]);
    if(row[0]==='Section'){
      let j=row.slice(7,50).join('|');
      if(j.includes('Total Risk')&&j.includes('% Asset Specific'))riskMH=row;
      continue;
    }
    let sec=row[0],acct=row[1];
    if(!ACCT_MAP[acct])continue;
    let sid=ACCT_MAP[acct];
    if(!strategies[sid])strategies[sid]={id:sid,name:ACCT_NAME[acct]||acct,benchmark:ACCT_BM[acct]||'',sum:{te:0,as:0,beta:1,h:0,bh:0,sr:null,cash:0},hold:[],sectors:[],regions:[],countries:[],industries:[],groups:[],factors:[],chars:[],ranks:[],unowned:[],hist:{sum:[],fac:{},sec:{}}};
    let s=strategies[sid],l2=(row[5]||'').trim();
    
    if(sec==='Sector Weights'||sec==='Country'||sec==='Region'||sec==='Industry'||sec==='Group'||sec==='Overall'||sec==='REV'||sec==='VAL'||sec==='QUAL'){
      if(!l2||l2==='Data')continue;
      let tgt=sec==='Sector Weights'?'sectors':sec==='Country'?'countries':sec==='Region'?'regions':sec==='Industry'?'industries':sec==='Group'?'groups':'ranks';
      let gs=getGroups(row,7,19);if(!gs.length)continue;
      let g=gs[gs.length-1];
      if(!s[tgt].find(x=>x.n===l2))s[tgt].push({n:l2,p:r2(g.w),b:r2(g.bw),a:r2(g.aw),mcr:r2(g.pct_s),tr:r2(g.pct_t),over:r2(g.over),rev:r2(g.rev),val:r2(g.val),qual:r2(g.qual),mom:r2(g.mom),stab:r2(g.stab)});
    }
    else if(sec==='Security'){
      if(!l2||l2==='Data')continue;
      let gs=getGroups(row,7,24);if(!gs.length)continue;
      let g=gs[gs.length-1];
      let rank=g.over,rInt=(rank!=null&&rank>=1&&rank<=5)?Math.round(rank):null;
      if(l2.startsWith('CASH_')){s.sum.cash=(s.sum.cash||0)+(g.w||0);continue;}
      s.hold.push({t:l2,n:(row[6]||'').trim()||l2,sec:g.sec||(row[8]||'').trim()||null,co:g.co||(row[10]||'').trim()||null,reg:g.reg||(row[9]||'').trim()||null,ind:g.ind||(row[11]||'').trim()||null,grp:g.grp||(row[12]||'').trim()||null,p:r2(g.w),b:r2(g.bw),a:r2(g.aw),mcr:r2(g.pct_s),tr:r2(g.pct_t),r:rInt,over:r2(g.over),rev:r2(g.rev),val:r2(g.val),qual:r2(g.qual),mom:r2(g.mom),stab:r2(g.stab)});
    }
    else if(sec==='RiskM'){
      if(l2!=='Data')continue;
      let date=(row[7]||'').trim();
      let pe_p=pf(row[9]),pb_p=pf(row[10]),pe_b=pf(row[11]),pb_b=pf(row[12]);
      let tR=pf(row[15]),bR=pf(row[16]),beta=pf(row[17]);
      let pS=pf(row[20]),pF=pf(row[21]);
      let fR={},fE={};
      if(riskMH){for(let c=23;c<Math.min(40,row.length);c++){let fn=(riskMH[c]||'').trim();if(fn&&FACTOR_MAP[fn]&&pf(row[c])!=null)fR[FACTOR_MAP[fn]]=pf(row[c]);}
      for(let c=43;c<Math.min(50,row.length);c++){let fn=(riskMH[c]||'').trim();if(fn&&FACTOR_MAP[fn]&&pf(row[c])!=null)fE[FACTOR_MAP[fn]]=pf(row[c]);}}
      if(!s.sum._rd||date>s.sum._rd){
        s.sum.te=r2(tR)||s.sum.te;s.sum.beta=r2(beta)||s.sum.beta;
        s.sum.pe_p=r2(pe_p);s.sum.pe_b=r2(pe_b);s.sum.pb_p=r2(pb_p);s.sum.pb_b=r2(pb_b);
        s.sum.pct_specific=r2(pS);s.sum.pct_factor=r2(pF);s.sum.total_risk=r2(tR);s.sum.bm_risk=r2(bR);
        s.sum._rd=date;s.sum._fr=fR;s.sum._fe=fE;
      }
      s.hist.sum.push({d:date,te:r2(tR),beta:r2(beta),pct_specific:r2(pS),pct_factor:r2(pF)});
    }
    else if(sec==='Portfolio Characteristics'){
      if(l2!=='Data')continue;
      let date=(row[7]||'').trim();
      let te=pf(row[10]),bP=pf(row[11]),h=pf(row[12]),as=pf(row[13]),mc=pf(row[14]);
      let hB=pf(row[16]),mB=pf(row[17]),ep=pf(row[18]),fc=pf(row[22]),dy=pf(row[23]),ro=pf(row[24]),om=pf(row[25]);
      let bMc=pf(row[33]),bFc=pf(row[38]),bDy=pf(row[39]),bRo=pf(row[40]),bOm=pf(row[41]),bEp=pf(row[42]);
      if(!s.sum._cd||date>s.sum._cd){
        if(te!=null)s.sum.te=r2(te);if(as!=null)s.sum.as=r2(as);if(bP!=null)s.sum.beta=r2(bP);if(h!=null)s.sum.h=Math.round(h);
        s.sum.mc=r2(mc);s.sum.roe=r2(ro);s.sum.fcfy=r2(fc);s.sum.divy=r2(dy);s.sum.epsg=r2(ep);s.sum.opmgn=r2(om);
        s.sum.betas={predicted:r2(bP),historical:r2(hB),mpt:r2(mB)};s.sum._cd=date;
        s.chars=[{m:'Market Cap ($M)',p:r2(mc),b:r2(bMc)},{m:'P/E Ratio',p:s.sum.pe_p,b:s.sum.pe_b},{m:'P/B Ratio',p:s.sum.pb_p,b:s.sum.pb_b},{m:'ROE NTM (%)',p:r2(ro),b:r2(bRo)},{m:'FCF Yield (%)',p:r2(fc),b:r2(bFc)},{m:'Div Yield (%)',p:r2(dy),b:r2(bDy)},{m:'EPS Growth 3Y (%)',p:r2(ep),b:r2(bEp)},{m:'Op Margin (%)',p:r2(om),b:r2(bOm)}];
      }
      s.hist.sum.push({d:date,te:r2(te),as:r2(as),beta:r2(bP),h:h?Math.round(h):null,cash:s.sum.cash});
    }
    else if(sec==='18 Style Snapshot'){
      if(!l2||l2==='Data')continue;
      let fname=FACTOR_MAP[l2]||l2;
      if(!STYLE_FACTORS.has(fname))continue; // skip non-style factors
      let lastE=null,lastR=null,lastI=null,col=7;
      while(col+6<row.length){
        if(isDate((row[col]||'').trim())){
          let e=pf(row[col+2]),r=pf(row[col+3]),im=pf(row[col+4]);
          if(e!=null||r!=null){lastE=e;lastR=r;lastI=im;}
        }
        col+=7;
      }
      let ex=s.factors.find(f=>f.n===fname);
      if(ex){if(lastE!=null)ex.a=r2(lastE);if(lastR!=null)ex.ret=r2(lastR);if(lastI!=null)ex.imp=r2(lastI);}
      else s.factors.push({n:fname,e:0,bm:0,a:r2(lastE),c:0,ret:r2(lastR),imp:r2(lastI)});
    }
  }
  
  for(let[sid,s]of Object.entries(strategies)){
    let fR=s.sum._fr||{},fE=s.sum._fe||{};delete s.sum._fr;delete s.sum._fe;delete s.sum._rd;delete s.sum._cd;
    for(let[fn,r]of Object.entries(fR)){let ex=s.factors.find(f=>f.n===fn);if(ex)ex.c=r2(r);else s.factors.push({n:fn,e:0,bm:0,a:r2(fE[fn]),c:r2(r),ret:null,imp:null});}
    for(let[fn,e]of Object.entries(fE)){let ex=s.factors.find(f=>f.n===fn);if(ex&&ex.a==null)ex.a=r2(e);}
    s.sum.h=s.sum.h||s.hold.filter(h=>!h.t.startsWith('CASH')).length;
    s.hist.sum.sort((a,b)=>(a.d||'').localeCompare(b.d||''));
    let seen=new Set();s.hist.sum=s.hist.sum.filter(h=>{if(seen.has(h.d))return false;seen.add(h.d);return true;});
  }
  return{strategies,validation_issues:[],report_date:'',parse_stats:{total_rows:lines.length-1,parse_time_ms:Date.now()-t0}};
}

function updateHistUI(){

  const wrap=$('histWrap');
  if(!wrap)return;
  if(hist.length){
    wrap.style.display='block';

  const panel=$('histPanel');
  const rd=d=>{if(!d||d.length!==8)return'';return new Date(d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6)).toLocaleDateString('en-US',{month:'short',day:'numeric'});};
  panel.innerHTML=hist.map((e,i)=>`
    <div class="hist-item${i===_activeHistIdx?' active-hist':''}" onclick="loadFromHistory(${i})">
      <span class="hist-name">${e.filename}</span>
      <span class="hist-meta">${rd(e.reportDate)}&nbsp;·&nbsp;${e.strategiesCount} strats</span>
    </div>`).join('')+
    `<div class="hist-footer" onclick="clearHistory()">Clear history</div>`;
}

// Close history panel on outside click
document.addEventListener('click',e=>{
  const wrap=$('histWrap');
  if(wrap&&!wrap.contains(e.target))closeHistPanel();
});

// ===== VALIDATION PANEL =====
function showValidPanel(normalizedData,parseStats,issues,filename){
  const panel=$('validPanel');
  if(!panel)return;
  const hasIssues=issues&&issues.length>0;
  const dotCls=hasIssues?'warn':'ok';
  const sc=Object.keys(normalizedData).length;
  const reps=parseStats.repair_warnings||0;
  const ms=parseStats.parse_time_ms||0;
  const summary=`${sc} strategies · ${(parseStats.total_rows||0).toLocaleString()} rows · ${(ms/1000).toFixed(1)}s${reps?' · '+reps+' comma repair'+(reps!==1?'s':''):''}${hasIssues?' · '+issues.length+' warning'+(issues.length!==1?'s':''):''}`;

  let perStrat='';
  for(const[sid,s]of Object.entries(normalizedData)){
    const ss=(parseStats.strat_stats||{})[sid]||{};
    const secSum=s.sectors.reduce((a,x)=>a+(x.p||0),0);
    const ctrySum=s.countries.reduce((a,x)=>a+(x.p||0),0);
    const te=s.sum.te!=null?s.sum.te+'%':'--';
    const as=s.sum.as!=null?s.sum.as+'%':'--';
    const beta=s.sum.beta!=null?s.sum.beta:'--';
    perStrat+=`<div class="valid-strat">
      <div class="vs-name">${sid} — ${s.name}</div>
      <div class="vs-row"><span>${s.hold.length} holdings · ${s.sectors.length} sectors · ${s.countries.length} countries · ${s.factors.length} factors</span><span style="color:var(--pos)">TE ${te} · AS ${as} · β ${beta}</span></div>
      <div class="vs-row"><span>Sector sum ${secSum.toFixed(1)}% · Country sum ${ctrySum.toFixed(1)}%</span><span>${(ss.factorDates||[]).length} factor dates</span></div>
    </div>`;
  }

  let issueHtml='';
  if(hasIssues){
    issueHtml=issues.map(i=>`<div class="valid-issue">⚠ ${i}</div>`).join('');
  }

  panel.innerHTML=`<div class="valid-panel">
    <div class="valid-header" onclick="toggleValidPanel()">
      <div class="valid-dot ${dotCls}"></div>
      <div class="valid-summary">${filename} — ${summary}</div>
      <div class="valid-toggle" id="validToggle">▼</div>
    </div>
    <div class="valid-body" id="validBody">
      ${issueHtml}
      ${perStrat}
    </div>
  </div>`;
  panel.style.display='block';
}

function toggleValidPanel(){
  const body=$('validBody');
  const toggle=$('validToggle');
  if(!body)return;
  body.classList.toggle('open');
  if(toggle)toggle.classList.toggle('open');
}

// ===== FACTSET NORMALIZE EXTENSION =====
function normalizeFactSet(fsResponse){
  // Transform FactSet-style response into our internal format
  // Supports: portfolioAnalytics, paEngine, spar responses
  let out={};
  let cfg={};
  try{cfg=JSON.parse(localStorage.getItem('rr_config')||'{}')}catch(e){}
  let stratMap={};
  try{stratMap=JSON.parse(cfg.stratMap||'{}')}catch(e){}

  // Reverse map: FactSet ID -> our strategy code
  let reverseMap={};
  Object.entries(stratMap).forEach(([k,v])=>reverseMap[v]=k);

  // Handle array of portfolios
  let portfolios=fsResponse.data||fsResponse.portfolios||fsResponse;
  if(!Array.isArray(portfolios))portfolios=[portfolios];

  portfolios.forEach(p=>{
    let fsId=p.portfolioId||p.id||'UNKNOWN';
    let stratId=reverseMap[fsId]||fsId;
    let stratDef=STRATS.find(s=>s.id===stratId)||{id:stratId,name:p.name||stratId,bm:p.benchmarkId||''};

    let s={
      id:stratId,name:p.name||stratDef.name,benchmark:p.benchmarkName||p.benchmarkId||stratDef.bm,
      sum:{
        te:p.trackingError||p.te||0,
        as:p.activeShare||p.as||0,
        beta:p.beta||1,
        h:p.holdingsCount||0,
        bh:p.benchmarkHoldings||0,
        sr:p.selectionRate||0,
        cash:p.cashWeight||0
      },
      sectors:(p.sectors||p.sectorExposures||[]).map(x=>({
        n:x.name||x.sector,p:x.portfolioWeight||x.p||0,b:x.benchmarkWeight||x.b||0,
        a:x.activeWeight||x.a||(x.portfolioWeight-x.benchmarkWeight)||0,
        s:x.stockSpecific||0,t:x.totalReturn||0
      })),
      regions:(p.regions||p.regionExposures||[]).map(x=>({
        n:x.name||x.region,p:x.portfolioWeight||x.p||0,b:x.benchmarkWeight||x.b||0,
        a:x.activeWeight||x.a||(x.portfolioWeight-x.benchmarkWeight)||0
      })),
      countries:(p.countries||p.countryExposures||[]).map(x=>({
        n:x.name||x.country,p:x.portfolioWeight||x.p||0,b:x.benchmarkWeight||x.b||0,
        a:x.activeWeight||x.a||(x.portfolioWeight-x.benchmarkWeight)||0
      })),
      factors:(p.factors||p.factorExposures||[]).map(x=>({
        n:x.name||x.factor,e:x.exposure||x.e||0,a:x.activeExposure||x.exposure||0,bm:x.benchmarkExposure||0,
        c:x.contribution||x.c||0,ret:x.factorReturn||0,imp:x.impact||0
      })),
      hold:(p.holdings||p.positions||[]).map(x=>({
        t:x.ticker||x.symbol||x.id,n:x.name||x.securityName||'',
        sec:x.sector||'',co:x.country||'',
        p:x.portfolioWeight||x.weight||0,b:x.benchmarkWeight||0,
        a:x.activeWeight||(x.portfolioWeight-x.benchmarkWeight)||0,
        mcr:x.mcr||x.marginalContribution||0,tr:x.totalReturn||0,
        r:x.rank||x.quantRank||3,
        over:x.overallScore||3,rev:x.revenueScore||3,val:x.valueScore||3,
        qual:x.qualityScore||3,mom:x.momentumScore||3,stab:x.stabilityScore||3
      })),
      ranks:p.ranks||[],chars:p.characteristics||[],groups:p.groups||[],
      unowned:(p.unownedRisk||p.unowned||[]).map(x=>({
        t:x.ticker||x.id,n:x.name||'',reg:x.region||'',b:x.benchmarkWeight||0,tr:x.teContribution||0
      }))
    };
    out[stratId]=s;
  });
  return out;
}

// ===== ENHANCED NORMALIZE (accepts both formats) =====
let _origNormalize=normalize;
normalize=function(raw){
  // Detect FactSet format
  if(raw.data||raw.portfolios||(raw[Object.keys(raw)[0]]&&raw[Object.keys(raw)[0]].portfolioId)){
    return _origNormalize(normalizeFactSet(raw));
  }
  return _origNormalize(raw);
};

// ===== LIVE REFRESH =====
let refreshTimer=null;
function startLiveRefresh(){
  let cfg={};
  try{cfg=JSON.parse(localStorage.getItem('rr_config')||'{}')}catch(e){}
  let interval=(parseInt(cfg.refresh)||300)*1000;
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(async()=>{
    try{
      let data=await fetchFromAPI('portfolio/analytics');
      A=normalize(data);
      let keys=Object.keys(A);
      if(keys.includes(cs.id))cs=A[cs.id];
      else if(keys.length)cs=A[keys[0]];
      upd();
      $('dataTimestamp').textContent='Live · '+new Date().toLocaleTimeString();
      showToast('Data refreshed','var(--pos)');
    }catch(e){
      let dot=$('connStatus').querySelector('.conn-dot');
      dot.className='conn-dot off';
    }
  },interval);
}

// ===== AUTO-LOAD WITH DEMO DATA =====
window.addEventListener('DOMContentLoaded',()=>{
  loadConfig();
  // Check for shared state in URL hash
  if(location.hash){
    try{
      let state=JSON.parse(atob(location.hash.slice(1)));
      if(state.t)activeTab=state.t;
    }catch(e){}
  }
  // Nuclear clear — wipe ALL localStorage every time
  try{localStorage.clear();}catch(e){}
  // Auto-load latest_data.json if available (for server deployment)
  // Falls back to upload zone if file not found
  fetch('latest_data.json').then(r=>{
    if(!r.ok)throw new Error('No auto-load file');
    return r.json();
  }).then(data=>{
    A=normalize(data);
    let keys=Object.keys(A);
    if(keys.length){
      document.getElementById('uploadZone').style.display='none';
      document.getElementById('content').style.display='block';
      let defaultStrat=keys.includes('EM')?'EM':keys[0];
      go(defaultStrat);
      showToast('Auto-loaded latest data — '+keys.length+' strategies','var(--pos)');
    }else{throw new Error('No strategies');}
  }).catch(()=>{
    // No latest_data.json found — show upload zone (normal local usage)
    document.getElementById('content').style.display='none';
    document.getElementById('uploadZone').style.display='flex';
  });
});
